<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテ分析ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="config.js"></script>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --green: #4ade80;
  --amber: #fbbf24;
  --rose: #fb7185;
  --purple: #a78bfa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { padding: 24px 32px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .badge { background: var(--accent); color: #0f172a; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.header .back { color: var(--muted); text-decoration: none; font-size: 13px; margin-left: auto; }
.header .back:hover { color: var(--text); }
.date-filter { display: flex; align-items: center; gap: 12px; padding: 16px 32px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.date-filter label { font-size: 13px; color: var(--muted); font-weight: 600; }
.date-filter input[type="date"] {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; font-size: 13px; font-family: inherit;
}
.date-filter input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
.date-filter .filter-btn {
  background: var(--accent); color: #0f172a; border: none; padding: 7px 18px;
  border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer;
}
.date-filter .filter-btn:hover { background: #7dd3fc; }
.date-filter .reset-btn {
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
}
.date-filter .reset-btn:hover { color: var(--text); border-color: var(--text); }
.date-filter .range-info { font-size: 12px; color: var(--accent); margin-left: 8px; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 24px 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 800; }
.stat-card .value.accent { color: var(--accent); }
.stat-card .value.green { color: var(--green); }
.stat-card .value.amber { color: var(--amber); }
.stat-card .value.purple { color: var(--purple); }
.stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; padding: 0 32px 24px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
.chart-card canvas { max-height: 300px; }
.tables { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; padding: 0 32px 32px; }
.table-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.table-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
table { width: 100%; border-collapse: collapse; }
th { padding: 8px 12px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.5); }
.pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.pill-blue { background: rgba(56,189,248,0.15); color: var(--accent); }
.pill-green { background: rgba(74,222,128,0.15); color: var(--green); }
.pill-amber { background: rgba(251,191,36,0.15); color: var(--amber); }
.pill-purple { background: rgba(167,139,250,0.15); color: var(--purple); }
.loading { text-align: center; padding: 80px; color: var(--muted); font-size: 16px; }
.error { color: var(--rose); }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; padding: 0 32px 24px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.kpi-card h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
.kpi-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.kpi-row + .kpi-row { border-top: 1px solid rgba(51,65,85,0.5); }
.last-update { font-size: 11px; color: var(--muted); }
@media (max-width: 800px) { .charts, .tables, .kpi-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <h1>カルテ分析ダッシュボード</h1>
  <span class="badge" id="sourceBadge">読込中...</span>
  <span class="last-update" id="lastUpdate"></span>
  <button class="filter-btn" id="syncBtn" style="margin-left:8px;background:#4ade80;font-size:11px;padding:5px 14px;" onclick="runSync()">GAS→Supabase同期</button>
  <span class="last-update" id="syncStatus"></span>
  <a class="back" href="index.html">&larr; カルテに戻る</a>
</div>

<div class="date-filter" id="dateFilter">
  <label>集計期間:</label>
  <input type="date" id="dateFrom">
  <span style="color:var(--muted)">〜</span>
  <input type="date" id="dateTo">
  <button class="filter-btn" id="applyFilter">適用</button>
  <button class="reset-btn" id="resetFilter">全期間</button>
  <span class="range-info" id="rangeInfo"></span>
</div>

<div id="app" class="loading">データ読み込み中...</div>

<script>
Chart.register(ChartDataLabels);

const SB_URL = window.__SUPABASE_URL__;
const SB_KEY = window.__SUPABASE_ANON_KEY__;
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwWCL1aVy4RcCZsr2Wzrpy5JE8LU8pGWa2u_CY7qo7OGMgXrB0OZGir6rGJZiiV6hRd/exec';

let _allPatients = [], _allVisits = [], _allRx = [], _allDx = [];
let _dataSource = '';
let _charts = {};

loadDashboard();

async function loadDashboard() {
  try {
    let sbOk = false;

    // 1. Supabaseからデータ取得を試みる
    if (SB_URL && SB_KEY) {
      try {
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const [pRes, vRes, rxRes, dxRes] = await Promise.all([
          sb.from('patients').select('id,patient_no,name,sex,insurance_type,age,created_at').eq('clinic_id', 'nishiharu'),
          sb.from('visits').select('id,patient_id,visit_date,visit_type,status,revenue_points,self_pay,doctor,department').eq('clinic_id', 'nishiharu'),
          sb.from('prescriptions').select('id,visit_id,drug_name,quantity,days'),
          sb.from('diseases_assigned').select('id,visit_id,disease_name,disease_code')
        ]);
        const sbPatients = pRes.data || [];
        const sbVisits = vRes.data || [];
        // visitsが1件以上あればSupabaseデータを使う
        if (sbVisits.length > 0) {
          _allPatients = sbPatients;
          _allVisits = sbVisits;
          _allRx = rxRes.data || [];
          _allDx = dxRes.data || [];
          _dataSource = 'Supabase';
          sbOk = true;
        }
      } catch (sbErr) {
        console.warn('[Supabase] 取得失敗、GAS APIにフォールバック:', sbErr);
      }
    }

    // 2. Supabaseにvisitsがなければ GAS API からデータ取得
    if (!sbOk) {
      const res = await fetch(GAS_API_URL + '?action=all');
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'GAS API error');

      const gasResult = convertGasData(data);
      _allPatients = gasResult.patients;
      _allVisits = gasResult.visits;
      _allRx = gasResult.prescriptions;
      _allDx = gasResult.diseases;
      _dataSource = 'GAS DB';
    }

    document.getElementById('lastUpdate').textContent =
      '最終取得: ' + new Date().toLocaleString('ja-JP') + '（' + _dataSource + '）';
    const badge = document.getElementById('sourceBadge');
    badge.textContent = _dataSource === 'Supabase' ? 'Supabase Live' : 'GAS DB';
    if (_dataSource !== 'Supabase') badge.style.background = '#4ade80';

    // 日付範囲の初期値を設定
    const dates = _allVisits.map(v => v.visit_date).filter(Boolean).sort();
    if (dates.length > 0) {
      document.getElementById('dateFrom').value = dates[0];
      document.getElementById('dateTo').value = new Date().toISOString().split('T')[0];
    }

    renderDashboard(_allPatients, _allVisits, _allRx, _allDx);
    setupFilterEvents();
  } catch (e) {
    document.getElementById('app').innerHTML = '<span class="error">エラー: ' + e.message + '</span>';
  }
}

// GAS APIレスポンスをanalytics用の形式に変換
function convertGasData(data) {
  const gasPats = data.patients || [];
  const gasRx = data.prescriptions || [];

  // M/D形式 → ISO日付変換（年度跨ぎ対応: 1-3月は翌年扱い）
  const now = new Date();
  const baseYear = now.getFullYear();
  function mdToIso(md) {
    if (!md) return '';
    if (md.includes('-')) return md; // 既にISO形式
    const parts = String(md).split('/');
    if (parts.length !== 2) return '';
    const m = parseInt(parts[0]);
    const d = parseInt(parts[1]);
    if (isNaN(m) || isNaN(d)) return '';
    // 4月始まり年度: 月が1-3なら翌年の可能性。現在月と比較
    let year = baseYear;
    if (m >= 10 && now.getMonth() + 1 <= 3) year = baseYear - 1;
    return year + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
  }

  // 年齢パース: "3~5" → 4, "19~29" → 24, "30代" → 35, 数字→そのまま
  function parseAge(ageStr) {
    const s = String(ageStr || '');
    if (/^\d+$/.test(s)) return parseInt(s);
    const range = s.match(/(\d+)~(\d+)/);
    if (range) return Math.round((parseInt(range[1]) + parseInt(range[2])) / 2);
    const decade = s.match(/(\d+)代/);
    if (decade) return parseInt(decade[1]) + 5;
    return 0;
  }

  // 陽性判定: "陽性"のみtrue
  function isPositive(val) { return val === '陽性'; }

  // 患者をユニーク名でグループ化
  const patientMap = {};
  gasPats.forEach(p => {
    const name = (p.name || '').replace(/\s+/g, '');
    if (!patientMap[name]) {
      patientMap[name] = {
        id: name,
        name: name,
        sex: (p.sex || '').replace(/性$/, '') || '不明',
        age: parseAge(p.age),
        insurance_type: p.insurance || '不明',
        created_at: null
      };
    }
  });
  const patients = Object.values(patientMap);

  // 来院レコードをvisits形式に変換
  const visits = gasPats.map((p, i) => ({
    id: 'gas-v-' + i,
    patient_id: (p.name || '').replace(/\s+/g, ''),
    visit_date: mdToIso(p.date),
    visit_type: p.type || null,
    status: 'done',
    revenue_points: p.revenuePoints || 0,
    self_pay: p.selfPay || 0,
    doctor: p.doctor || '不明',
    department: '内科'
  }));

  // 処方レコード変換
  const prescriptions = [];
  gasRx.forEach((rec, ri) => {
    if (!rec.rx || !rec.rx.length) return;
    const normName = (rec.name || '').replace(/\s+/g, '');
    const matchVisit = visits.find(v => v.patient_id === normName);
    const visitId = matchVisit ? matchVisit.id : 'gas-v-unknown-' + ri;
    rec.rx.forEach((r, j) => {
      const drugName = typeof r === 'object' ? (r.drug || '') : String(r);
      if (!drugName) return;
      prescriptions.push({
        id: 'gas-rx-' + ri + '-' + j,
        visit_id: visitId,
        drug_name: drugName,
        quantity: typeof r === 'object' ? (r.qty || 0) : 0,
        days: 0
      });
    });
  });

  // 傷病名（COVID/flu/strep 陽性のみ）
  const diseases = [];
  gasPats.forEach((p, i) => {
    const visitId = 'gas-v-' + i;
    if (isPositive(p.covid)) diseases.push({ id: 'gas-dx-' + i + '-c', visit_id: visitId, disease_name: 'COVID-19', disease_code: '' });
    if (isPositive(p.flu)) diseases.push({ id: 'gas-dx-' + i + '-f', visit_id: visitId, disease_name: 'インフルエンザ', disease_code: '' });
    if (isPositive(p.strep)) diseases.push({ id: 'gas-dx-' + i + '-s', visit_id: visitId, disease_name: '溶連菌感染症', disease_code: '' });
  });

  return { patients, visits, prescriptions, diseases };
}

function setupFilterEvents() {
  document.getElementById('applyFilter').addEventListener('click', applyDateFilter);
  document.getElementById('resetFilter').addEventListener('click', () => {
    const dates = _allVisits.map(v => v.visit_date).filter(Boolean).sort();
    if (dates.length > 0) {
      document.getElementById('dateFrom').value = dates[0];
      document.getElementById('dateTo').value = new Date().toISOString().split('T')[0];
    }
    applyDateFilter();
  });
}

function applyDateFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  let filteredVisits = _allVisits;
  if (from) filteredVisits = filteredVisits.filter(v => v.visit_date >= from);
  if (to) filteredVisits = filteredVisits.filter(v => v.visit_date <= to);

  // 該当visit_idに紐づく処方・傷病名もフィルタ
  const visitIds = new Set(filteredVisits.map(v => v.id));
  const filteredRx = _allRx.filter(r => visitIds.has(r.visit_id));
  const filteredDx = _allDx.filter(d => visitIds.has(d.visit_id));

  // 該当patient_idに紐づく患者もフィルタ
  const patientIds = new Set(filteredVisits.map(v => v.patient_id));
  const filteredPatients = _allPatients.filter(p => patientIds.has(p.id));

  const info = document.getElementById('rangeInfo');
  info.textContent = `${from || '---'} 〜 ${to || '---'}（受診 ${filteredVisits.length}件 / 患者 ${filteredPatients.length}人）`;

  // 既存チャートを破棄
  Object.values(_charts).forEach(c => c.destroy());
  _charts = {};

  renderDashboard(filteredPatients, filteredVisits, filteredRx, filteredDx);
}

// Chart.js datalabels 共通設定
const dlBar = {
  display: true,
  anchor: 'end',
  align: 'top',
  color: '#e2e8f0',
  font: { size: 11, weight: 'bold' },
  formatter: v => v
};
const dlLine = {
  display: true,
  anchor: 'end',
  align: 'top',
  color: '#fbbf24',
  font: { size: 10, weight: 'bold' },
  formatter: v => v.toLocaleString()
};
const dlDoughnut = {
  display: true,
  color: '#fff',
  font: { size: 12, weight: 'bold' },
  formatter: (v, ctx) => {
    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
    const pct = total > 0 ? Math.round(v / total * 100) : 0;
    return v > 0 ? `${v} (${pct}%)` : '';
  }
};

function renderDashboard(patients, visits, prescriptions, diseases) {
  const totalPatients = patients.length;
  const totalVisits = visits.length;
  const totalPoints = visits.reduce((s, v) => s + (v.revenue_points || 0), 0);
  const totalRevenue = Math.round(totalPoints * 10);
  const totalSelfPay = visits.reduce((s, v) => s + (v.self_pay || 0), 0);
  const newVisits = visits.filter(v => v.visit_type === '新規').length;
  const revisits = visits.filter(v => v.visit_type === '再診').length;

  const sexCount = { '男': 0, '女': 0 };
  patients.forEach(p => { if (p.sex) { const s = p.sex.replace(/性$/, ''); if (s === '男' || s === '女') sexCount[s]++; } });

  const insCount = {};
  patients.forEach(p => { const k = p.insurance_type || '不明'; insCount[k] = (insCount[k] || 0) + 1; });

  const monthlyVisits = {};
  visits.forEach(v => { if (!v.visit_date) return; const m = v.visit_date.substring(0, 7); monthlyVisits[m] = (monthlyVisits[m] || 0) + 1; });
  const monthLabels = Object.keys(monthlyVisits).sort();
  const monthData = monthLabels.map(m => monthlyVisits[m]);

  const monthlyRevenue = {};
  visits.forEach(v => { if (!v.visit_date) return; const m = v.visit_date.substring(0, 7); monthlyRevenue[m] = (monthlyRevenue[m] || 0) + (v.revenue_points || 0) * 10; });
  const monthRevData = monthLabels.map(m => monthlyRevenue[m] || 0);

  const doctorCount = {};
  const doctorRevenue = {};
  visits.forEach(v => { const d = v.doctor || '不明'; doctorCount[d] = (doctorCount[d] || 0) + 1; doctorRevenue[d] = (doctorRevenue[d] || 0) + (v.revenue_points || 0) * 10; });
  const topDoctors = Object.entries(doctorCount).sort((a, b) => b[1] - a[1]);

  const dailyVisits = {};
  visits.forEach(v => { if (!v.visit_date) return; dailyVisits[v.visit_date] = (dailyVisits[v.visit_date] || 0) + 1; });
  const dayLabels = Object.keys(dailyVisits).sort();
  const dayData = dayLabels.map(d => dailyVisits[d]);

  const drugCount = {};
  prescriptions.forEach(rx => { drugCount[rx.drug_name] = (drugCount[rx.drug_name] || 0) + 1; });
  const topDrugs = Object.entries(drugCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  const dxCount = {};
  diseases.forEach(d => { dxCount[d.disease_name] = (dxCount[d.disease_name] || 0) + 1; });
  const topDx = Object.entries(dxCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  const avgPoints = totalVisits > 0 ? Math.round(totalPoints / totalVisits) : 0;

  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="label">対象患者数</div><div class="value accent">${totalPatients}</div><div class="sub">男 ${sexCount['男']} / 女 ${sexCount['女']}</div></div>
      <div class="stat-card"><div class="label">受診件数</div><div class="value green">${totalVisits}</div><div class="sub">新規 ${newVisits} / 再診 ${revisits}</div></div>
      <div class="stat-card"><div class="label">概算診療報酬</div><div class="value amber">&yen;${totalRevenue.toLocaleString()}</div><div class="sub">${totalPoints.toLocaleString()}点</div></div>
      <div class="stat-card"><div class="label">自費合計</div><div class="value purple">&yen;${totalSelfPay.toLocaleString()}</div><div class="sub">平均 ${avgPoints.toLocaleString()}点/件</div></div>
      <div class="stat-card"><div class="label">処方件数</div><div class="value">${prescriptions.length}</div><div class="sub">${topDrugs.length > 0 ? '最多: ' + topDrugs[0][0] : 'データ蓄積中'}</div></div>
      <div class="stat-card"><div class="label">傷病名件数</div><div class="value">${diseases.length}</div><div class="sub">${topDx.length > 0 ? '最多: ' + topDx[0][0] : 'データ蓄積中'}</div></div>
    </div>

    <div class="charts">
      <div class="chart-card"><h3>月別受診件数・収益</h3><canvas id="chartMonthly"></canvas></div>
      <div class="chart-card"><h3>日別受診件数</h3><canvas id="chartDaily"></canvas></div>
      <div class="chart-card"><h3>保険種別</h3><canvas id="chartInsurance"></canvas></div>
      <div class="chart-card"><h3>新規 / 再診 比率</h3><canvas id="chartVisitType"></canvas></div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <h3>医師別 受診件数・収益</h3>
        ${topDoctors.map(([name, count]) => {
          const pct = totalVisits > 0 ? Math.round(count / totalVisits * 100) : 0;
          const rev = doctorRevenue[name] || 0;
          return `<div class="kpi-row"><span>${name}</span><span><span class="pill pill-blue">${count}件 (${pct}%)</span> <span class="pill pill-amber">&yen;${rev.toLocaleString()}</span></span></div>`;
        }).join('')}
      </div>
      <div class="kpi-card">
        <h3>保険種別 内訳</h3>
        ${Object.entries(insCount).sort((a,b) => b[1]-a[1]).map(([type, count]) => {
          const pct = totalPatients > 0 ? Math.round(count / totalPatients * 100) : 0;
          return `<div class="kpi-row"><span>${type}</span><span><span class="pill pill-green">${count}人 (${pct}%)</span></span></div>`;
        }).join('')}
      </div>
      <div class="kpi-card">
        <h3>月別サマリー</h3>
        ${monthLabels.map(m => {
          const cnt = monthlyVisits[m];
          const rev = monthlyRevenue[m] || 0;
          return `<div class="kpi-row"><span>${m}</span><span><span class="pill pill-blue">${cnt}件</span> <span class="pill pill-amber">&yen;${rev.toLocaleString()}</span></span></div>`;
        }).join('')}
      </div>
    </div>

    ${topDrugs.length > 0 || topDx.length > 0 ? `
    <div class="tables">
      <div class="table-section">
        <h3>処方薬ランキング TOP10</h3>
        <table><tr><th>#</th><th>薬品名</th><th>処方回数</th></tr>
        ${topDrugs.map((d, i) => `<tr><td>${i+1}</td><td>${d[0]}</td><td><span class="pill pill-blue">${d[1]}</span></td></tr>`).join('')}
        ${topDrugs.length === 0 ? '<tr><td colspan="3" style="color:var(--muted)">データ蓄積中</td></tr>' : ''}
        </table>
      </div>
      <div class="table-section">
        <h3>傷病名ランキング TOP10</h3>
        <table><tr><th>#</th><th>傷病名</th><th>件数</th></tr>
        ${topDx.map((d, i) => `<tr><td>${i+1}</td><td>${d[0]}</td><td><span class="pill pill-green">${d[1]}</span></td></tr>`).join('')}
        ${topDx.length === 0 ? '<tr><td colspan="3" style="color:var(--muted)">データ蓄積中</td></tr>' : ''}
        </table>
      </div>
    </div>` : ''}

    <div style="padding: 0 32px 32px;">
      <div class="table-section"><h3>性別比</h3><canvas id="chartSex" style="max-height:200px;"></canvas></div>
    </div>
  `;

  // === Charts ===
  const gridColor = '#1e293b';

  // 月別（複合: 棒 + 折れ線）
  if (monthLabels.length > 0) {
    _charts.monthly = new Chart(document.getElementById('chartMonthly'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [
          { label: '受診件数', data: monthData, backgroundColor: 'rgba(56,189,248,0.6)', borderColor: '#38bdf8', borderWidth: 1, yAxisID: 'y',
            datalabels: dlBar },
          { label: '収益(万円)', data: monthRevData.map(v => Math.round(v / 10000)), type: 'line', borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.1)', fill: true, tension: 0.3, yAxisID: 'y1', pointRadius: 4, pointBackgroundColor: '#fbbf24',
            datalabels: dlLine }
        ]
      },
      options: {
        responsive: true,
        layout: { padding: { top: 24 } },
        plugins: { legend: { labels: { color: '#94a3b8' } }, datalabels: {} },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: gridColor } },
          y: { position: 'left', ticks: { color: '#38bdf8' }, grid: { color: gridColor }, title: { display: true, text: '件数', color: '#38bdf8' } },
          y1: { position: 'right', ticks: { color: '#fbbf24' }, grid: { display: false }, title: { display: true, text: '万円', color: '#fbbf24' } }
        }
      }
    });
  }

  // 日別
  if (dayLabels.length > 0) {
    _charts.daily = new Chart(document.getElementById('chartDaily'), {
      type: 'bar',
      data: { labels: dayLabels.map(d => d.substring(5)), datasets: [{ label: '受診件数', data: dayData, backgroundColor: 'rgba(74,222,128,0.5)', borderColor: '#4ade80', borderWidth: 1,
        datalabels: { display: true, anchor: 'end', align: 'top', color: '#e2e8f0', font: { size: 10, weight: 'bold' }, formatter: v => v }
      }] },
      options: {
        responsive: true,
        layout: { padding: { top: 20 } },
        plugins: { legend: { display: false }, datalabels: {} },
        scales: { x: { ticks: { color: '#94a3b8', maxRotation: 60, font: { size: 10 } }, grid: { color: gridColor } }, y: { ticks: { color: '#94a3b8' }, grid: { color: gridColor } } }
      }
    });
  }

  // 保険種別
  const insLabels = Object.keys(insCount);
  const insData = insLabels.map(k => insCount[k]);
  _charts.insurance = new Chart(document.getElementById('chartInsurance'), {
    type: 'doughnut',
    data: { labels: insLabels, datasets: [{ data: insData, backgroundColor: ['#38bdf8', '#4ade80', '#fbbf24', '#fb7185', '#a78bfa'], datalabels: dlDoughnut }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#94a3b8' } }, datalabels: {} } }
  });

  // 新規/再診
  _charts.visitType = new Chart(document.getElementById('chartVisitType'), {
    type: 'doughnut',
    data: { labels: ['新規', '再診'], datasets: [{ data: [newVisits, revisits], backgroundColor: ['#38bdf8', '#a78bfa'], datalabels: dlDoughnut }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#94a3b8' } }, datalabels: {} } }
  });

  // 性別比
  _charts.sex = new Chart(document.getElementById('chartSex'), {
    type: 'doughnut',
    data: { labels: ['男性', '女性'], datasets: [{ data: [sexCount['男'], sexCount['女']], backgroundColor: ['#38bdf8', '#fb7185'], datalabels: dlDoughnut }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#94a3b8' } }, datalabels: {} } }
  });
}

// ===== GAS → Supabase 差分同期 =====

const SYNC_GAS_URL = GAS_API_URL;

function syncStatus(msg, isError) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = isError ? 'var(--rose)' : 'var(--green)';
}

function mdToIso(md) {
  if (!md) return null;
  if (md.includes('-')) return md;
  const parts = String(md).split('/');
  if (parts.length !== 2) return null;
  const m = parseInt(parts[0]), d = parseInt(parts[1]);
  if (isNaN(m) || isNaN(d)) return null;
  const now = new Date();
  let year = now.getFullYear();
  if (m >= 10 && now.getMonth() + 1 <= 3) year--;
  return year + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}

function parseAge(s) {
  s = String(s || '');
  if (/^\d+$/.test(s)) return parseInt(s);
  const r = s.match(/(\d+)~(\d+)/);
  if (r) return Math.round((parseInt(r[1]) + parseInt(r[2])) / 2);
  const d = s.match(/(\d+)代/);
  if (d) return parseInt(d[1]) + 5;
  return null;
}

async function runSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = '同期中...';
  syncStatus('GAS API取得中...', false);

  try {
    if (!SB_URL || !SB_KEY) throw new Error('Supabase未設定');
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    // 1. GAS APIからデータ取得
    const res = await fetch(SYNC_GAS_URL + '?action=all');
    const gasData = await res.json();
    if (!gasData.success) throw new Error('GAS API: ' + (gasData.error || 'unknown'));
    const gasPats = gasData.patients || [];
    const gasRx = gasData.prescriptions || [];
    syncStatus('GAS: ' + gasPats.length + '件取得', false);

    // 2. Supabase既存データ取得
    const { data: sbPatients } = await sb.from('patients').select('id,name,patient_no').eq('clinic_id', 'nishiharu');
    const { data: sbVisits } = await sb.from('visits').select('id,patient_id,visit_date').eq('clinic_id', 'nishiharu');

    // 名前→UUID, 既存visit判定用Set
    const nameToId = {};
    sbPatients.forEach(p => { nameToId[p.name.replace(/\s+/g, '')] = p.id; });
    const existingVisitKeys = new Set(sbVisits.map(v => v.patient_id + '|' + v.visit_date));

    // 3. 新規患者を作成
    let newPatCount = 0;
    const newPatNames = [];
    for (const gp of gasPats) {
      const norm = (gp.name || '').replace(/\s+/g, '');
      if (!norm || nameToId[norm]) continue;
      newPatNames.push(norm);
    }
    const uniqueNewPats = [...new Set(newPatNames)];
    for (const norm of uniqueNewPats) {
      const gp = gasPats.find(p => (p.name || '').replace(/\s+/g, '') === norm);
      const { data, error } = await sb.from('patients').insert({
        clinic_id: 'nishiharu',
        name: norm,
        sex: (gp.sex || '').replace(/性$/, '') || '不明',
        age: parseAge(gp.age),
        insurance_type: gp.insurance || '不明',
        address: gp.area || null
      }).select('id').single();
      if (!error && data) { nameToId[norm] = data.id; newPatCount++; }
    }

    // 4. 新規visitsを差分投入
    const newVisitRows = [];
    gasPats.forEach(gp => {
      const norm = (gp.name || '').replace(/\s+/g, '');
      const patId = nameToId[norm];
      if (!patId) return;
      const vd = mdToIso(gp.date);
      if (!vd) return;
      const key = patId + '|' + vd;
      if (existingVisitKeys.has(key)) return;
      existingVisitKeys.add(key); // 同バッチ内重複防止
      newVisitRows.push({
        clinic_id: 'nishiharu', patient_id: patId, visit_date: vd,
        visit_type: gp.type === '新規' ? '新規' : '再診',
        status: 'done', revenue_points: gp.revenuePoints || 0,
        self_pay: gp.selfPay || 0, doctor: gp.doctor || null,
        department: '内科',
        covid_positive: gp.covid === '陽性', flu_positive: gp.flu === '陽性',
        strep_positive: gp.strep === '陽性', route: gp.route || null
      });
    });

    let newVisitCount = 0;
    for (let i = 0; i < newVisitRows.length; i += 50) {
      const batch = newVisitRows.slice(i, i + 50);
      const { data, error } = await sb.from('visits').insert(batch).select('id');
      if (!error && data) newVisitCount += data.length;
    }

    // 5. 新規visitsに紐づく処方・傷病名を投入
    let newRxCount = 0, newDxCount = 0;
    if (newVisitCount > 0) {
      // 最新のvisitを再取得（UUIDが必要）
      const { data: allVisitsNow } = await sb.from('visits').select('id,patient_id,visit_date').eq('clinic_id', 'nishiharu');
      const visitMap = {};
      allVisitsNow.forEach(v => { visitMap[v.patient_id + '|' + v.visit_date] = v.id; });

      // 処方
      const rxRows = [];
      gasRx.forEach(rec => {
        if (!rec.rx || !rec.rx.length) return;
        const norm = (rec.name || '').replace(/\s+/g, '');
        const patId = nameToId[norm];
        if (!patId) return;
        const gp = gasPats.find(p => (p.name || '').replace(/\s+/g, '') === norm);
        const vd = gp ? mdToIso(gp.date) : null;
        const visitId = vd ? visitMap[patId + '|' + vd] : null;
        if (!visitId) return;
        // 新規visitのみ
        if (!newVisitRows.some(nv => nv.patient_id === patId && nv.visit_date === vd)) return;
        rec.rx.forEach((r, j) => {
          const drugName = typeof r === 'object' ? (r.drug || '') : String(r);
          if (!drugName) return;
          rxRows.push({ visit_id: visitId, drug_name: drugName, quantity: typeof r === 'object' ? parseFloat(r.qty) || 0 : 0, unit: 'T', sort_order: j });
        });
      });
      for (let i = 0; i < rxRows.length; i += 50) {
        const batch = rxRows.slice(i, i + 50);
        const { data } = await sb.from('prescriptions').insert(batch).select('id');
        if (data) newRxCount += data.length;
      }

      // 傷病名
      const dxRows = [];
      gasPats.forEach(gp => {
        const norm = (gp.name || '').replace(/\s+/g, '');
        const patId = nameToId[norm];
        if (!patId) return;
        const vd = mdToIso(gp.date);
        if (!vd) return;
        if (!newVisitRows.some(nv => nv.patient_id === patId && nv.visit_date === vd)) return;
        const visitId = visitMap[patId + '|' + vd];
        if (!visitId) return;
        if (gp.covid === '陽性') dxRows.push({ visit_id: visitId, disease_name: 'COVID-19', disease_code: 'U07.1' });
        if (gp.flu === '陽性') dxRows.push({ visit_id: visitId, disease_name: 'インフルエンザ', disease_code: 'J11' });
        if (gp.strep === '陽性') dxRows.push({ visit_id: visitId, disease_name: '溶連菌感染症', disease_code: 'A49.1' });
      });
      if (dxRows.length > 0) {
        const { data } = await sb.from('diseases_assigned').insert(dxRows).select('id');
        if (data) newDxCount = data.length;
      }
    }

    // 6. 結果表示
    const msg = newVisitCount === 0 && newPatCount === 0
      ? '最新です（差分なし）'
      : `同期完了: 患者+${newPatCount} 受診+${newVisitCount} 処方+${newRxCount} 傷病名+${newDxCount}`;
    syncStatus(msg, false);

    // 差分があればダッシュボード再描画
    if (newVisitCount > 0 || newPatCount > 0) {
      setTimeout(() => location.reload(), 1500);
    }

  } catch (e) {
    syncStatus('同期エラー: ' + e.message, true);
    console.error('[Sync]', e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'GAS→Supabase同期';
  }
}
</script>
