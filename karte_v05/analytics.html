<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテ分析ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="config.js"></script>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --green: #4ade80;
  --amber: #fbbf24;
  --rose: #fb7185;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { padding: 24px 32px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .badge { background: var(--accent); color: #0f172a; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.header .back { color: var(--muted); text-decoration: none; font-size: 13px; margin-left: auto; }
.header .back:hover { color: var(--text); }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-card .value { font-size: 32px; font-weight: 800; }
.stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; padding: 0 32px 32px; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
.chart-card canvas { max-height: 300px; }
.table-section { padding: 0 32px 32px; }
.table-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
th { background: #0f172a; padding: 10px 16px; text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 13px; }
.loading { text-align: center; padding: 80px; color: var(--muted); font-size: 16px; }
.error { color: var(--rose); }
.pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.pill-green { background: rgba(74,222,128,0.15); color: var(--green); }
.pill-amber { background: rgba(251,191,36,0.15); color: var(--amber); }
.pill-blue { background: rgba(56,189,248,0.15); color: var(--accent); }
@media (max-width: 800px) { .charts { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <h1>カルテ分析ダッシュボード</h1>
  <span class="badge">Supabase</span>
  <a class="back" href="index.html">← カルテに戻る</a>
</div>

<div id="app" class="loading">データ読み込み中...</div>

<script>
const SB_URL = window.__SUPABASE_URL__;
const SB_KEY = window.__SUPABASE_ANON_KEY__;

if (!SB_URL || !SB_KEY) {
  document.getElementById('app').innerHTML = '<span class="error">config.js が読み込めません</span>';
} else {
  const sb = window.supabase.createClient(SB_URL, SB_KEY);
  loadDashboard(sb);
}

async function loadDashboard(sb) {
  try {
    const [pRes, vRes, rxRes, dxRes] = await Promise.all([
      sb.from('patients').select('id,patient_no,name,sex,insurance_type,age,created_at').eq('clinic_id', 'nishiharu'),
      sb.from('visits').select('id,patient_id,visit_date,visit_type,status,revenue_points,self_pay,doctor').eq('clinic_id', 'nishiharu'),
      sb.from('prescriptions').select('id,visit_id,drug_name,quantity,days'),
      sb.from('diseases_assigned').select('id,visit_id,disease_name,disease_code')
    ]);

    const patients = pRes.data || [];
    const visits = vRes.data || [];
    const prescriptions = rxRes.data || [];
    const diseases = dxRes.data || [];

    renderDashboard(patients, visits, prescriptions, diseases);
  } catch (e) {
    document.getElementById('app').innerHTML = '<span class="error">エラー: ' + e.message + '</span>';
  }
}

function renderDashboard(patients, visits, prescriptions, diseases) {
  // === 統計計算 ===
  const totalPatients = patients.length;
  const totalVisits = visits.length;
  const completedVisits = visits.filter(v => v.status === 'completed').length;
  const totalPoints = visits.reduce((s, v) => s + (v.revenue_points || 0), 0);
  const totalRevenue = Math.round(totalPoints * 10); // 1点=10円

  // 性別分布
  const sexCount = { '男': 0, '女': 0, '不明': 0 };
  patients.forEach(p => { sexCount[p.sex] = (sexCount[p.sex] || 0) + 1; });

  // 保険種別
  const insCount = {};
  patients.forEach(p => { const k = p.insurance_type || '不明'; insCount[k] = (insCount[k] || 0) + 1; });

  // 月別受診件数
  const monthlyVisits = {};
  visits.forEach(v => {
    if (!v.visit_date) return;
    const m = v.visit_date.substring(0, 7);
    monthlyVisits[m] = (monthlyVisits[m] || 0) + 1;
  });
  const monthLabels = Object.keys(monthlyVisits).sort();
  const monthData = monthLabels.map(m => monthlyVisits[m]);

  // 処方薬ランキング
  const drugCount = {};
  prescriptions.forEach(rx => { const k = rx.drug_name; drugCount[k] = (drugCount[k] || 0) + 1; });
  const topDrugs = Object.entries(drugCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  // 傷病名ランキング
  const dxCount = {};
  diseases.forEach(d => { const k = d.disease_name; dxCount[k] = (dxCount[k] || 0) + 1; });
  const topDx = Object.entries(dxCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  // 年齢分布
  const ageBins = { '0-9': 0, '10-19': 0, '20-29': 0, '30-39': 0, '40-49': 0, '50-59': 0, '60-69': 0, '70-79': 0, '80-89': 0, '90+': 0 };
  patients.forEach(p => {
    const a = p.age;
    if (a == null) return;
    if (a >= 90) ageBins['90+']++;
    else if (a >= 80) ageBins['80-89']++;
    else if (a >= 70) ageBins['70-79']++;
    else if (a >= 60) ageBins['60-69']++;
    else if (a >= 50) ageBins['50-59']++;
    else if (a >= 40) ageBins['40-49']++;
    else if (a >= 30) ageBins['30-39']++;
    else if (a >= 20) ageBins['20-29']++;
    else if (a >= 10) ageBins['10-19']++;
    else ageBins['0-9']++;
  });

  // === HTML描画 ===
  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="label">総患者数</div><div class="value">${totalPatients}</div><div class="sub">男 ${sexCount['男']} / 女 ${sexCount['女']}</div></div>
      <div class="stat-card"><div class="label">総受診件数</div><div class="value">${totalVisits}</div><div class="sub">確定 ${completedVisits} / 一時保存 ${totalVisits - completedVisits}</div></div>
      <div class="stat-card"><div class="label">総処方件数</div><div class="value">${prescriptions.length}</div><div class="sub">${topDrugs.length > 0 ? '最多: ' + topDrugs[0][0] : ''}</div></div>
      <div class="stat-card"><div class="label">概算診療報酬</div><div class="value">¥${totalRevenue.toLocaleString()}</div><div class="sub">${totalPoints.toLocaleString()}点 (1点=10円)</div></div>
    </div>
    <div class="charts">
      <div class="chart-card"><h3>月別受診件数</h3><canvas id="chartMonthly"></canvas></div>
      <div class="chart-card"><h3>保険種別</h3><canvas id="chartInsurance"></canvas></div>
      <div class="chart-card"><h3>年齢分布</h3><canvas id="chartAge"></canvas></div>
      <div class="chart-card"><h3>性別比</h3><canvas id="chartSex"></canvas></div>
    </div>
    <div class="table-section">
      <h3>処方薬ランキング TOP10</h3>
      <table>
        <tr><th>#</th><th>薬品名</th><th>処方回数</th></tr>
        ${topDrugs.map((d, i) => `<tr><td>${i + 1}</td><td>${d[0]}</td><td><span class="pill pill-blue">${d[1]}</span></td></tr>`).join('')}
        ${topDrugs.length === 0 ? '<tr><td colspan="3" style="color:var(--muted)">データなし</td></tr>' : ''}
      </table>
    </div>
    <div class="table-section">
      <h3>傷病名ランキング TOP10</h3>
      <table>
        <tr><th>#</th><th>傷病名</th><th>件数</th></tr>
        ${topDx.map((d, i) => `<tr><td>${i + 1}</td><td>${d[0]}</td><td><span class="pill pill-green">${d[1]}</span></td></tr>`).join('')}
        ${topDx.length === 0 ? '<tr><td colspan="3" style="color:var(--muted)">データなし</td></tr>' : ''}
      </table>
    </div>
  `;

  // === Chart.js ===
  const chartOpts = { responsive: true, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: {} };
  const barOpts = { ...chartOpts, scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } } } };

  // 月別受診
  if (monthLabels.length > 0) {
    new Chart(document.getElementById('chartMonthly'), {
      type: 'bar', data: { labels: monthLabels, datasets: [{ label: '受診件数', data: monthData, backgroundColor: 'rgba(56,189,248,0.6)', borderColor: '#38bdf8', borderWidth: 1 }] }, options: barOpts
    });
  }

  // 保険種別
  const insLabels = Object.keys(insCount);
  const insData = insLabels.map(k => insCount[k]);
  new Chart(document.getElementById('chartInsurance'), {
    type: 'doughnut', data: { labels: insLabels, datasets: [{ data: insData, backgroundColor: ['#38bdf8', '#4ade80', '#fbbf24', '#fb7185', '#a78bfa', '#94a3b8'] }] }, options: chartOpts
  });

  // 年齢分布
  const ageLabels = Object.keys(ageBins);
  const ageData = ageLabels.map(k => ageBins[k]);
  new Chart(document.getElementById('chartAge'), {
    type: 'bar', data: { labels: ageLabels, datasets: [{ label: '人数', data: ageData, backgroundColor: 'rgba(74,222,128,0.6)', borderColor: '#4ade80', borderWidth: 1 }] }, options: barOpts
  });

  // 性別比
  new Chart(document.getElementById('chartSex'), {
    type: 'doughnut', data: { labels: ['男性', '女性', '不明'], datasets: [{ data: [sexCount['男'], sexCount['女'], sexCount['不明']], backgroundColor: ['#38bdf8', '#fb7185', '#94a3b8'] }] }, options: chartOpts
  });
}
</script>
</body>
</html>
