<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受付ライブボード｜予約統括システム</title>
<link rel="stylesheet" href="style.css">
<style>
  .admin-view{ display:none; }
  .admin-view.active{ display:block; }
  .placeholder-box{ text-align:center; padding:48px 20px; color:var(--sub); }
  .placeholder-box .pi{ font-size:15px; font-weight:700; color:var(--dark); margin-bottom:8px; }
  .placeholder-box .avail{ margin-top:16px; font-size:13px; }
  .avail-list{ display:inline-flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  .avail-list a{ font-size:12.5px; color:var(--blue); text-decoration:none; border:1px solid var(--border); border-radius:6px; padding:6px 12px; cursor:pointer; }
  .avail-list a:hover{ background:var(--blue-light); }
  .nf-times{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .slot-grid-day{ margin-bottom:14px; }
  .slot-grid-day .d{ font-weight:700; margin-bottom:6px; }
  .slot-cap{ display:inline-flex; flex-direction:column; align-items:center; min-width:66px; border:1px solid var(--border); border-radius:8px; padding:6px 4px; font-size:13px; }
  .slot-cap.full{ background:#f3f4f6; color:#9ca3af; }
  .slot-cap .rem{ font-size:11px; color:var(--sub); }
  /* クリニック切替（受付側・暗色ヘッダー内） */
  .clinic-switch{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:9px; }
  .clinic-switch .cs-label{ font-size:12px; color:#94a3b8; margin-right:2px; }
  .clinic-pill{ font:inherit; font-size:13px; color:#e2e8f0; background:#334155; border:1px solid #475569; border-radius:999px; padding:5px 15px; cursor:pointer; }
  .clinic-pill:hover{ background:#3f4d63; color:#fff; }
  .clinic-pill.active{ background:#fff; color:var(--dark); font-weight:700; border-color:#fff; }
  .clinic-pill small{ font-size:10px; opacity:.7; margin-left:4px; font-weight:400; }
  /* 診察室バッジ */
  .room-badge{ display:inline-block; font-size:11.5px; font-weight:700; color:#0e7490; background:#cffafe; border:1px solid #a5f3fc; border-radius:6px; padding:1px 8px; white-space:nowrap; }
  .room-badge.r2{ color:#7c3aed; background:#ede9fe; border-color:#ddd6fe; }
  /* 診察室 切替プルダウン */
  .room-sel{ font:inherit; font-size:12.5px; font-weight:700; color:#0e7490; background:#ecfeff; border:1px solid #a5f3fc; border-radius:7px; padding:4px 6px; cursor:pointer; }
  .room-sel.r2{ color:#7c3aed; background:#f5f3ff; border-color:#ddd6fe; }
  .room-sel:focus{ outline:2px solid var(--blue-light); }
</style>
</head>
<body>
<header class="admin-header">
  <div class="admin-header-top">
    <span class="brand">予約統括システム 受付ボード <small>リアルタイム同期</small></span>
    <span style="display:flex;gap:14px;align-items:center">
      <span class="latency" id="latency">同期待機中…</span>
      <a class="to-patient" href="index.html" target="_blank">患者向けサイトを開く ↗</a>
    </span>
  </div>
  <div class="clinic-switch" id="clinicSwitch"></div>
  <nav class="admin-tabs" id="adminTabs">
    <a class="tab active" data-tab="board" onclick="showAdminTab('board')">日別ボード</a>
    <a class="tab" data-tab="list" onclick="showAdminTab('list')">予約一覧</a>
    <a class="tab" data-tab="new" onclick="showAdminTab('new')">電話予約の代理入力</a>
    <a class="tab" data-tab="slots" onclick="showAdminTab('slots')">予約枠の確認</a>
    <a class="tab" data-tab="menus" onclick="showAdminTab('menus')">美容メニュー</a>
    <a class="tab" data-tab="staff" onclick="showAdminTab('staff')">スタッフ</a>
    <a class="tab" data-tab="import" onclick="showAdminTab('import')">CSV取り込み</a>
  </nav>
</header>
<main>
  <!-- 日別ボード -->
  <div id="view-board" class="admin-view active">
    <div class="board-toolbar">
      <button class="secondary small" onclick="shift(-1)">‹ 前日</button>
      <input type="date" id="dateInput" onchange="setDate(this.value)">
      <button class="secondary small" onclick="shift(1)">翌日 ›</button>
      <span class="day" id="dayLabel"></span>
      <span style="margin-left:auto"><button class="small" onclick="resetDemo()">デモ初期化</button></span>
    </div>
    <div class="stat-row" id="stats"></div>
    <div id="board"></div>
  </div>

  <!-- 予約一覧 -->
  <div id="view-list" class="admin-view"></div>

  <!-- 電話予約の代理入力 -->
  <div id="view-new" class="admin-view"></div>

  <!-- 予約枠の確認 -->
  <div id="view-slots" class="admin-view"></div>

  <!-- 準備中 -->
  <div id="view-menus" class="admin-view"></div>
  <div id="view-staff" class="admin-view"></div>
  <div id="view-import" class="admin-view"></div>
</main>

<script>window.__RSV_SUPABASE__ = true;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="store.js"></script>
<script>
/* 受付ライブボード（タブ切替式）：患者予約が入った瞬間に日別ボード・予約一覧へ即反映 */
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

let curTab = "board";
let curDate = Store.todayStr();
let curClinic = 1;              // 表示中のクリニック（既定=西春）。demo.html右側はこれで切替
let prevCodes = new Set();

/* ---------------- クリニック切替（受付側の確認ウィンドウを院ごとに） ---------------- */
function curClinicObj(){ return Store.CLINICS.find(c=>c.id===curClinic) || Store.CLINICS[0]; }
function firstCsOfClinic(){ const c=curClinicObj(); return c && c.services[0] ? c.services[0].id : null; }
function inCurClinic(csId){ const c=Store.clinicOfCs(csId); return c && c.id===curClinic; }
function renderClinicSwitch(){
  const el=document.getElementById('clinicSwitch'); if(!el) return;
  el.innerHTML = '<span class="cs-label">クリニック：</span>' + Store.CLINICS.map(c=>
    `<button class="clinic-pill ${c.id===curClinic?'active':''}" onclick="setClinic(${c.id})">${esc(c.name)}${c.openingNote?'<small>開業前</small>':''}</button>`
  ).join("");
}
function setClinic(id){
  curClinic=id;
  nf.csId=null; slotsCs=null;          // 代理入力・枠確認の選択を新クリニックへ
  renderClinicSwitch();
  prevCodes = currentCodes();
  renderTab(curTab);
}

/* ---------------- タブ切替 ---------------- */
function showAdminTab(id){
  curTab = id;
  document.querySelectorAll('#adminTabs .tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
  document.querySelectorAll('.admin-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  renderTab(id);
}
function renderTab(id){
  if(id==="board") renderBoard();
  else if(id==="list") renderList();
  else if(id==="new") renderNew();
  else if(id==="slots") renderSlots();
  else if(id==="menus") renderPlaceholder("menus");
  else if(id==="staff") renderPlaceholder("staff");
  else if(id==="import") renderPlaceholder("import");
}

/* ---------------- 日別ボード ---------------- */
function setDate(d){ curDate = d; renderBoard(); }
function shift(n){ curDate = Store.addDays(curDate, n); renderBoard(); }
function clinicRows(date){ return Store.dayReservations(date).filter(r=>inCurClinic(r.csId)); }
function roomTag(r){ const rm=Store.roomName(r); return rm?`<span class="room-badge ${rm.endsWith("2")?"r2":""}">${esc(rm)}</span>`:'<span class="muted" style="font-size:12px">—</span>'; }
// 診察室の切替プルダウン（受付が任意に変更／相手がいれば入れ替え）
function roomSelect(r){
  const cur=Store.roomOf(r);
  const opts=Store.ROOMS.map(rm=>`<option value="${rm.id}" ${rm.id===cur?'selected':''}>${esc(rm.name)}</option>`).join("");
  return `<select class="room-sel ${cur===2?'r2':''}" title="診察室を変更" onchange="switchRoom('${esc(r.code)}', this.value)">${opts}</select>`;
}
async function switchRoom(code, roomId){
  const res=await Store.setRoom(code, roomId);
  if(!res.ok){ alert(res.error); }
  afterMutate();
}
function currentCodes(){ return new Set(clinicRows(curDate).map(r=>r.code)); }

function renderBoard(flashCodes){
  document.getElementById("dateInput").value = curDate;
  document.getElementById("dayLabel").textContent = Store.fmtJa(curDate);
  const clinic = curClinicObj();
  // 表示中クリニックの予約を、時刻→診察室 の順に整列
  const rows = clinicRows(curDate).slice().sort((a,b)=> a.time.localeCompare(b.time) || String(Store.roomName(a)).localeCompare(String(Store.roomName(b))));

  const total = rows.length, firstVisit = rows.filter(r=>r.visitType==="FIRST").length, web = rows.filter(r=>r.channel==="WEB").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="label">この日の予約</div></div>
    <div class="stat"><div class="num warn">${firstVisit}</div><div class="label">初診</div></div>
    <div class="stat"><div class="num">${web}</div><div class="label">Web予約</div></div>
    <div class="stat"><div class="num">${total-web}</div><div class="label">電話/その他</div></div>`;

  if(total===0){ document.getElementById("board").innerHTML = `<div class="card"><strong>${esc(clinic.name)}クリニック</strong>のこの日の予約はありません。${clinic.openingNote?`（${esc(clinic.openingNote)}）`:""}<br><span class="muted">患者向けサイトや「電話予約の代理入力」から予約すると、ここに即時反映されます。</span></div>`; return; }

  const trs = rows.map(r=>{
    const svc = Store.serviceOfCs(r.csId), menu = r.menuId ? Store.menuById(r.menuId) : null, isNew = flashCodes && flashCodes.has(r.code);
    return `<tr class="${isNew?"flash-new":""}">
      <td style="font-weight:700">${r.time}</td>
      <td>${roomSelect(r)}</td>
      <td>${esc(svc.name)}${menu?`<div class="muted" style="font-size:12px">${esc(menu.name)}</div>`:""}</td>
      <td>${esc(r.name)} 様${r.visitType==="FIRST"?'<span class="badge first" style="margin-left:4px">初診</span>':""}${isNew?'<span class="new-tag">NEW</span>':""}</td>
      <td>${r.channel==="WEB"?'<span class="badge web">Web</span>':'<span class="badge phone">電話</span>'}</td>
      <td><span class="muted" style="font-size:12px">${esc(r.phone)}</span></td>
      <td><button class="small secondary" onclick="markVisited('${esc(r.code)}')">来院</button> <button class="small danger" onclick="cancelRes('${esc(r.code)}')">取消</button></td>
    </tr>`;
  }).join("");
  document.getElementById("board").innerHTML = `<div class="card">
    <h2 style="margin-top:0">${esc(clinic.name)}クリニック（${rows.length}件）</h2>
    <table><thead><tr><th style="width:60px">時刻</th><th style="width:104px">診察室</th><th>内容</th><th>患者</th><th style="width:56px">経路</th><th>電話</th><th style="width:130px">操作</th></tr></thead>
    <tbody>${trs}</tbody></table>
  </div>`;
}

async function markVisited(code){ await Store.updateStatus(code, "VISITED"); afterMutate(); }
async function cancelRes(code){ if(!confirm("この予約を取り消しますか？")) return; await Store.updateStatus(code, "CANCELLED"); afterMutate(); }
async function resetDemo(){ await Store.resetDemo(); afterMutate(); }
function afterMutate(){ prevCodes = currentCodes(); renderTab(curTab); }

/* ---------------- 予約一覧（全日・全ステータス） ---------------- */
let listFilter = "ALL";
function setListFilter(f){ listFilter = f; renderList(); }
function renderList(){
  let all = Store.loadReservations().filter(r=>inCurClinic(r.csId)).sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
  if(listFilter!=="ALL") all = all.filter(r=>r.status===listFilter);
  const STATUS = { CONFIRMED:['予約確定','confirmed'], VISITED:['来院済','visited'], CANCELLED:['キャンセル','cancelled'], NO_SHOW:['不履行','no-show'] };
  const chips = [['ALL','すべて'],['CONFIRMED','予約確定'],['VISITED','来院済'],['CANCELLED','キャンセル']]
    .map(([v,l])=>`<span class="chip ${listFilter===v?'active':''}" onclick="setListFilter('${v}')">${l}</span>`).join("");
  const rows = all.map(r=>{
    const c=Store.clinicOfCs(r.csId), svc=Store.serviceOfCs(r.csId), menu=r.menuId?Store.menuById(r.menuId):null;
    const st = STATUS[r.status]||[r.status,'confirmed'];
    const rm = r.status==="CONFIRMED" ? Store.roomName(r) : "";
    return `<tr style="${r.status==='CANCELLED'?'opacity:.55':''}">
      <td style="white-space:nowrap">${Store.fmtJa(r.date)} ${r.time}</td>
      <td>${esc(c.name)}／${esc(svc.name)}${rm?` <span class="room-badge ${rm.endsWith("2")?"r2":""}">${esc(rm)}</span>`:""}${menu?`<div class="muted" style="font-size:12px">${esc(menu.name)}</div>`:""}</td>
      <td>${esc(r.name)} 様${r.visitType==="FIRST"?'<span class="badge first" style="margin-left:4px">初診</span>':""}<div class="muted" style="font-size:12px">${esc(r.phone)}</div></td>
      <td>${r.channel==="WEB"?'<span class="badge web">Web</span>':'<span class="badge phone">電話</span>'}</td>
      <td><span class="badge ${st[1]}">${st[0]}</span></td>
      <td>${r.status==="CONFIRMED"?`<button class="small secondary" onclick="markVisited('${esc(r.code)}')">来院</button> <button class="small danger" onclick="cancelRes('${esc(r.code)}')">取消</button>`:'<span class="muted" style="font-size:12px">—</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("view-list").innerHTML = `
    <h1>予約一覧<span class="muted" style="font-size:15px;font-weight:400;margin-left:8px">${esc(curClinicObj().name)}クリニック</span></h1>
    <div class="chips" style="margin-bottom:6px">${chips}</div>
    <div class="card" style="padding:0;overflow:auto">
      <table><thead><tr><th style="width:120px">日時</th><th>クリニック／区分</th><th>患者</th><th style="width:60px">経路</th><th style="width:96px">状態</th><th style="width:130px">操作</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--sub);padding:24px">該当する予約はありません。</td></tr>'}</tbody></table>
    </div>`;
}

/* ---------------- 電話予約の代理入力 ---------------- */
let nf = { csId:null, date:Store.todayStr(), time:null };
function csOptions(sel){
  const c=curClinicObj();
  return c.services.map(s=>
    `<option value="${s.id}" ${s.id==sel?'selected':''}>${esc(c.name)}クリニック ／ ${esc(s.name)}</option>`).join("");
}
function preparingCard(title){
  return `<h1>${esc(title)}<span class="muted" style="font-size:15px;font-weight:400;margin-left:8px">${esc(curClinicObj().name)}クリニック</span></h1>
    <div class="card placeholder-box"><div class="pi">このクリニックは開業前です（${esc(curClinicObj().openingNote||"準備中")}）</div>
    <div>開業後にこの画面から予約の代理入力・枠確認が行えます。上部のクリニック切替から開業中のクリニックをお選びください。</div></div>`;
}
function renderNew(){
  if(curClinicObj().openingNote){ document.getElementById("view-new").innerHTML = preparingCard("電話予約の代理入力"); return; }
  if(nf.csId==null || !inCurClinic(nf.csId)){ nf.csId=firstCsOfClinic(); }
  document.getElementById("view-new").innerHTML = `
    <h1>電話予約の代理入力</h1>
    <p class="muted">電話でお受けした予約を受付が代理入力します。登録すると日別ボード・予約一覧へ即時反映されます。</p>
    <div id="nfErr"></div>
    <div class="card">
      <div class="stack" style="max-width:560px">
        <label class="field">クリニック／診療区分
          <select id="nf_cs" onchange="nfChanged()">${csOptions(nf.csId)}</select>
        </label>
        <label class="field">希望日
          <input type="date" id="nf_date" value="${nf.date}" min="${Store.todayStr()}" onchange="nfChanged()">
        </label>
        <div class="field">空き時間<span class="req">必須</span>
          <div class="nf-times" id="nfTimes"></div>
        </div>
        <label class="field">お名前<span class="req">必須</span><input id="nf_name" placeholder="例）山田 花子"></label>
        <label class="field">フリガナ<input id="nf_kana" placeholder="例）ヤマダ ハナコ"></label>
        <label class="field">電話番号<span class="req">必須</span><input id="nf_phone" type="tel" placeholder="例）090-1234-5678"></label>
        <label class="field">生年月日<input id="nf_birth" type="date"></label>
        <div class="field">初診・再診<span class="req">必須</span>
          <div class="radio-row">
            <label><input type="radio" name="nfvt" value="FIRST">初めて（初診）</label>
            <label><input type="radio" name="nfvt" value="REVISIT">2回目以降（再診）</label>
          </div>
        </div>
      </div>
      <div class="cta-bar"><button onclick="nfSubmit()">この内容で予約する</button></div>
    </div>`;
  nfRefreshTimes();
}
function nfChanged(){ nf.time=null; nf.csId=Number(document.getElementById('nf_cs').value); nf.date=document.getElementById('nf_date').value; nfRefreshTimes(); }
function availTimes(csId, date){
  const days=Store.getDays(csId, 90); const d=days.find(x=>x.date===date);
  return d? d.slots.filter(s=>s.open && s.remaining>0) : [];
}
function nfRefreshTimes(){
  const times = availTimes(nf.csId, nf.date);
  const box=document.getElementById("nfTimes");
  if(!box) return;
  box.innerHTML = times.length ? times.map(s=>
    `<button type="button" class="time-chip ${nf.time===s.time?'selected':''}" onclick="nfPick('${s.time}')">${s.time}${s.remaining<=1?'<span class="rem">残1</span>':''}</button>`
  ).join("") : '<span class="muted">選択した日に空き枠がありません。別の日をお選びください。</span>';
}
function nfPick(t){ nf.time=t; nfRefreshTimes(); }
async function nfSubmit(){
  const err=(m)=>{ document.getElementById("nfErr").innerHTML=`<div class="alert">${esc(m)}</div>`; window.scrollTo(0,0); };
  const name=document.getElementById('nf_name').value.trim();
  const phone=document.getElementById('nf_phone').value.trim();
  const vt=(document.querySelector('input[name="nfvt"]:checked')||{}).value||"";
  if(!nf.time) return err("空き時間を選択してください。");
  if(!name||!phone) return err("お名前・電話番号は必須です。");
  if(!vt) return err("初診・再診を選択してください。");
  const btn=document.querySelector('#view-new .cta-bar button'); if(btn){btn.disabled=true;btn.textContent="登録中…";}
  const res=await Store.createReservation({
    csId:nf.csId, date:nf.date, time:nf.time, name, kana:document.getElementById('nf_kana').value.trim(),
    phone, birthDate:document.getElementById('nf_birth').value, visitType:vt, channel:"PHONE"
  });
  if(!res.ok){ if(btn){btn.disabled=false;btn.textContent="この内容で予約する";} return err(res.error); }
  // 成功 → その日を日別ボードで表示
  curDate=nf.date; nf.time=null;
  document.getElementById("view-new").innerHTML=`<div class="success">予約を登録しました（予約番号 ${esc(res.reservation.code)}）。日別ボードに反映されています。</div>`;
  setTimeout(()=>showAdminTab('board'), 900);
}

/* ---------------- 予約枠の確認（読み取り専用） ---------------- */
let slotsCs = null;
function renderSlots(){
  if(curClinicObj().openingNote){ document.getElementById("view-slots").innerHTML = preparingCard("予約枠の確認"); return; }
  if(slotsCs==null || !inCurClinic(slotsCs)){ slotsCs=firstCsOfClinic(); }
  const days=Store.getDays(slotsCs, 14);
  const body=days.map(d=>{
    if(!d.slots.length) return `<div class="slot-grid-day"><div class="d">${d.label}<span class="muted" style="font-weight:400;margin-left:8px">休診</span></div></div>`;
    const chips=d.slots.map(s=>`<span class="slot-cap ${s.remaining===0?'full':''}">${s.time}<span class="rem">空き ${s.remaining}/${s.capacity}室</span></span>`).join(" ");
    return `<div class="slot-grid-day"><div class="d">${d.label}</div>${chips}</div>`;
  }).join("");
  document.getElementById("view-slots").innerHTML = `
    <h1>予約枠の確認<span class="muted" style="font-size:15px;font-weight:400;margin-left:8px">${esc(curClinicObj().name)}クリニック</span></h1>
    <p class="muted">診療時間マスタから自動生成された枠の空き状況です（今後2週間）。各時間帯は<strong>診察室1・診察室2の2室</strong>を用意しています。<br>※プロトタイプでは閲覧のみ。枠の停止・定員変更・臨時休診の編集は今後実装予定です。</p>
    <div class="card">
      <label class="field" style="max-width:400px;margin-bottom:14px">クリニック／診療区分
        <select onchange="slotsCs=Number(this.value);renderSlots()">${csOptions(slotsCs)}</select>
      </label>
      ${body}
    </div>`;
}

/* ---------------- 準備中プレースホルダ ---------------- */
const PLACE = {
  menus: ['美容メニュー', '公式サイト（WordPress）から施術メニューを同期し、所要時間・料金・受付ON/OFFを管理する画面です。現在のプロトタイプではメニューは固定データで表示しています。'],
  staff: ['スタッフ', '医師・看護師・スタッフを登録し、予約への担当割当（同時刻ダブルアサイン防止）を行う画面です。'],
  import: ['CSV取り込み', '他システムや紙台帳からの予約・患者データをCSVで一括取り込みする画面です。'],
};
function renderPlaceholder(id){
  const [title, desc] = PLACE[id];
  document.getElementById("view-"+id).innerHTML = `
    <h1>${esc(title)}</h1>
    <div class="card placeholder-box">
      <div class="pi">この画面は準備中です</div>
      <div>${esc(desc)}</div>
      <div class="avail">現在ご利用いただける画面：
        <div class="avail-list">
          <a onclick="showAdminTab('board')">日別ボード</a>
          <a onclick="showAdminTab('list')">予約一覧</a>
          <a onclick="showAdminTab('new')">電話予約の代理入力</a>
          <a onclick="showAdminTab('slots')">予約枠の確認</a>
        </div>
      </div>
    </div>`;
}

/* ---------------- 同期受信 ---------------- */
Store.onSync((msg)=>{
  const now = currentCodes();
  const flash = new Set([...now].filter(c=>!prevCodes.has(c)));
  prevCodes = now;
  if(msg && msg.at && msg.type==="reservation"){
    const ms = (msg.latency!=null) ? msg.latency : (Date.now() - msg.at);
    const el=document.getElementById("latency"); if(el) el.innerHTML = `⚡ 最終同期 <b>${ms}ms</b>（サブ秒）`;
  }
  // 表示中タブを再描画（ボードはフラッシュ付き）
  if(curTab==="board") renderBoard(flash);
  else renderTab(curTab);
});

/* ---------------- 起動 ---------------- */
renderClinicSwitch();
renderBoard();
Store.ready.then(()=>{
  prevCodes = currentCodes();
  const b = Store.getBackend();
  const brand = document.querySelector(".admin-header .brand small");
  if(brand) brand.textContent = b==="supabase" ? "Supabase リアルタイム同期" : "リアルタイム同期（ローカル）";
  renderTab(curTab);
});
</script>
</body>
</html>
