        // 履歴フィルタ（ローカルフィルタリング）
        let filteredHistoryData = [];

        function filterHistory() {
            // 全履歴をローカル保持しているため再取得不要。日付・検索はローカルで絞り込み。
            historyDisplayCount = HISTORY_PAGE_SIZE;
            applyHistoryFilter();
        }

        function applyHistoryFilter() {
            const search = (document.getElementById('history-search')?.value || '').toLowerCase();
            const dateFrom = document.getElementById('history-date-from')?.value || '';
            const dateTo = document.getElementById('history-date-to')?.value || '';

            filteredHistoryData = allHistoryData.filter(h => {
                if (search && !h.medicine.toLowerCase().includes(search)
                    && !(h.patient && h.patient.toLowerCase().includes(search))
                    && !(h.operator && h.operator.toLowerCase().includes(search))) return false;
                if (dateFrom && h.date < dateFrom) return false;
                if (dateTo && h.date > dateTo) return false;
                return true;
            });

            renderHistoryPaged();
        }

        function renderHistoryItem(h, idx) {
            let icon, qtyClass, qtyText;
            if (h.type === 'adjust') {
                icon = '📝'; qtyClass = 'adjust'; qtyText = `→${h.quantity}${h.unit}`;
            } else if (h.type === 'in') {
                icon = '📥'; qtyClass = 'in'; qtyText = `+${h.quantity}${h.unit}`;
            } else {
                icon = '📤'; qtyClass = 'out'; qtyText = `-${h.quantity}${h.unit}`;
            }
            const isSelected = historySelectedForDelete.has(idx);
            return `
                <div class="history-item${isSelected ? ' selected-for-delete' : ''}" ${historyDeleteMode ? `onclick="toggleHistorySelect(${idx})" style="cursor:pointer;"` : ''}>
                    ${historyDeleteMode ? `<input type="checkbox" class="history-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleHistorySelect(${idx})">` : ''}
                    <div class="history-icon ${h.type}">${icon}</div>
                    <div class="history-content">
                        <div class="history-medicine">${h.medicine}</div>
                        <div class="history-detail">${h.date} ${h.time}${h.operator ? ' • ' + h.operator : ''}${h.patient ? ' • ' + h.patient : ''}${h.type === 'adjust' ? ' • 棚卸修正' : ''}</div>
                    </div>
                    <div class="history-qty ${qtyClass}">${qtyText}</div>
                </div>
            `;
        }

        function renderHistoryPaged() {
            const container = document.getElementById('history-list');
            const total = filteredHistoryData.length;

            if (total === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">該当する履歴がありません</div>';
                return;
            }

            let deleteBar = '';
            if (historyDeleteMode && historySelectedForDelete.size > 0) {
                deleteBar = `<div class="history-delete-bar">
                    <span class="delete-count">${historySelectedForDelete.size}件選択中</span>
                    <div style="display:flex; gap:6px;">
                        <button class="history-delete-cancel-btn" onclick="clearHistorySelection()">選択解除</button>
                        <button class="history-delete-btn" onclick="confirmDeleteHistory()">🗑 削除</button>
                    </div>
                </div>`;
            }

            if (historyViewMode === 'patient') {
                // 患者別グループ表示
                const groups = {};
                const noPatient = [];
                filteredHistoryData.forEach((h, i) => {
                    h._filteredIdx = i;
                    const key = h.patient || '';
                    if (!key) { noPatient.push(h); return; }
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(h);
                });
                // 患者名を最終操作日時の新しい順にソート
                const sortedKeys = Object.keys(groups).sort((a, b) => {
                    const aLatest = groups[a][0]?.date + ' ' + groups[a][0]?.time || '';
                    const bLatest = groups[b][0]?.date + ' ' + groups[b][0]?.time || '';
                    return bLatest.localeCompare(aLatest);
                });
                let html = deleteBar;
                for (const name of sortedKeys) {
                    const items = groups[name];
                    html += `<div class="history-group-header">
                        <span>${name}</span>
                        <span class="group-count">${items.length}件</span>
                    </div>`;
                    html += items.map(h => renderHistoryItem(h, h._filteredIdx)).join('');
                }
                if (noPatient.length > 0) {
                    html += `<div class="history-group-header" style="background: var(--text-muted);">
                        <span>入庫・棚卸（患者なし）</span>
                        <span class="group-count">${noPatient.length}件</span>
                    </div>`;
                    html += noPatient.map(h => renderHistoryItem(h, h._filteredIdx)).join('');
                }
                html += `<div style="text-align:center; padding:12px; color:var(--text-muted); font-size:13px;">
                    全 ${total} 件（${sortedKeys.length + (noPatient.length ? 1 : 0)} グループ）</div>`;
                container.innerHTML = html;
            } else {
                // 時系列表示（従来通り）
                const showing = Math.min(historyDisplayCount, total);
                const slice = filteredHistoryData.slice(0, showing);
                let html = deleteBar;
                html += slice.map((h, i) => renderHistoryItem(h, i)).join('');

                html += `<div style="text-align:center; padding:12px; color:var(--text-muted); font-size:13px;">
                    ${showing} / ${total} 件表示`;
                if (showing < total) {
                    html += ` <button onclick="loadMoreHistory()" style="margin-left:8px; padding:6px 16px; border:1px solid var(--primary); border-radius:6px; background:white; color:var(--primary); font-size:13px; cursor:pointer;">さらに${Math.min(HISTORY_PAGE_SIZE, total - showing)}件読み込む</button>`;
                }
                html += `</div>`;
                container.innerHTML = html;
            }
        }

        async function confirmDeleteHistory() {
            const count = historySelectedForDelete.size;
            if (count === 0) return;

            const confirmed = confirm(`選択した ${count} 件の履歴を削除しますか？\n\n在庫数も自動的に調整されます。\n（入庫→在庫減算、出庫→在庫加算）`);
            if (!confirmed) return;

            // 選択された履歴エントリを取得
            const toDelete = [];
            for (const idx of historySelectedForDelete) {
                if (filteredHistoryData[idx]) {
                    toDelete.push(filteredHistoryData[idx]);
                }
            }

            if (USE_GAS) {
                // Supabaseから該当トランザクションを削除（idベース）。GAS非依存。
                const ids = toDelete.map(h => h._sbId).filter(v => v != null);
                if (ids.length === 0) {
                    showToast('この履歴はSupabaseに存在しないため削除できません', 'error');
                    return;
                }
                const delRes = await sbFetch('pharmacy_transactions?id=in.(' + ids.join(',') + ')', {
                    method: 'DELETE',
                    headers: { 'Prefer': 'return=representation' }
                });
                if (!delRes) {
                    showToast('削除に失敗しました', 'error');
                    return;
                }
                showToast(`${count}件の履歴を削除しました`, 'success');

                // ローカルデータと在庫を同期し、Supabaseの在庫数も戻す
                for (const h of toDelete) {
                    const localIdx = historyData.indexOf(h);
                    if (localIdx >= 0) historyData.splice(localIdx, 1);
                    const allIdx = allHistoryData.indexOf(h);
                    if (allIdx >= 0) allHistoryData.splice(allIdx, 1);

                    const normalizedCode = normalizeCode(h.code);
                    const stockIdx = stockData.findIndex(m => normalizeCode(m.code) === normalizedCode);
                    if (stockIdx >= 0) {
                        if (h.type === 'in') {
                            stockData[stockIdx].stock -= h.quantity;
                        } else if (h.type === 'out') {
                            const isExt = (stockData[stockIdx].category || '').replace('[旧]','').startsWith('外用');
                            if (!isExt) stockData[stockIdx].stock += h.quantity;
                        }
                        // Supabaseの在庫数も更新（adjustは元値不明のため在庫調整しない＝GAS版と同じ挙動）
                        if (h.type === 'in' || h.type === 'out') {
                            await sbFetch('pharmacy_medicines?code=eq.' + encodeURIComponent(stockData[stockIdx].code), {
                                method: 'PATCH',
                                body: JSON.stringify({ current_stock: stockData[stockIdx].stock, last_updated: new Date().toISOString() })
                            });
                        }
                    }
                }
                renderStockList();
            } else {
                // ローカルモード：ローカルデータのみ操作
                for (const h of toDelete) {
                    const localIdx = historyData.indexOf(h);
                    if (localIdx >= 0) historyData.splice(localIdx, 1);
                    const allIdx = allHistoryData.indexOf(h);
                    if (allIdx >= 0) allHistoryData.splice(allIdx, 1);

                    const normalizedCode = normalizeCode(h.code);
                    const stockIdx = stockData.findIndex(m => normalizeCode(m.code) === normalizedCode);
                    if (stockIdx >= 0) {
                        if (h.type === 'in') {
                            stockData[stockIdx].stock -= h.quantity;
                        } else if (h.type === 'out') {
                            stockData[stockIdx].stock += h.quantity;
                        }
                    }
                }
                showToast(`${count}件の履歴を削除しました`, 'success');
            }

            historySelectedForDelete.clear();
            historyDeleteMode = false;
            const btn = document.getElementById('history-edit-btn');
            btn.classList.remove('active');
            btn.textContent = '編集';
            applyHistoryFilter();
            renderStockList();
        }

            const today = new Date();
            const toStr = today.toISOString().split('T')[0];
            let fromStr;

            if (preset === 'today') {
                fromStr = toStr;
            } else if (preset === 'week') {
                const d = new Date(today);
                d.setDate(d.getDate() - 7);
                fromStr = d.toISOString().split('T')[0];
            } else if (preset === 'month') {
                const d = new Date(today);
                d.setDate(d.getDate() - 30);
                fromStr = d.toISOString().split('T')[0];
            } else {
                // all - clear dates
                document.getElementById('history-date-from').value = '';
                document.getElementById('history-date-to').value = '';
                filterHistory();
                return;

            document.getElementById('history-date-from').value = fromStr;

            filterHistory();
        }

        // Supabase(pharmacy_transactions)の out(出庫=消費)を月次集計。GAS非依存。
        async function loadMonthlyConsumption() {
            const loading = document.getElementById('consumption-loading');
            const tableWrap = document.getElementById('consumption-table-wrap');
            const summary = document.getElementById('consumption-summary');
            loading.style.display = 'block';
            tableWrap.style.display = 'none';
            summary.innerHTML = '';

            const rows = await sbFetch('pharmacy_transactions?select=medicine_code,quantity,transaction_type,created_at&transaction_type=eq.out&order=created_at.asc&limit=20000');
            loading.style.display = 'none';

            if (!rows) {
                summary.innerHTML = '<div style="color:var(--danger);padding:10px;">データ取得エラー: 通信失敗</div>';
                return;
            }

            // 月リスト（データが存在する月・直近6ヶ月に限定）
            const monthSet = new Set();
            rows.forEach(r => monthSet.add(_sbToJst(r.created_at).date.slice(0, 7)));
            let months = [...monthSet].sort();
            if (months.length > 6) months = months.slice(-6);
            const shown = new Set(months);

            // 薬品コードごとに月次集計
            const byCode = {};
            rows.forEach(r => {
                const mo = _sbToJst(r.created_at).date.slice(0, 7);
                if (!shown.has(mo)) return;
                const code = r.medicine_code;
                if (!byCode[code]) byCode[code] = { monthly: {}, total: 0 };
                byCode[code].monthly[mo] = (byCode[code].monthly[mo] || 0) + (r.quantity || 0);
                byCode[code].total += (r.quantity || 0);
            });

            const drugs = Object.keys(byCode).map(code => {
                const med = stockData.find(m => normalizeCode(m.code) === normalizeCode(code));
                return {
                    name: med ? med.name : code,
                    code: code,
                    stock: med ? (med.stock || 0) : 0,
                    monthly: byCode[code].monthly,
                    total: byCode[code].total
                };
            });

            window._consumptionLoaded = true;
            _consumptionData = { months, drugs };
            renderConsumption();
        }

        function renderConsumption() {
            if (!_consumptionData) return;
            const { months, drugs } = _consumptionData;
            const search = (document.getElementById('consumption-search').value || '').trim().toLowerCase();
            const sortKey = document.getElementById('consumption-sort').value;

            let filtered = drugs;
            if (search) {
                filtered = filtered.filter(d => d.name.toLowerCase().includes(search));
            }

            filtered = [...filtered];
            switch (sortKey) {
                case 'name': filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja')); break;
                case 'total-desc': filtered.sort((a, b) => b.total - a.total); break;
                case 'total-asc': filtered.sort((a, b) => a.total - b.total); break;
                case 'stock-asc': filtered.sort((a, b) => a.stock - b.stock); break;
            }

            const totalDrugs = filtered.length;
            const totalConsumption = filtered.reduce((s, d) => s + d.total, 0);
            const lowStock = filtered.filter(d => d.stock <= 5).length;
            const summary = document.getElementById('consumption-summary');
            summary.innerHTML = `
                <div style="flex:1;min-width:100px;background:#f0f4ff;border-radius:8px;padding:8px 12px;text-align:center;">
                    <div style="font-size:11px;color:#666;">薬品数</div>
                    <div style="font-size:20px;font-weight:700;color:#2563eb;">${totalDrugs}</div>
                </div>
                <div style="flex:1;min-width:100px;background:#f0fdf4;border-radius:8px;padding:8px 12px;text-align:center;">
                    <div style="font-size:11px;color:#666;">総消費量</div>
                    <div style="font-size:20px;font-weight:700;color:#16a34a;">${totalConsumption}</div>
                </div>
                <div style="flex:1;min-width:100px;background:${lowStock > 0 ? '#fef2f2' : '#f9fafb'};border-radius:8px;padding:8px 12px;text-align:center;">
                    <div style="font-size:11px;color:#666;">在庫少(≤5)</div>
                    <div style="font-size:20px;font-weight:700;color:${lowStock > 0 ? '#dc2626' : '#666'};">${lowStock}</div>
                </div>
            `;

            const thead = document.getElementById('consumption-thead');
            let hdrHtml = '<tr><th style="position:sticky;left:0;background:#f8fafc;padding:8px 6px;border-bottom:2px solid #e2e8f0;text-align:left;white-space:nowrap;">薬品名</th>';
            hdrHtml += '<th style="padding:8px 6px;border-bottom:2px solid #e2e8f0;text-align:right;white-space:nowrap;">在庫</th>';
            for (const m of months) {
                hdrHtml += `<th style="padding:8px 6px;border-bottom:2px solid #e2e8f0;text-align:right;white-space:nowrap;">${m}</th>`;
            }
            hdrHtml += '<th style="padding:8px 6px;border-bottom:2px solid #e2e8f0;text-align:right;white-space:nowrap;font-weight:700;">合計</th></tr>';
            thead.innerHTML = hdrHtml;

            const tbody = document.getElementById('consumption-tbody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + (months.length + 3) + '" style="text-align:center;padding:20px;color:#999;">該当する薬品がありません</td></tr>';
            } else {
                let bodyHtml = '';
                for (const d of filtered) {
                    const stockColor = d.stock <= 5 ? '#dc2626' : d.stock <= 10 ? '#f59e0b' : '#333';
                    bodyHtml += `<tr style="border-bottom:1px solid #f1f5f9;">`;
                    bodyHtml += `<td style="position:sticky;left:0;background:white;padding:6px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;" title="${d.name}">${d.name}</td>`;
                    bodyHtml += `<td style="padding:6px;text-align:right;font-weight:600;color:${stockColor};">${d.stock}</td>`;
                    for (const m of months) {
                        const val = d.monthly[m] || 0;
                        const bg = val > 0 ? `background:rgba(37,99,235,${Math.min(val / 20, 0.15)})` : '';
                        bodyHtml += `<td style="padding:6px;text-align:right;${bg}">${val || '-'}</td>`;
                    }
                    bodyHtml += `<td style="padding:6px;text-align:right;font-weight:700;">${d.total}</td>`;
                    bodyHtml += '</tr>';
                }
                tbody.innerHTML = bodyHtml;
            }

            document.getElementById('consumption-table-wrap').style.display = 'block';
        }

        function filterConsumption() {
            renderConsumption();
        }

        // ===== 初期化 =====
        const patientInput = document.getElementById('patient-input');

        patientInput.addEventListener('input', function() {
            selectedPatient = null;
            showPatientAutocomplete(this.value);
            updateActionButtons();
        });

        patientInput.addEventListener('blur', function() {
            hidePatientAutocomplete();
        });

        patientInput.addEventListener('focus', function() {
            if (this.value) {
                showPatientAutocomplete(this.value);
            }
        });

        // 診察日を当日に初期化
        document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

        setMode(currentMode);
        renderStockList();

        // iPhoneでキーボード表示時、入力中の文字が隠れないよう自動スクロール
        document.querySelectorAll('#add-medicine-form input, #add-medicine-form select').forEach(el => {
            el.addEventListener('focus', function() {
                setTimeout(() => {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300); // キーボード出現を待つ
            });
        });

        async function initialSyncToSupabase() {
            console.log('Supabase初回在庫同期開始...');
            let synced = 0;
            for (const m of stockData) {
                if (m.stock > 0) {
                    await sbFetch('pharmacy_medicines?code=eq.' + m.code, {
                        method: 'PATCH',
                        body: JSON.stringify({ current_stock: m.stock, last_updated: new Date().toISOString() })
                    });
                    synced++;
                }
            }
            console.log('Supabase初回同期完了: ' + synced + '件更新');
        }

        (async function initLoad() {
            showToast('データを読み込み中...', '');
            const sbOk = await loadStockFromSupabase();
            if (!sbOk && USE_GAS) {
                console.log('Supabase失敗、GASフォールバック');
                await loadStockFromGAS();
                initialSyncToSupabase();
            }
            if (USE_GAS) loadHistoryFromGAS();
            renderStockList();
        })();
    </script>
</body>
</html>
