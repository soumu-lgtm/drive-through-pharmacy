<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>QR Decoder Test</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="qr_decoder.js"></script>
</head>
<body style="font-family:sans-serif;padding:20px;">
<h2>保険証QRコードテスト</h2>
<input type="file" id="fileInput" accept="image/*">
<div id="status" style="margin:10px 0;font-weight:bold;"></div>
<div style="display:flex;gap:20px;">
  <div><h3>入力画像</h3><img id="preview" style="max-width:400px;border:1px solid #ccc;"></div>
</div>
<div id="results" style="margin-top:20px;"></div>

<script>
document.getElementById('fileInput').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const dataUrl = ev.target.result;
    document.getElementById('preview').src = dataUrl;
    statusEl.textContent = 'QRコード検出中...';

    try {
      const result = await QR_DECODER.decodeFromDataUrl(dataUrl);

      let html = '<h3>QRコード結果</h3>';
      if (!result) {
        html += '<div style="color:red;font-weight:bold;">QRコードが検出できませんでした</div>';
      } else if (result.format === 'unknown') {
        html += '<div style="color:orange;">QRコード検出（形式不明）: ' + result.raw + '</div>';
      } else {
        html += '<table border="1" cellpadding="6" style="border-collapse:collapse;font-size:13px;">';
        html += '<tr><th>フィールド</th><th>値</th><th>正解</th><th>判定</th></tr>';

        const correct = {
          insurerNumber: '01230010',
          symbol: '8010441',
          memberNumber: '30',
          edaban: '00',
        };

        for (const key of Object.keys(correct)) {
          const val = result[key] || '(未検出)';
          const ok = val === correct[key];
          html += '<tr><td>' + key + '</td><td>' + val + '</td><td>' + correct[key] + '</td>';
          html += '<td style="background:' + (ok ? '#dcfce7' : '#fce4ec') + ';">' + (ok ? 'OK' : 'NG') + '</td></tr>';
        }
        html += '</table>';
        html += '<p>フォーマット: ' + result.format + '</p>';
        html += '<p>支部コード: ' + result.branchCode + ' (' + result.dependentType + ')</p>';
        html += '<p>Raw: ' + result.raw + '</p>';
      }

      resultsEl.innerHTML = html;
      statusEl.textContent = result ? 'QRコード検出成功' : 'QRコード未検出';
    } catch(err) {
      statusEl.textContent = 'Error: ' + err.message;
      resultsEl.textContent = err.stack;
    }
  };
  reader.readAsDataURL(file);
};
</script>
</body></html>
