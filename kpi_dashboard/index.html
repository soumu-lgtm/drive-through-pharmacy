<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>EC売上ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root {
  --bg: #f5f7fa; --card: #fff; --text: #333; --sub: #888; --border: #e5e7eb;
  --shopify: #96bf48; --employee: #f59e0b; --wholesale: #6366f1;
  --amazon: #ff9900; --qoo10: #e31937; --rakuten: #bf0000; --accent: #667eea; --accent2: #764ba2;
  --green: #4ade80; --red: #f87171; --blue: #60a5fa; --purple: #a78bfa;
  --font: 'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:16px}

.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:24px 30px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;margin-bottom:4px}
.header .ts{opacity:.8;font-size:13px}

.date-filter{background:var(--card);border-radius:10px;padding:14px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.date-filter label{font-weight:600;color:#666;font-size:13px}
.date-filter input[type="date"]{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;color:var(--text)}
.date-filter input:focus{outline:none;border-color:var(--accent)}
.filter-btn{padding:8px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.filter-btn:hover{opacity:.9}
.reset-btn{padding:8px 14px;background:#f3f4f6;color:#666;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer}
.date-range-info{font-size:12px;color:var(--sub);margin-left:auto}

.tab-nav{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:600;color:#999;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

.grid{display:grid;gap:16px;margin-bottom:16px}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(400px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid-1{grid-template-columns:1fr}

.card{background:var(--card);border-radius:10px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:14px;color:#666;margin-bottom:10px;font-weight:600}
.card h3{font-size:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.metric{font-size:28px;font-weight:700;color:var(--accent)}
.metric-sub{font-size:12px;color:var(--sub);margin-top:4px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px;color:#666;font-weight:600;font-size:11px;border-bottom:2px solid var(--border)}
td{padding:7px 8px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#f8f9fb}
.num{text-align:right;font-variant-numeric:tabular-nums}

.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;color:#fff}
.badge-shopify{background:var(--shopify)}.badge-employee{background:var(--employee)}
.badge-wholesale{background:var(--wholesale)}.badge-amazon{background:var(--amazon)}
.badge-qoo10{background:var(--qoo10)}.badge-rakuten{background:var(--rakuten)}.badge-ok{background:rgba(74,222,128,.15);color:#16a34a}
.badge-ng{background:rgba(248,113,113,.15);color:#dc2626}
.badge-info{background:rgba(96,165,250,.15);color:#2563eb;font-size:10px;padding:2px 8px;border-radius:10px}

.chart-box{position:relative;height:280px}
.alert-row{background:rgba(248,113,113,.06)}

/* Funnel */
.funnel{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px 0;flex-wrap:wrap}
.funnel-step{text-align:center;flex:1;min-width:120px;max-width:160px;padding:16px 10px;border-radius:10px}
.funnel-step .fs-title{font-size:11px;font-weight:700;margin-bottom:6px}
.funnel-step .fs-val{font-size:24px;font-weight:700}
.funnel-step .fs-rate{font-size:11px;color:var(--sub);margin-top:4px}
.funnel-arrow{font-size:22px;color:#ccc}

/* Report */
.report-preview{background:#1e1e1e;color:#d4d4d4;border-radius:8px;padding:16px;font-family:'Cascadia Code',monospace;font-size:12px;white-space:pre-wrap;max-height:500px;overflow-y:auto;line-height:1.7}
.copy-btn{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.copy-btn:hover{opacity:.9}

/* SNS sub tabs */
.sns-sub-tabs{display:flex;gap:8px;margin-bottom:16px}
.sns-sub-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:#666;font-size:12px;font-weight:600;cursor:pointer}
.sns-sub-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

@media(max-width:768px){
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
  .funnel{flex-direction:column}.funnel-arrow{transform:rotate(90deg)}
  body{padding:8px}
}
</style>
</head>
<body>

<div class="header">
  <div><h1>EC売上ダッシュボード</h1><div class="ts" id="syncTs">読み込み中...</div></div>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="syncBtn" onclick="runSync()" style="padding:10px 20px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.35)'" onmouseout="this.style.background='rgba(255,255,255,.2)'">&#x21bb; 集計更新</button>
  </div>
</div>
<div id="syncResult" style="display:none;margin-bottom:16px;border-radius:10px;padding:14px 20px;font-size:13px;line-height:1.8"></div>

<div class="date-filter">
  <label>開始日:</label><input type="date" id="startDate">
  <label>終了日:</label><input type="date" id="endDate">
  <button class="filter-btn" onclick="applyFilter()">適用</button>
  <button class="reset-btn" onclick="resetFilter()">リセット</button>
  <div class="date-range-info" id="dateRangeInfo">-</div>
</div>

<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" onclick="showTab('dashboard')">ダッシュボード</button>
  <button class="tab-btn" onclick="showTab('charts')">グラフ分析</button>
  <button class="tab-btn" onclick="showTab('product')">商品別詳細</button>
  <button class="tab-btn" onclick="showTab('analytics')">アナリティクス</button>
  <button class="tab-btn" onclick="showTab('report')">売上報告</button>
  <button class="tab-btn" onclick="showTab('profit')">利益比較</button>
  <button class="tab-btn" onclick="showTab('kpi')">KPIレポート</button>
  <button class="tab-btn" onclick="showTab('inventory')">在庫状況</button>
  <button class="tab-btn" onclick="showTab('sns')">SNS分析</button>
  <button class="tab-btn" onclick="showTab('seo')">SEO分析</button>
</div>

<div class="tab-content active" id="tab-dashboard"></div>
<div class="tab-content" id="tab-charts"></div>
<div class="tab-content" id="tab-product"></div>
<div class="tab-content" id="tab-analytics"></div>
<div class="tab-content" id="tab-report"></div>
<div class="tab-content" id="tab-profit"></div>
<div class="tab-content" id="tab-kpi"></div>
<div class="tab-content" id="tab-inventory"></div>
<div class="tab-content" id="tab-sns"></div>
<div class="tab-content" id="tab-seo"></div>

<script>
const SB='https://dyjhxkqzxibcpgoefbiv.supabase.co',SK='sb_publishable_bOK3qqLHkM1fFOojh3slpg_glKQoP3g',H={'apikey':SK};
let D=[],O=[],G=[],S=[],I=[],SY=[],SEO=[],SEO_ART=[];
let dS=null,dE=null,charts={};

async function sbGet(t,q='',maxRows=0){
  if(maxRows<=1000){const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:H,cache:'no-store'});if(!r.ok)throw new Error(`${t}:${r.status}`);return r.json();}
  let all=[],from=0;const pgSize=1000;
  while(from<maxRows){const hdrs={...H,'Range':from+'-'+(from+pgSize-1)};const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:hdrs,cache:'no-store'});if(!r.ok&&r.status!==206)throw new Error(`${t}:${r.status}`);const d=await r.json();all=all.concat(d);if(d.length<pgSize)break;from+=pgSize;}
  return all;
}
function fmt(n){return n!=null?Number(n).toLocaleString('ja-JP'):'-'}
function yen(n){return n!=null?'¥'+Number(n).toLocaleString('ja-JP'):'-'}
function pct(a,b){return b>0?((a/b)*100).toFixed(1)+'%':'-'}
function chBadge(ch){const m={shopify:'badge-shopify',employee:'badge-employee',wholesale:'badge-wholesale',amazon:'badge-amazon',qoo10:'badge-qoo10',rakuten:'badge-rakuten'};return `<span class="badge ${m[ch]||'badge-info'}">${chName(ch)}</span>`}
function chName(ch){return{shopify:'Shopify',employee:'社割',wholesale:'卸売',amazon:'Amazon',qoo10:'Qoo10',rakuten:'楽天'}[ch]||ch}
function normProd(n){
  if(!n)return'不明';
  n=n.replace(/\s*\(Shopify\)|\s*\(卸売\)|\s*\(社割\)/g,'').trim();
  const map=[
    [/わき用クリーム/,'わき用クリーム'],
    [/スキンセラム|美容液セット/,'スキンセラム'],
    [/スキンローション|化粧水/,'スキンローション'],
    [/メンズスキンセラム|メンズ.*美容液/,'メンズスキンセラム'],
    [/メンズスキンローション|メンズ.*化粧水/,'メンズスキンローション'],
    [/スキンケアセット/,'スキンケアセット'],
    [/トライアルセット/,'トライアルセット'],
    [/デオドラントクリーム|制汗クリーム|制汗剤/,'わき用クリーム'],
  ];
  for(const[re,short]of map){if(re.test(n))return short}
  return n;
}

function showTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',b.textContent.includes(
    {dashboard:'ダッシュボード',charts:'グラフ',product:'商品',analytics:'アナリティクス',report:'売上報告',profit:'利益',kpi:'KPI',inventory:'在庫',sns:'SNS',seo:'SEO'}[id]||''
  )));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
}

function filt(arr,df='date'){return arr.filter(d=>{const v=d[df];if(!v)return false;if(dS&&v<dS)return false;if(dE&&v>dE)return false;return true})}
function applyFilter(){dS=document.getElementById('startDate').value||null;dE=document.getElementById('endDate').value||null;renderAll()}
function resetFilter(){dS=null;dE=null;const ds=D.map(d=>d.date).sort();if(ds.length){document.getElementById('startDate').value=ds[0];document.getElementById('endDate').value=ds[ds.length-1]}renderAll()}
function destroyC(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

async function init(){
  try{
    var EX=[];
    [D,O,G,S,I,SY,SEO,SEO_ART,EX]=await Promise.all([
      sbGet('kpi_daily_summary','select=*&order=date.desc&limit=2000',2000),
      sbGet('kpi_orders','select=*&order=order_date.desc&limit=5000',5000),
      sbGet('kpi_ga4_metrics','select=*&order=date.desc&limit=500'),
      sbGet('kpi_sns_metrics','select=*&order=date.desc&limit=300'),
      sbGet('kpi_inventory','select=*&order=snapshot_date.desc&limit=500'),
      sbGet('kpi_sync_status','select=*'),
      sbGet('kpi_seo_daily','select=*&order=date.asc&limit=5000',5000),
      sbGet('kpi_seo_articles','select=*&order=clicks.desc&limit=3000',3000),
      sbGet('kpi_excluded_orders','select=order_id'),
    ]);
    // 社員テスト購入を除外
    const exSet=new Set(EX.map(e=>e.order_id));
    if(exSet.size){const b=O.length;O=O.filter(o=>!exSet.has(o.order_id));if(b-O.length)console.log(`[除外]${b-O.length}件の社員テスト購入を除外`)}
    // order_id+channel+skuで重複除去（完全一致行のみ除去、商品別明細は維持）
    O=(()=>{const seen=new Set();return O.filter(o=>{const k=o.order_id+"|"+o.channel+"|"+(o.sku||o.product_name||"");if(seen.has(k))return false;seen.add(k);return true})})();
    const ds=D.map(d=>d.date).sort();
    if(ds.length){
      const el=id=>document.getElementById(id);
      const today=new Date().toISOString().slice(0,10);const maxD=ds[ds.length-1]>today?ds[ds.length-1]:today;
      el('startDate').value=ds[0];el('startDate').min=ds[0];el('startDate').max=maxD;
      el('endDate').value=maxD;el('endDate').min=ds[0];el('endDate').max=maxD;
      el('dateRangeInfo').textContent=`データ範囲: ${ds[0]} ~ ${maxD}`;
    }
    const allSyncs=SY.filter(s=>s.last_sync).map(s=>new Date(s.last_sync).getTime());
    const latestSync=allSyncs.length?new Date(Math.max(...allSyncs)):null;
    const lt=latestSync?latestSync.toLocaleString('ja-JP'):'未同期';
    const nextSync=latestSync?new Date(latestSync.getTime()+60*60*1000).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'---';
    document.getElementById('syncTs').textContent=`最終更新: ${lt}（自動同期: 1時間毎 / 次回予定: ${nextSync}頃）`;
    renderAll();
  }catch(e){document.getElementById('syncTs').textContent='読み込みエラー: '+e.message}
}

function renderAll(){
  const d=filt(D),o=filt(O,'order_date'),g=filt(G);
  renderDash(d,o);renderCharts(d,o);renderProduct(o);renderGA4(g);
  renderReport(d,o);renderProfit(d,o);renderKPI(d,o,g,S);renderInv(I);renderSNS(S);renderSEO(filt(SEO),SEO_ART);
}

// ===== 1. ダッシュボード =====
function renderDash(d,o){
  const rev=d.reduce((s,x)=>s+Number(x.revenue||0),0);
  const ords=d.reduce((s,x)=>s+(x.order_count||0),0);
  const qty=o.reduce((s,x)=>s+(x.quantity||0),0);
  const aov=ords>0?rev/ords:0;

  // Channel
  const ch={};d.forEach(x=>{if(!ch[x.channel])ch[x.channel]={rev:0,ord:0};ch[x.channel].rev+=Number(x.revenue||0);ch[x.channel].ord+=(x.order_count||0)});
  const chArr=Object.entries(ch).sort((a,b)=>b[1].rev-a[1].rev);
  let chRows=chArr.map(([c,v])=>`<tr><td>${chBadge(c)}</td><td class="num">${yen(v.rev)}</td><td class="num">${fmt(v.ord)}件</td></tr>`).join('');

  // Product TOP10
  const prods={};o.forEach(x=>{const n=normProd(x.product_name);if(!prods[n])prods[n]={rev:0,qty:0};prods[n].rev+=Number(x.total||0);prods[n].qty+=(x.quantity||0)});
  const pArr=Object.entries(prods).sort((a,b)=>b[1].rev-a[1].rev).slice(0,10);
  let pRows=pArr.map(([n,v])=>`<tr><td>${n}</td><td class="num">${yen(v.rev)}</td><td class="num">${fmt(v.qty)}個</td></tr>`).join('');

  // Subscription
  const subs=o.filter(x=>x.is_subscription);
  const subRev=subs.reduce((s,x)=>s+Number(x.total||0),0);
  const subByCount={};
  subs.forEach(x=>{const c=x.subscription_count||1;if(!subByCount[c])subByCount[c]={cnt:0,rev:0};subByCount[c].cnt++;subByCount[c].rev+=Number(x.total||0)});
  let subRows=`<tr><td>定期注文件数</td><td class="num"><strong>${fmt(subs.length)}</strong></td></tr>`;
  subRows+=`<tr><td>定期売上合計</td><td class="num"><strong>${yen(subRev)}</strong></td></tr>`;
  Object.entries(subByCount).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([c,v])=>{
    subRows+=`<tr><td>　${c}回目</td><td class="num">${fmt(v.cnt)}件 / ${yen(v.rev)}</td></tr>`;
  });

  // Customer - ユニーク注文はorders明細から（Amazon/Qoo10含む）、注文件数はdaily_summaryから
  const uniqOrders=new Set(o.map(x=>x.order_id)).size;

  document.getElementById('tab-dashboard').innerHTML=`
    <div class="grid grid-4">
      <div class="card"><h2>売上合計</h2><div class="metric">${yen(rev)}</div><div class="metric-sub">フィルター期間内</div></div>
      <div class="card"><h2>注文件数</h2><div class="metric" style="color:var(--blue)">${fmt(ords)}</div><div class="metric-sub">平均単価: ${yen(Math.round(aov))}</div></div>
      <div class="card"><h2>商品販売数</h2><div class="metric" style="color:var(--purple)">${fmt(qty)}<span style="font-size:14px;color:var(--sub)">個</span></div></div>
      <div class="card"><h2>注文明細数</h2><div class="metric" style="color:var(--employee)">${fmt(o.length)}<span style="font-size:12px;color:var(--sub)"> 行</span></div><div class="metric-sub">ユニーク注文: ${fmt(uniqOrders)}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><h2>チャネル別売上</h2>
        <table><thead><tr><th>チャネル</th><th class="num">売上</th><th class="num">注文数</th></tr></thead><tbody>${chRows||'<tr><td colspan="3">データなし</td></tr>'}</tbody></table>
      </div>
      <div class="card"><h2>商品別売上 TOP10</h2>
        <table><thead><tr><th>商品名</th><th class="num">売上</th><th class="num">数量</th></tr></thead><tbody>${pRows||'<tr><td colspan="3">データなし</td></tr>'}</tbody></table>
      </div>
    </div>
    <div class="grid grid-2">
      <div class="card"><h2>定期購入分析</h2><table>${subRows}</table></div>
      <div class="card"><h2>顧客分析</h2>
        <table>
          <tr><td>注文件数（全チャネル）</td><td class="num"><strong>${fmt(ords)}</strong></td></tr>
          <tr><td>注文明細（Shopify/社割/卸売）</td><td class="num">${fmt(uniqOrders)}件</td></tr>
          <tr><td>平均注文額(AOV)</td><td class="num">${yen(Math.round(aov))}</td></tr>
          <tr><td>総販売数量</td><td class="num">${fmt(qty)}個</td></tr>
        </table>
        <div style="font-size:11px;color:var(--sub);margin-top:8px">※注文明細はShopify/社割/卸売のみ。Amazon/Qoo10はサマリー集計のみ対応。</div>
      </div>
    </div>`;
}

// ===== 2. グラフ分析 =====
function renderCharts(d,o){
  const byDate={};d.forEach(x=>{if(!byDate[x.date])byDate[x.date]={rev:0,ord:0};byDate[x.date].rev+=Number(x.revenue||0);byDate[x.date].ord+=(x.order_count||0)});
  const dates=Object.keys(byDate).sort();
  // Channel pie
  const ch={};d.forEach(x=>{ch[x.channel]=(ch[x.channel]||0)+Number(x.revenue||0)});
  // Monthly
  const byM={};d.forEach(x=>{const m=x.date.slice(0,7);if(!byM[m])byM[m]={rev:0,ord:0};byM[m].rev+=Number(x.revenue||0);byM[m].ord+=(x.order_count||0)});
  const months=Object.keys(byM).sort();
  // Prefecture
  const byPref={};o.forEach(x=>{const p=x.prefecture||'不明';if(p&&p!=='null'&&p!=='不明'){byPref[p]=(byPref[p]||0)+Number(x.total||0)}});
  const prefArr=Object.entries(byPref).sort((a,b)=>b[1]-a[1]).slice(0,10);

  document.getElementById('tab-charts').innerHTML=`
    <div class="grid grid-1"><div class="card"><h2>日別売上推移</h2><div class="chart-box"><canvas id="cDailyRev"></canvas></div></div></div>
    <div class="grid grid-2">
      <div class="card"><h2>チャネル別構成比</h2><div class="chart-box"><canvas id="cChannelPie"></canvas></div></div>
      <div class="card"><h2>月別売上推移</h2><div class="chart-box"><canvas id="cMonthlyBar"></canvas></div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><h2>都道府県別売上 TOP10</h2><div class="chart-box"><canvas id="cPrefBar"></canvas></div></div>
      <div class="card"><h2>月別サマリー</h2>
        <table><thead><tr><th>月</th><th class="num">売上</th><th class="num">注文数</th></tr></thead>

function renderProduct(o){
  const byProd={};
  o.forEach(x=>{
    const n=normProd(x.product_name);

    byProd[n].total+=Number(x.total||0);byProd[n].qty+=(x.quantity||0);
    const c=x.channel||'不明';
    if(!byProd[n].ch[c])byProd[n].ch[c]={rev:0,qty:0};
    byProd[n].ch[c].rev+=Number(x.total||0);byProd[n].ch[c].qty+=(x.quantity||0);
  });
  const arr=Object.entries(byProd).sort((a,b)=>b[1].total-a[1].total);

  // Channel summary cards
  const chTotals={};
  o.forEach(x=>{const c=x.channel||'不明';if(!chTotals[c])chTotals[c]={rev:0,qty:0};chTotals[c].rev+=Number(x.total||0);chTotals[c].qty+=(x.quantity||0)});
  const totalRev=o.reduce((s,x)=>s+Number(x.total||0),0);
  const totalQty=o.reduce((s,x)=>s+(x.quantity||0),0);

      <div style="font-size:13px;color:var(--sub)">${yen(v.rev)}</div>
    </div>`}).join('');
  chCards+=`<div class="card" style="text-align:center;border:2px solid var(--accent)"><h2>合計</h2>
    <div style="font-size:18px;font-weight:700">${fmt(totalQty)}個</div>
    <div style="font-size:13px;color:var(--accent)">${yen(totalRev)}</div></div>`;

  let prodHtml=arr.map(([n,data])=>{

    return`<div class="card"><h3>${n} <span class="badge-info">${yen(data.total)} / ${fmt(data.qty)}個</span></h3>

  }).join('');

  document.getElementById('tab-product').innerHTML=`
    <div class="grid" style="grid-template-columns:repeat(6,1fr)">${chCards}</div>

// ===== 5. 売上報告 =====
function renderReport(d,o){
  // Product breakdown by channel
  const prods={};
  o.forEach(x=>{
    const n=normProd(x.product_name);const c=x.channel||'不明';
    if(!prods[n])prods[n]={};
    if(!prods[n][c])prods[n][c]={qty:0,rev:0};
    prods[n][c].qty+=(x.quantity||0);prods[n][c].rev+=Number(x.total||0);
  });

  const chIcons={shopify:'🛒 ECサイト',employee:'👥 社割購入',wholesale:'🏥 クリニック卸売',amazon:'🅰️ Amazon',qoo10:'🔵 Qoo10',rakuten:'🔴 楽天'};
  const startD=dS||D.map(x=>x.date).sort()[0]||'';
  const endD=dE||D.map(x=>x.date).sort().pop()||'';
  let report=`売上報告(${startD} ~ ${endD})\n${'='.repeat(40)}\n\n`;

  Object.entries(prods).sort((a,b)=>{const ta=Object.values(a[1]).reduce((s,v)=>s+v.rev,0);const tb=Object.values(b[1]).reduce((s,v)=>s+v.rev,0);return tb-ta}).forEach(([name,chs])=>{
    report+=`■ ${name}\n`;
    report+='【売上数量】\n';
    let totalQty=0,totalRev=0;
    ['shopify','employee','wholesale','amazon','qoo10','rakuten'].forEach(c=>{
      if(chs[c]){report+=`${chIcons[c]||c}: ${chs[c].qty}個\n`;totalQty+=chs[c].qty}
    });
    report+=`📊 合計: ${totalQty}個\n\n`;
    report+='【売上金額】\n';
    ['shopify','employee','wholesale','amazon','qoo10','rakuten'].forEach(c=>{
      if(chs[c]){report+=`${chIcons[c]||c}: ¥${chs[c].rev.toLocaleString()}\n`;totalRev+=chs[c].rev}
    });
    report+=`📊 合計: ¥${totalRev.toLocaleString()}\n\n`;
  });

  const totalAll=o.reduce((s,x)=>s+Number(x.total||0),0);
  report+=`${'='.repeat(40)}\n総売上合計: ¥${totalAll.toLocaleString()}\n`;

  document.getElementById('tab-report').innerHTML=`

      <div class="report-preview" id="reportText">${report}</div>
    </div>`;
}

function copyReport(){
  const text=document.getElementById('reportText').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.copy-btn');btn.textContent='✅ コピーしました';
    setTimeout(()=>btn.textContent='📋 クリップボードにコピー',2000);
  });
}

// ===== 6. 利益比較 =====
function renderProfit(d,o){
  // Period comparison
  const dates=d.map(x=>x.date).sort();
  if(dates.length<2){document.getElementById('tab-profit').innerHTML='<div class="card">データ不足</div>';return}
  const mid=dates[Math.floor(dates.length/2)];
  const prev=d.filter(x=>x.date<mid),curr=d.filter(x=>x.date>=mid);
  const prevO=o.filter(x=>x.order_date&&x.order_date<mid),currO=o.filter(x=>x.order_date&&x.order_date>=mid);

  const prevRev=prev.reduce((s,x)=>s+Number(x.revenue||0),0);
  const currRev=curr.reduce((s,x)=>s+Number(x.revenue||0),0);
  const diff=currRev-prevRev;
  const prevQty=prevO.reduce((s,x)=>s+(x.quantity||0),0);
  const currQty=currO.reduce((s,x)=>s+(x.quantity||0),0);

  // Product breakdown
  const prodPrev={},prodCurr={};
  prevO.forEach(x=>{const n=normProd(x.product_name);if(!prodPrev[n])prodPrev[n]={qty:0,rev:0};prodPrev[n].qty+=(x.quantity||0);prodPrev[n].rev+=Number(x.total||0)});
  currO.forEach(x=>{const n=normProd(x.product_name);if(!prodCurr[n])prodCurr[n]={qty:0,rev:0};prodCurr[n].qty+=(x.quantity||0);prodCurr[n].rev+=Number(x.total||0)});
  const allProds=new Set([...Object.keys(prodPrev),...Object.keys(prodCurr)]);
  let profitRows=[...allProds].sort().map(n=>{
    const p=prodPrev[n]||{qty:0,rev:0},c=prodCurr[n]||{qty:0,rev:0};
    const d=c.rev-p.rev;
    return`<tr><td>${n}</td><td class="num">${fmt(p.qty)}</td><td class="num">${fmt(c.qty)}</td><td class="num">${yen(p.rev)}</td><td class="num">${yen(c.rev)}</td><td class="num" style="color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'+':''}${yen(d)}</td></tr>`;
  }).join('');

  document.getElementById('tab-profit').innerHTML=`
    <div class="grid grid-3">
      <div class="card"><h2>前半期間 販売数</h2><div class="metric" style="color:var(--sub)">${fmt(prevQty)}<span style="font-size:14px">個</span></div><div class="metric-sub">${dates[0]} ~ ${mid}</div></div>
      <div class="card"><h2>後半期間 販売数</h2><div class="metric" style="color:var(--accent)">${fmt(currQty)}<span style="font-size:14px">個</span></div><div class="metric-sub">${mid} ~ ${dates[dates.length-1]}</div></div>
      <div class="card"><h2>売上増減</h2><div class="metric" style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${yen(diff)}</div></div>
    </div>
    <div class="grid grid-1"><div class="card"><h3>商品別 期間比較</h3>
      <table><thead><tr><th>商品名</th><th class="num">前半数量</th><th class="num">後半数量</th><th class="num">前半売上</th><th class="num">後半売上</th><th class="num">増減</th></tr></thead><tbody>${profitRows}</tbody></table>
    </div></div>`;
}

  const tSess=daily.reduce((s,x)=>s+(x.sessions||0),0);
  const aov=ords>0?Math.round(rev/ords):0;

  // Data sources
  const dsSt=[{n:'Shopify売上',ok:d.length>0},{n:'GA4セッション',ok:daily.length>0},{n:'GA4流入元',ok:srcs.length>0},{n:'GA4デバイス別',ok:devs.length>0},{n:'SNS分析',ok:s.length>0}];

// SNSデータをextra_jsonからfallback取得 (ダッシュボード概要タブ等で使用)
function snsVal(row, key){
  if(!row) return 0;
  if(row[key] && row[key]>0) return row[key];
  try{
    const ej=JSON.parse(row.extra_json||'{}');
    if(ej[key]>0) return ej[key];
    const am=ej.account_metrics||{};
    if(am[key]>0) return am[key];
    if(key==='followers'){
      if(ej.friends&&ej.friends.target_reach>0) return ej.friends.target_reach;
    }
    if(key==='reach') return ej.reach_30d||am.reach_30d||0;
    if(key==='impressions') return ej.views_30d||ej.video_views_7d||0;
    if(key==='likes') return ej.interactions_30d||ej.likes_7d||0;
  }catch(e){}
  return row[key]||0;
}

// extra_jsonをパースして account_metrics 相当のオブジェクトを返す
function parseSnsExtra(row){

// SNSデータを platform + account_metrics 形式に正規化
function normalizeSnsRows(sns, platform){
  return sns.filter(x=>x.platform===platform).sort((a,b)=>a.date.localeCompare(b.date)).map(row=>{
    const ej=parseSnsExtra(row);
    const result={date:row.date, is_dummy:ej.collection_method==='sample'};
    if(platform==='instagram'){
      result.account_metrics={
        followers:ej.followers||row.followers||0,
        reach_30d:ej.reach_30d||0,
        interactions_30d:ej.interactions_30d||0,
        profile_access:ej.profile_views||ej.profile_access||0,
        external_link_taps:ej.link_taps||ej.external_link_taps||0,
        views_30d:ej.views_30d||0,
        content_engagement_rate:ej.content_engagement_rate||0
      };
      if(ej.top_posts_30d) result.top_posts_30d=ej.top_posts_30d;
      if(ej.content_view_ratio) result.content_view_ratio=ej.content_view_ratio;
    } else if(platform==='tiktok'){
      result.account_metrics={
        followers_total:ej.followers||row.followers||0,
        followers_change_7d:ej.followers_change_7d||0,
        video_views_7d:ej.video_views_7d||0,
        likes_7d:ej.likes_7d||0,
        comments_7d:ej.comments_7d||0,
        shares_7d:ej.shares_7d||0,
        profile_views_7d:ej.profile_views_7d||0
      };
      if(ej.demographics) result.demographics=ej.demographics;
      if(ej.traffic_sources) result.traffic_sources=ej.traffic_sources;
      if(ej.top_posts_7d) result.top_posts_7d=ej.top_posts_7d;
    } else if(platform==='line'){
      // LINE: extra_json をそのままマージ
      Object.assign(result, ej);
      result.friends=ej.friends||{};
      result.messages=ej.messages||{};
      result.chat=ej.chat||{};
      result.rich_menu=ej.rich_menu||{};
      result.voom=ej.voom||{};
      result.demographics=ej.demographics||{};
      result.broadcasts=ej.broadcasts||[];
    } else if(platform==='threads'){
      result.account_metrics={
        followers:ej.followers||row.followers||0,
        views_30d:ej.views_30d||0,
        interactions_30d:ej.interactions_30d||0
      };
      result.interactions=ej.interactions||{};
      result.view_sources=ej.view_sources||{};
      result.demographics=ej.demographics||{};
    }
    return result;
  });
}

// 日付間を線形補間で埋める (v008移植)
function interpolateDailyMap(sparseMap){
  const dates=Object.keys(sparseMap).sort();
  if(dates.length<2) return sparseMap;
  const d0=new Date(dates[0]),d1=new Date(dates[dates.length-1]);
  const allD=[];
  for(let d=new Date(d0);d<=d1;d.setDate(d.getDate()+1)) allD.push(d.toISOString().slice(0,10));
  const filled={};
  allD.forEach(d=>{filled[d]=sparseMap[d]!==undefined?sparseMap[d]:null});
  let prevIdx=null;
  for(let i=0;i<allD.length;i++){
    if(filled[allD[i]]!==null){
      if(prevIdx!==null&&i-prevIdx>1){
        const v0=filled[allD[prevIdx]],v1=filled[allD[i]];
        for(let j=prevIdx+1;j<i;j++){
          const ratio=(j-prevIdx)/(i-prevIdx);
          filled[allD[j]]=Math.round(v0+(v1-v0)*ratio);
        }
      }
      prevIdx=i;
    }
  }
  return filled;
}

function ttEstimatedFollowers(ttData, targetMetrics){
  if(ttData.length===0) return 0;
  const base=(ttData[0].account_metrics||{}).followers_total||1300;
  const firstChange=(ttData[0].account_metrics||{}).followers_change_7d||0;
  return base+((targetMetrics.followers_change_7d||0)-firstChange);
}

// ===== SEO分析タブ =====
const SEO_SITES={HD:{name:'家来るドクター',color:'#7c3aed'},chiba:{name:'千葉美容',color:'#ec4899'},nishi:{name:'西春クリニック',color:'#0891b2'},yoko:{name:'横浜内科',color:'#ea580c'}};
let seoArtState={page:0,sortKey:'clicks',sortDir:'desc',siteFilter:'all'};
function renderSEO(seoData,articles){
  const el=document.getElementById('tab-seo');
  if(!seoData||seoData.length===0){el.innerHTML='<div class="card"><h2>SEO分析</h2><p>SEOデータがありません。集計更新ボタンでGA4+Search Consoleデータを取得してください。</p></div><div id="seoArticleWrap"></div>';renderSeoArticles(articles||[]);return;}
  // Supabase行をサイト別に分割
  const byKey={};
  seoData.forEach(r=>{const k=r.site_key;if(!byKey[k])byKey[k]=[];byKey[k].push(r)});
  const keys=Object.keys(SEO_SITES).filter(k=>byKey[k]&&byKey[k].length>0);
  if(keys.length===0){el.innerHTML='<div class="card"><h2>SEO分析</h2><p>選択期間内にSEOデータがありません。</p></div><div id="seoArticleWrap"></div>';renderSeoArticles(articles||[]);return;}
  // 各サイトのseriesを日付昇順にソート
  keys.forEach(k=>byKey[k].sort((a,b)=>a.date.localeCompare(b.date)));

  // 直近14日 vs その前14日を比較
  function calcPeriods(series){
    if(!series||series.length<28)return null;
    const recent=series.slice(-14),prev=series.slice(-28,-14);
    const sum=(a,k)=>a.reduce((s,d)=>s+(Number(d[k])||0),0);
    const r={};
    for(const k of['active_users','sessions','clicks','impressions']){
      const rc=sum(recent,k),pv=sum(prev,k);
      r[k]={current:rc,previous:pv,change:pv>0?((rc-pv)/pv*100):0};
    }
    r.ctr_current=r.impressions.current>0?(r.clicks.current/r.impressions.current*100):0;
    r.ctr_previous=r.impressions.previous>0?(r.clicks.previous/r.impressions.previous*100):0;
    r.ctr_change=r.ctr_previous>0?((r.ctr_current-r.ctr_previous)/r.ctr_previous*100):0;
    return r;
  }
  // 移動平均
  function ma7(series,key){
    const r=[];
    for(let i=0;i<series.length;i++){
      if(i<6){r.push(null);continue;}
      let s=0;for(let j=i-6;j<=i;j++)s+=Number(series[j][key])||0;
      r.push(Math.round(s/7));
    }
    return r;
  }
  // 傾向分析テキスト
  function analyzeTrend(siteKey,series){
    const p=calcPeriods(series);
    if(!p)return'データ不足';
    const msgs=[];
    const auC=p.active_users.change;
    if(auC>10)msgs.push(`AU前2週比<strong style="color:#16a34a">+${auC.toFixed(1)}%</strong>好調`);
    else if(auC<-10)msgs.push(`AU前2週比<strong style="color:#dc2626">${auC.toFixed(1)}%</strong>下落傾向`);
    else msgs.push(`AU前2週比${auC>0?'+':''}${auC.toFixed(1)}%横ばい`);
    const clC=p.clicks.change;
    if(clC>15)msgs.push(`クリック<strong style="color:#16a34a">+${clC.toFixed(1)}%</strong>増加`);
    else if(clC<-15)msgs.push(`クリック<strong style="color:#dc2626">${clC.toFixed(1)}%</strong>減少`);
    const ctrNow=p.ctr_current.toFixed(2);
    if(p.ctr_change>10)msgs.push(`CTR ${ctrNow}%（改善傾向）`);
    else if(p.ctr_change<-10)msgs.push(`CTR ${ctrNow}%（低下傾向）`);
    else msgs.push(`CTR ${ctrNow}%（安定）`);
    if(series.length>=28){
      const w4=series.slice(-28,-21).reduce((a,d)=>a+Number(d.active_users),0);
      const w1=series.slice(-7).reduce((a,d)=>a+Number(d.active_users),0);
      if(w1>w4*1.15)msgs.push('直近4週で<strong style="color:#16a34a">上昇トレンド</strong>');
      else if(w1<w4*0.85)msgs.push('直近4週で<strong style="color:#dc2626">下降トレンド</strong>');
    }
    return msgs.join('、');
  }

  // === スコアカード ===
  let totalAU=0,totalClicks=0,totalImp=0,totalSess=0;
  keys.forEach(k=>byKey[k].forEach(r=>{totalAU+=Number(r.active_users)||0;totalClicks+=Number(r.clicks)||0;totalImp+=Number(r.impressions)||0;totalSess+=Number(r.sessions)||0}));
  const dates0=byKey[keys[0]];
  const period=dates0.length?`${dates0[0].date} ～ ${dates0[dates0.length-1].date}`:'';
  let html='<div class="grid grid-4" style="margin-bottom:20px">';
  html+=`<div class="card"><h2>全サイト合計AU</h2><div class="metric">${totalAU.toLocaleString()}</div><div class="metric-sub">${period}</div></div>`;
  html+=`<div class="card"><h2>合計セッション</h2><div class="metric">${totalSess.toLocaleString()}</div></div>`;
  html+=`<div class="card"><h2>合計クリック</h2><div class="metric">${totalClicks.toLocaleString()}</div></div>`;
  html+=`<div class="card"><h2>平均CTR</h2><div class="metric">${totalImp>0?(totalClicks/totalImp*100).toFixed(2):'0'}%</div><div class="metric-sub">全サイト加重平均</div></div>`;
  html+='</div>';

  // === サイト別カード（前2週比較） ===
  html+='<div class="grid grid-4" style="margin-bottom:20px">';
  keys.forEach(k=>{
    const cfg=SEO_SITES[k]||{name:k,color:'#666'};
    const p=calcPeriods(byKey[k]);
    if(!p){html+=`<div class="card"><h2>${cfg.name}</h2><p>データ不足</p></div>`;return;}
    const arrow=(v)=>v>0?`<span style="color:#16a34a">▲+${v.toFixed(1)}%</span>`:(v<0?`<span style="color:#dc2626">▼${v.toFixed(1)}%</span>`:`<span style="color:#888">→${v.toFixed(1)}%</span>`);
    html+=`<div class="card" style="border-left:4px solid ${cfg.color}">
      <h2>${cfg.name}</h2>
      <table style="font-size:12px;width:100%">

function renderSeoArticles(articles){
  const wrap=document.getElementById('seoArticleWrap');
  if(!wrap)return;
  if(!articles||articles.length===0){
    wrap.innerHTML='<div class="card"><h2>記事別SEOデータ</h2><p>記事別データがありません。集計更新ボタンでSearch Consoleデータを取得してください。</p></div>';
    return;
  }
  const st=seoArtState;
  // フィルタ
  let rows=st.siteFilter==='all'?articles:articles.filter(a=>a.site_key===st.siteFilter);
  // ソート
  rows=rows.slice().sort((a,b)=>{
    let av=a[st.sortKey],bv=b[st.sortKey];
    if(typeof av==='string')return (av||'').localeCompare(bv||'','ja')*(st.sortDir==='asc'?1:-1);
    return((av||0)-(bv||0))*(st.sortDir==='asc'?1:-1);
  });
  // 統計
  const total=rows.length;
  const totalClicks=rows.reduce((s,r)=>s+(r.clicks||0),0);
  const totalImp=rows.reduce((s,r)=>s+(r.impressions||0),0);
  const avgCtr=totalImp>0?(totalClicks/totalImp*100).toFixed(2):'0';
  // ページネーション
  const perPage=20;
  const maxPage=Math.max(0,Math.ceil(total/perPage)-1);
  if(st.page>maxPage)st.page=maxPage;
  const start=st.page*perPage;
  const pageRows=rows.slice(start,start+perPage);
  const period=rows[0]?`${rows[0].period_start||''} ～ ${rows[0].period_end||''}`:'';

  // サイトフィルタボタン
  const sites=[{key:'all',name:'全サイト'},...Object.entries(SEO_SITES).map(([k,v])=>({key:k,name:v.name}))];
  let filterHtml=sites.map(s=>`<button onclick="seoArtState.siteFilter='${s.key}';seoArtState.page=0;renderSeoArticles(SEO_ART)" style="padding:4px 12px;border:1px solid ${st.siteFilter===s.key?'#667eea':'#ddd'};background:${st.siteFilter===s.key?'#667eea':'#fff'};color:${st.siteFilter===s.key?'#fff':'#333'};border-radius:6px;cursor:pointer;font-size:12px">${s.name}</button>`).join('');

  // ソートヘッダークリック用
  const sortIcon=(key)=>{
    if(st.sortKey!==key)return'<span style="color:#ccc">⇅</span>';
    return st.sortDir==='asc'?'<span style="color:#667eea">▲</span>':'<span style="color:#667eea">▼</span>';
  };
  const sortClick=(key)=>`onclick="if(seoArtState.sortKey==='${key}'){seoArtState.sortDir=seoArtState.sortDir==='asc'?'desc':'asc'}else{seoArtState.sortKey='${key}';seoArtState.sortDir='desc'};seoArtState.page=0;renderSeoArticles(SEO_ART)"`;

  let h='<div class="card" style="margin-top:20px">';
  h+='<h2>記事別SEO詳細</h2>';
  // 統計バー
  h+=`<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0">`;
  h+=`<span style="font-size:14px;font-weight:700">${fmt(total)} 件</span>`;
  h+=`<span style="font-size:12px;color:#666">合計クリック <strong>${fmt(totalClicks)}</strong></span>`;
  h+=`<span style="font-size:12px;color:#666">合計表示 <strong>${fmt(totalImp)}</strong></span>`;
  h+=`<span style="font-size:12px;color:#666">平均CTR <strong>${avgCtr}%</strong></span>`;
  if(period)h+=`<span style="font-size:11px;color:#999;margin-left:auto">${period}</span>`;
  h+='</div>';
  // フィルタ
  h+=`<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${filterHtml}</div>`;
  // テーブル
  h+=`<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  h+=`<thead><tr style="background:#f1f5f9;border-bottom:2px solid #e2e8f0">`;
  h+=`<th style="padding:8px;text-align:left;cursor:pointer;white-space:nowrap" ${sortClick('site_key')}>サイト ${sortIcon('site_key')}</th>`;
  h+=`<th style="padding:8px;text-align:left;cursor:pointer;min-width:250px" ${sortClick('title')}>記事 ${sortIcon('title')}</th>`;
  h+=`<th style="padding:8px;text-align:right;cursor:pointer;white-space:nowrap" ${sortClick('clicks')}>クリック ${sortIcon('clicks')}</th>`;
  h+=`<th style="padding:8px;text-align:right;cursor:pointer;white-space:nowrap" ${sortClick('impressions')}>表示回数 ${sortIcon('impressions')}</th>`;
  h+=`<th style="padding:8px;text-align:right;cursor:pointer;white-space:nowrap" ${sortClick('ctr')}>CTR ${sortIcon('ctr')}</th>`;
  h+=`<th style="padding:8px;text-align:right;cursor:pointer;white-space:nowrap" ${sortClick('position')}>平均順位 ${sortIcon('position')}</th>`;
  h+=`</tr></thead><tbody>`;
  pageRows.forEach((r,i)=>{
    const bg=i%2===0?'#fff':'#fafafa';
    const siteColor=(SEO_SITES[r.site_key]||{}).color||'#666';
    const siteName=(SEO_SITES[r.site_key]||{}).name||r.site_key;
    const pos=r.position!=null?Number(r.position).toFixed(1):'-';
    const posColor=pos!=='-'?(Number(pos)<=3?'#ca8a04':Number(pos)<=10?'#3b82f6':'#333'):'#999';
    const ctrVal=r.ctr!=null?(Number(r.ctr)*100).toFixed(2)+'%':'-';
    h+=`<tr style="background:${bg};border-bottom:1px solid #f0f0f0">`;
    h+=`<td style="padding:6px 8px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${siteColor};margin-right:4px"></span>${siteName}</td>`;
    h+=`<td style="padding:6px 8px"><a href="${r.url}" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:none" title="${r.url}">${r.title||r.slug}</a>${r.title?`<div style="font-size:10px;color:#94a3b8;margin-top:1px">${r.slug}</div>`:''}</td>`;
    h+=`<td style="padding:6px 8px;text-align:right;font-weight:600">${fmt(r.clicks)}</td>`;
    h+=`<td style="padding:6px 8px;text-align:right">${fmt(r.impressions)}</td>`;
    h+=`<td style="padding:6px 8px;text-align:right">${ctrVal}</td>`;
    h+=`<td style="padding:6px 8px;text-align:right;color:${posColor};font-weight:${Number(pos)<=10?'600':'400'}">${pos}</td>`;
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  // ページネーション
  if(total>perPage){
    h+=`<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:12px;padding:8px">`;
    h+=`<button onclick="seoArtState.page=Math.max(0,seoArtState.page-1);renderSeoArticles(SEO_ART)" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px" ${st.page===0?'disabled':''}>&laquo; 前へ</button>`;
    h+=`<span style="font-size:12px;color:#666">${st.page+1} / ${maxPage+1} ページ（${start+1}～${Math.min(start+perPage,total)} / ${total}件）</span>`;
    h+=`<button onclick="seoArtState.page=Math.min(${maxPage},seoArtState.page+1);renderSeoArticles(SEO_ART)" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px" ${st.page>=maxPage?'disabled':''}> 次へ &raquo;</button>`;
    h+=`</div>`;
  }
  h+='</div>';
  wrap.innerHTML=h;
}

const GAS_SYNC_URL='https://script.google.com/macros/s/AKfycbwo4PPZSf5man_hn4eRB7SBTR2zI8wK21m3up4R7PG8OcjeXrzh4qmvYa3n34KIJvnw/exec';
const SNS_API_URL='http://127.0.0.1:3456';

// SNS収集データをSupabaseにupsert
async function upsertSnsToSupabase(platform, data){
  const today=new Date().toISOString().slice(0,10);
  const am=data.account_metrics||{};
  const friends=data.friends||{};
  const row={
    date:today, platform,
    followers: data.followers||am.followers||friends.target_reach||0,
    posts: data.posts||data.post_count||am.posts||0,
    likes: data.likes||data.total_likes||data.interactions_30d||data.likes_7d||0,
    comments: data.comments||data.comments_7d||0,
    shares: data.shares||data.shares_7d||0,
    impressions: data.impressions||am.views_90d||data.views_30d||data.video_views_7d||0,
    reach: data.reach||am.reach_30d||data.reach_30d||0,
    extra_json: JSON.stringify(data)
  };
  const r=await fetch(`${SB}/rest/v1/kpi_sns_metrics?on_conflict=date,platform`,{
    method:'POST',
    headers:{...H,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify(row)
  });
  return r.ok;
}

async function runSync(){
  const btn=document.getElementById('syncBtn');
  const box=document.getElementById('syncResult');
  btn.disabled=true;btn.textContent='同期中...';
  box.style.display='block';
  box.style.background='#f0f4ff';box.style.border='1px solid #c7d2fe';
  box.innerHTML='<strong>集計実行中...</strong> スプレッドシート・GA4のデータをSupabaseに同期しています。';

  const labels={daily_summary:'日次サマリー',orders:'注文データ',ga4:'GA4',inventory:'在庫',sns:'SNS'};
  let results={};
  let hasError=false;

  // 1. GAS Web App → EC/GA4/在庫 をSupabaseに同期
  try{
    const r=await fetch(GAS_SYNC_URL,{redirect:'follow',signal:AbortSignal.timeout(120000)});
    const gasData=await r.json();
    Object.assign(results,gasData);
  }catch(e){
    results.daily_summary={ok:false,error:'GAS同期失敗: '+e.message};
    results.orders={ok:false,error:'GAS同期失敗: '+e.message};
    results.ga4={ok:false,error:'GAS同期失敗: '+e.message};
    results.inventory={ok:false,error:'GAS同期失敗: '+e.message};
    hasError=true;
  }

  // 2. SNS収集APIサーバー（Chrome起動時に自動起動）→ 収集 → Supabaseに直接書き込み
  box.innerHTML='<strong>集計実行中...</strong> SNSデータを収集しています。';
  try{
    const st=await fetch(SNS_API_URL+'/status',{cache:'no-store',signal:AbortSignal.timeout(3000)}).then(r=>r.json()).catch(()=>null);
    if(st&&st.cdp&&st.cdp.available){
      const openTabs=Object.entries(st.cdp.tabs).filter(([,v])=>v).map(([k])=>k);
      if(openTabs.length>0){
        const cr=await fetch(SNS_API_URL+'/collect',{cache:'no-store',signal:AbortSignal.timeout(180000)});
        const cd=await cr.json();
        if(cd.success&&cd.data){
          let cnt=0;
          for(const[p,d]of Object.entries(cd.data)){
            if(d&&await upsertSnsToSupabase(p,d))cnt++;
          }
          results.sns={ok:true,count:cnt};
          const closed=Object.entries(st.cdp.tabs).filter(([,v])=>!v).map(([k])=>k);
          if(closed.length>0)results.sns.partial_skip='タブ未検出: '+closed.join(', ');
        }else{
          results.sns={ok:false,error:cd.error||'収集失敗'};
        }
      }else{
        results.sns={ok:false,skipped:true,reason:'SNSタブが開いていません（LINE/Instagram/TikTok）'};
      }
    }else if(st){
      results.sns={ok:false,skipped:true,reason:'Chrome CDPに接続できません（--remote-debugging-port=9222で起動してください）'};
    }else{
      results.sns={ok:false,skipped:true,reason:'SNS収集サーバー未起動（Chrome起動.batから起動してください）'};
    }
  }catch(e){
    results.sns={ok:false,skipped:true,reason:'SNS収集エラー: '+e.message};
  }

  // 3. 結果表示
  let html='<strong>同期完了</strong><br>';
  let hasSkip=false;
  for(const[k,v]of Object.entries(results)){
    const label=labels[k]||k;
    if(v.ok){
      html+=`<span style="color:#16a34a">\u2713</span> ${label}: ${v.count||0}件同期`;
      if(v.partial_skip)html+=` <span style="color:#d97706">（${v.partial_skip}）</span>`;
      html+='<br>';
    }else if(v.skipped){
      hasSkip=true;
      html+=`<span style="color:#d97706">\u25b3</span> ${label}: スキップ — ${v.reason}<br>`;
    }else{
      hasError=true;
      html+=`<span style="color:#dc2626">\u2717</span> ${label}: エラー — ${v.error||'不明'}<br>`;
    }
  }
  box.style.background=hasError?'#fef2f2':hasSkip?'#fffbeb':'#f0fdf4';
  box.style.border=hasError?'1px solid #fca5a5':hasSkip?'1px solid #fcd34d':'1px solid #86efac';
  box.innerHTML=html;

  // 4. Supabaseからデータ再読み込み
  try{ await init(); }catch(e){}
  btn.disabled=false;btn.textContent='\u21bb 集計更新';
}
