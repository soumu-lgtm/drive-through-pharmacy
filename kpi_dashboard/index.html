<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC KPI Dashboard - HUNDRED DOCTOR</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root {
  --d-bg: #0f1117;
  --d-surface: #1a1d27;
  --d-elevated: #242836;
  --d-line: #2f3442;
  --d-text: #e4e7ed;
  --d-sub: #8b92a5;
  --d-dim: #5a6178;
  --d-cyan: #00d4aa;
  --d-blue: #5b8def;
  --d-orange: #ff9f43;
  --d-pink: #ff6b81;
  --d-purple: #a78bfa;
  --d-green: #4ade80;
  --d-yellow: #fbbf24;
  --font: "SF Mono", "Cascadia Code", "Consolas", monospace;
  --font-ui: "Inter", "Segoe UI", "Noto Sans JP", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); color: var(--d-text); background: var(--d-bg); line-height: 1.6; }

.dash-header {
  padding: 20px 24px 12px;
  border-bottom: 1px solid var(--d-line);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
.dash-header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.dash-header .meta { font-size: 12px; color: var(--d-dim); }
.sync-info { font-size: 11px; color: var(--d-dim); }
.sync-info .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sync-ok { background: var(--d-cyan); }
.sync-ng { background: var(--d-pink); }

/* Date filter */
.date-filter {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 14px 20px; border-bottom: 1px solid var(--d-line);
  background: var(--d-surface);
}
.date-filter label { font-size: 12px; color: var(--d-sub); font-weight: 600; }
.date-filter input[type="date"] {
  padding: 6px 10px; border: 1px solid var(--d-line); border-radius: 6px;
  background: var(--d-elevated); color: var(--d-text); font-size: 13px;
}
.date-filter input[type="date"]:focus { outline: none; border-color: var(--d-cyan); }
.date-filter .filter-btn {
  padding: 6px 16px; background: var(--d-cyan); color: #0f1117; border: none;
  border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer;
}
.date-filter .filter-btn:hover { opacity: 0.85; }
.date-filter .reset-btn {
  padding: 6px 12px; background: transparent; color: var(--d-sub); border: 1px solid var(--d-line);
  border-radius: 6px; font-size: 12px; cursor: pointer;
}
.date-filter .reset-btn:hover { color: var(--d-text); border-color: var(--d-sub); }
.date-filter .date-range-info { font-size: 11px; color: var(--d-dim); margin-left: auto; }

.tabs {
  display: flex; border-bottom: 1px solid var(--d-line); padding: 0 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 14px; font-size: 12px; color: var(--d-sub); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
}
.tab:hover { color: var(--d-text); }
.tab.active { color: var(--d-cyan); border-bottom-color: var(--d-cyan); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px; padding: 18px 20px;
  max-width: 1440px; margin: 0 auto;
}
.grid-wide { grid-template-columns: 1fr; }
.grid-2col { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
.grid-3col { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.span-full { grid-column: 1 / -1; }

.panel {
  background: var(--d-surface); border: 1px solid var(--d-line);
  border-radius: 8px; padding: 14px 18px;
}
.panel-title {
  font-size: 11px; font-weight: 600; color: var(--d-sub);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-title .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  text-transform: none; letter-spacing: 0; font-weight: 600;
}
.badge-ok { background: rgba(0,212,170,0.15); color: var(--d-cyan); }
.badge-warn { background: rgba(255,159,67,0.15); color: var(--d-orange); }
.badge-err { background: rgba(255,107,129,0.15); color: var(--d-pink); }
.badge-info { background: rgba(91,141,239,0.15); color: var(--d-blue); }

.kpi { font-family: var(--font); font-size: 32px; font-weight: 700; color: var(--d-cyan); line-height: 1; }
.kpi-sm { font-size: 22px; }
.kpi-lg { font-size: 36px; }
.kpi-unit { font-size: 13px; color: var(--d-sub); margin-left: 3px; }
.kpi-sub { font-size: 12px; color: var(--d-dim); margin-top: 4px; }
.kpi-blue { color: var(--d-blue); }
.kpi-orange { color: var(--d-orange); }
.kpi-pink { color: var(--d-pink); }
.kpi-purple { color: var(--d-purple); }
.kpi-green { color: var(--d-green); }
.kpi-yellow { color: var(--d-yellow); }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 6px 8px; color: var(--d-dim); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--d-line); }
td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
tr:hover td { background: rgba(255,255,255,0.02); }
.num { text-align: right; font-family: var(--font); }

.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.bar-label { width: 90px; text-align: right; color: var(--d-sub); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 18px; background: var(--d-elevated); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; min-width: 2px; }
.bar-val { width: 80px; text-align: right; font-family: var(--font); font-size: 11px; color: var(--d-sub); flex-shrink: 0; }

.alert-row { background: rgba(255,107,129,0.08); border-left: 3px solid var(--d-pink); }
.loading { text-align: center; padding: 40px; color: var(--d-dim); font-size: 14px; }

/* Funnel */
.funnel { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 0; flex-wrap: wrap; }
.funnel-step {
  text-align: center; flex: 1; min-width: 110px; max-width: 160px;
  background: var(--d-elevated); border-radius: 10px; padding: 14px 8px;
}
.funnel-step .step-title { font-size: 11px; font-weight: 700; margin-bottom: 6px; }
.funnel-step .step-value { font-family: var(--font); font-size: 22px; font-weight: 700; }
.funnel-step .step-rate { font-size: 11px; color: var(--d-sub); margin-top: 4px; }
.funnel-arrow { font-size: 20px; color: var(--d-dim); flex-shrink: 0; }

/* CVR cards */
.cvr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
.cvr-card {
  border-radius: 10px; padding: 18px; text-align: center;
}
.cvr-card .cvr-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.cvr-card .cvr-desc { font-size: 12px; color: var(--d-sub); margin-bottom: 10px; }
.cvr-card .cvr-value { font-family: var(--font); font-size: 28px; font-weight: 700; }
.cvr-card .cvr-prev { font-size: 11px; color: var(--d-purple); margin-top: 4px; }

/* Chart container */
.chart-container { position: relative; height: 280px; }

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; padding: 12px; gap: 10px; }
  .grid-2col, .grid-3col { grid-template-columns: 1fr; }
  .kpi { font-size: 26px; }
  .dash-header { padding: 14px 16px 10px; }
  .funnel { flex-direction: column; }
  .funnel-arrow { transform: rotate(90deg); }
  .tabs { padding: 0 8px; }
  .tab { padding: 10px 10px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="dash-header">
  <div>
    <h1>EC KPI Dashboard</h1>
    <div class="meta">HUNDRED DOCTOR</div>
  </div>
  <div class="sync-info" id="syncInfo">読み込み中...</div>
</div>

<!-- Date Filter -->
<div class="date-filter">
  <label>開始日:</label>
  <input type="date" id="startDate">
  <label>終了日:</label>
  <input type="date" id="endDate">
  <button class="filter-btn" onclick="applyDateFilter()">適用</button>
  <button class="reset-btn" onclick="resetDateFilter()">リセット</button>
  <div class="date-range-info" id="dateRangeInfo">-</div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="dashboard">ダッシュボード</div>
  <div class="tab" data-tab="charts">グラフ分析</div>
  <div class="tab" data-tab="product">商品別詳細</div>
  <div class="tab" data-tab="analytics">アナリティクス</div>
  <div class="tab" data-tab="report">売上報告</div>
  <div class="tab" data-tab="kpi">KPIレポート</div>
  <div class="tab" data-tab="inventory">在庫状況</div>
  <div class="tab" data-tab="sns">SNS分析</div>
</div>

<!-- ダッシュボード -->
<div class="tab-content active" id="tab-dashboard">
  <div class="grid" id="dashKpis"></div>
  <div class="grid grid-2col" id="dashCharts"></div>
  <div class="grid grid-2col" id="dashExtra"></div>
</div>

<!-- グラフ分析 -->
<div class="tab-content" id="tab-charts">
  <div class="grid grid-wide" id="chartsArea"></div>
</div>

<!-- 商品別詳細 -->
<div class="tab-content" id="tab-product">
  <div class="grid grid-wide" id="productArea"></div>
</div>

<!-- アナリティクス -->
<div class="tab-content" id="tab-analytics">
  <div class="grid" id="ga4Kpis"></div>
  <div class="grid grid-2col" id="ga4Charts"></div>
</div>

<!-- 売上報告 -->
<div class="tab-content" id="tab-report">
  <div class="grid grid-wide" id="reportArea"></div>
</div>

<!-- KPIレポート -->
<div class="tab-content" id="tab-kpi">
  <div class="grid grid-wide" id="kpiArea"></div>
</div>

<!-- 在庫状況 -->
<div class="tab-content" id="tab-inventory">
  <div class="grid grid-wide" id="inventoryTable"></div>
</div>

<!-- SNS分析 -->
<div class="tab-content" id="tab-sns">
  <div class="grid" id="snsKpis"></div>
  <div class="grid grid-2col" id="snsCharts"></div>
</div>

<script>
const SB_URL = 'https://dyjhxkqzxibcpgoefbiv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5amh4a3F6eGliY3Bnb2VmYml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc2MjI5NjUsImV4cCI6MjA2MzE5ODk2NX0.sb_publishable_bOK3qqLHkM1fFOojh3slpg_glKQoP3g';
const H = { 'apikey': SB_KEY };

// Globals
let ALL_DAILY = [], ALL_ORDERS = [], ALL_GA4 = [], ALL_SNS = [], ALL_INV = [], ALL_SYNC = [];
let dateStart = null, dateEnd = null;
let chartInstances = {};

async function sbGet(table, query = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: H });
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

function fmt(n) { return n != null ? Number(n).toLocaleString('ja-JP') : '-'; }
function fmtYen(n) { return n != null ? '¥' + Number(n).toLocaleString('ja-JP') : '-'; }
function pct(a, b) { return b > 0 ? ((a / b) * 100).toFixed(1) + '%' : '-'; }
function dateStr(d) { return d.toISOString().slice(0, 10); }

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

// Date filter
function applyDateFilter() {
  dateStart = document.getElementById('startDate').value || null;
  dateEnd = document.getElementById('endDate').value || null;
  renderAll();
}
function resetDateFilter() {
  dateStart = null; dateEnd = null;
  const dates = ALL_DAILY.map(d => d.date).sort();
  if (dates.length > 0) {
    document.getElementById('startDate').value = dates[0];
    document.getElementById('endDate').value = dates[dates.length - 1];
  }
  renderAll();
}

function filterByDate(arr, dateField = 'date') {
  return arr.filter(d => {
    const v = d[dateField];
    if (!v) return false;
    if (dateStart && v < dateStart) return false;
    if (dateEnd && v > dateEnd) return false;
    return true;
  });
}

async function loadDashboard() {
  try {
    const [daily, orders, ga4, sns, inv, sync] = await Promise.all([
      sbGet('kpi_daily_summary', 'select=*&order=date.desc&limit=1000'),
      sbGet('kpi_orders', 'select=*&order=order_date.desc&limit=2000'),
      sbGet('kpi_ga4_metrics', 'select=*&order=date.desc&limit=500'),
      sbGet('kpi_sns_metrics', 'select=*&order=date.desc&limit=200'),
      sbGet('kpi_inventory', 'select=*&order=snapshot_date.desc&limit=50'),
      sbGet('kpi_sync_status', 'select=*'),
    ]);

    ALL_DAILY = daily; ALL_ORDERS = orders; ALL_GA4 = ga4;
    ALL_SNS = sns; ALL_INV = inv; ALL_SYNC = sync;

    // Set date range
    const allDates = daily.map(d => d.date).sort();
    if (allDates.length > 0) {
      document.getElementById('startDate').value = allDates[0];
      document.getElementById('startDate').min = allDates[0];
      document.getElementById('startDate').max = allDates[allDates.length - 1];
      document.getElementById('endDate').value = allDates[allDates.length - 1];
      document.getElementById('endDate').min = allDates[0];
      document.getElementById('endDate').max = allDates[allDates.length - 1];
      document.getElementById('dateRangeInfo').textContent =
        `データ範囲: ${allDates[0]} ~ ${allDates[allDates.length - 1]}`;
    }

    renderSyncInfo(sync);
    renderAll();
  } catch (e) {
    document.getElementById('syncInfo').innerHTML =
      `<span class="dot sync-ng"></span>読み込みエラー: ${e.message}`;
  }
}

function renderAll() {
  const daily = filterByDate(ALL_DAILY);
  const orders = filterByDate(ALL_ORDERS, 'order_date');
  const ga4 = filterByDate(ALL_GA4);
  const sns = ALL_SNS; // SNS is not date-filtered

  renderDashboard(daily, orders);
  renderCharts(daily);
  renderProduct(orders);
  renderGA4(ga4);
  renderReport(daily, orders);
  renderKPI(daily, orders, ga4, sns);
  renderInventory(ALL_INV);
  renderSNS(sns);
}

function renderSyncInfo(sync) {
  const shopify = sync.find(s => s.sync_type === 'shopify');
  const lastSync = shopify?.last_sync ? new Date(shopify.last_sync).toLocaleString('ja-JP') : '未同期';
  const allOk = sync.filter(s => s.status === 'ok').length;
  document.getElementById('syncInfo').innerHTML =
    `<span class="dot ${allOk > 0 ? 'sync-ok' : 'sync-ng'}"></span>` +
    `最終同期: ${lastSync} (${allOk}/${sync.length} OK)`;
}

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

// ===== 1. ダッシュボード =====
function renderDashboard(daily, orders) {
  const totalRev = daily.reduce((s, d) => s + Number(d.revenue || 0), 0);
  const totalOrders = daily.reduce((s, d) => s + (d.order_count || 0), 0);
  const aov = totalOrders > 0 ? totalRev / totalOrders : 0;
  const totalQty = orders.reduce((s, o) => s + (o.quantity || 0), 0);

  // Fees (approximate from orders)
  const totalFees = 0; // Not in Supabase schema currently

  // Channel breakdown
  const channels = {};
  daily.forEach(d => {
    if (!channels[d.channel]) channels[d.channel] = { revenue: 0, orders: 0 };
    channels[d.channel].revenue += Number(d.revenue || 0);
    channels[d.channel].orders += (d.order_count || 0);
  });

  // Product TOP10
  const products = {};
  orders.forEach(o => {
    const name = o.product_name || '不明';
    const ch = o.channel || '';
    const key = `${name} (${ch})`;
    if (!products[key]) products[key] = { revenue: 0, qty: 0, orders: 0 };
    products[key].revenue += Number(o.total || 0);
    products[key].qty += (o.quantity || 0);
    products[key].orders += 1;
  });
  const prodArr = Object.entries(products).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 10);

  // Subscription analysis
  const subOrders = orders.filter(o => o.is_subscription);
  const subRev = subOrders.reduce((s, o) => s + Number(o.total || 0), 0);
  const subCount = subOrders.length;

  // Customer analysis (unique emails/order_ids)
  const uniqueCustomers = new Set(orders.map(o => o.order_id)).size;

  document.getElementById('dashKpis').innerHTML = `
    <div class="panel">
      <div class="panel-title">売上合計</div>
      <div class="kpi">${fmtYen(totalRev)}</div>
      <div class="kpi-sub">純売上（フィルター期間内）</div>
    </div>
    <div class="panel">
      <div class="panel-title">注文件数</div>
      <div class="kpi kpi-blue kpi-sm">${fmt(totalOrders)}<span class="kpi-unit">件</span></div>
      <div class="kpi-sub">平均単価: ${fmtYen(Math.round(aov))}</div>
    </div>
    <div class="panel">
      <div class="panel-title">商品販売数</div>
      <div class="kpi kpi-purple kpi-sm">${fmt(totalQty)}<span class="kpi-unit">個</span></div>
    </div>
    <div class="panel">
      <div class="panel-title">注文数（ユニーク）</div>
      <div class="kpi kpi-orange kpi-sm">${fmt(uniqueCustomers)}<span class="kpi-unit">件</span></div>
    </div>
  `;

  // Channel bars + Product TOP10
  const chNames = { shopify: 'Shopify', employee: '社割', wholesale: '卸売', amazon: 'Amazon', qoo10: 'Qoo10' };
  const chArr = Object.entries(channels).sort((a, b) => b[1].revenue - a[1].revenue);
  const maxRev = chArr.length > 0 ? chArr[0][1].revenue : 1;
  const colors = ['var(--d-cyan)', 'var(--d-blue)', 'var(--d-orange)', 'var(--d-pink)', 'var(--d-purple)'];

  let chBars = chArr.map(([ch, v], i) => `
    <div class="bar-row">
      <div class="bar-label">${chNames[ch] || ch}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v.revenue/maxRev*100).toFixed(1)}%;background:${colors[i%colors.length]}"></div></div>
      <div class="bar-val">${fmtYen(v.revenue)}</div>
    </div>
  `).join('');

  let chTable = `<table><thead><tr><th>チャネル</th><th class="num">売上</th><th class="num">注文数</th></tr></thead><tbody>`;
  chArr.forEach(([ch, v]) => {
    chTable += `<tr><td>${chNames[ch] || ch}</td><td class="num">${fmtYen(v.revenue)}</td><td class="num">${fmt(v.orders)}件</td></tr>`;
  });
  chTable += '</tbody></table>';

  let prodTable = `<table><thead><tr><th>商品名</th><th class="num">売上</th><th class="num">数量</th></tr></thead><tbody>`;
  prodArr.forEach(([name, v]) => {
    prodTable += `<tr><td>${name.substring(0, 35)}</td><td class="num">${fmtYen(v.revenue)}</td><td class="num">${fmt(v.qty)}個</td></tr>`;
  });
  prodTable += '</tbody></table>';

  document.getElementById('dashCharts').innerHTML = `
    <div class="panel">
      <div class="panel-title">チャネル別売上</div>
      <div class="bar-chart">${chBars || '<div style="color:var(--d-dim)">データなし</div>'}</div>
      <div style="margin-top:12px">${chTable}</div>
    </div>
    <div class="panel">
      <div class="panel-title">商品別売上 TOP10</div>
      ${prodTable}
    </div>
  `;

  // Subscription & Customer analysis
  document.getElementById('dashExtra').innerHTML = `
    <div class="panel">
      <div class="panel-title">定期購入分析</div>
      <table>
        <tr><td>定期注文件数</td><td class="num"><strong>${fmt(subCount)}</strong></td></tr>
        <tr><td>定期売上合計</td><td class="num"><strong>${fmtYen(subRev)}</strong></td></tr>
      </table>
    </div>
    <div class="panel">
      <div class="panel-title">顧客分析</div>
      <table>
        <tr><td>ユニーク注文数</td><td class="num"><strong>${fmt(uniqueCustomers)}</strong></td></tr>
        <tr><td>平均注文額</td><td class="num">${fmtYen(Math.round(aov))}</td></tr>
        <tr><td>総販売数量</td><td class="num">${fmt(totalQty)}個</td></tr>
      </table>
    </div>
  `;
}

// ===== 2. グラフ分析 =====
function renderCharts(daily) {
  // Aggregate by date
  const byDate = {};
  daily.forEach(d => {
    if (!byDate[d.date]) byDate[d.date] = { revenue: 0, orders: 0 };
    byDate[d.date].revenue += Number(d.revenue || 0);
    byDate[d.date].orders += (d.order_count || 0);
  });
  const dates = Object.keys(byDate).sort();
  const revData = dates.map(d => byDate[d].revenue);
  const ordData = dates.map(d => byDate[d].orders);

  // Monthly
  const byMonth = {};
  daily.forEach(d => {
    const m = d.date.slice(0, 7);

  destroyChart('chartDailyRev');
  destroyChart('chartChannelPie');
  destroyChart('chartMonthlyRev');

// ===== 3. 商品別詳細 =====
function renderProduct(orders) {
  // By product & channel
  const products = {};
  orders.forEach(o => {
    const name = o.product_name || '不明';
    if (!products[name]) products[name] = { total: 0, qty: 0, channels: {} };
    products[name].total += Number(o.total || 0);
    products[name].qty += (o.quantity || 0);
    const ch = o.channel || '不明';
    if (!products[name].channels[ch]) products[name].channels[ch] = { revenue: 0, qty: 0 };
    products[name].channels[ch].revenue += Number(o.total || 0);
    products[name].channels[ch].qty += (o.quantity || 0);
  });

  const prodArr = Object.entries(products).sort((a, b) => b[1].total - a[1].total);
  const chNames = { shopify: 'Shopify', employee: '社割', wholesale: '卸売', amazon: 'Amazon', qoo10: 'Qoo10' };

  let html = '';
  prodArr.forEach(([name, data]) => {
    let chRows = Object.entries(data.channels).sort((a, b) => b[1].revenue - a[1].revenue)
      .map(([ch, v]) => `<tr><td>${chNames[ch] || ch}</td><td class="num">${fmtYen(v.revenue)}</td><td class="num">${fmt(v.qty)}個</td></tr>`).join('');
    html += `
      <div class="panel" style="margin-bottom:14px">
        <div class="panel-title">${name} <span class="badge badge-info">${fmtYen(data.total)} / ${fmt(data.qty)}個</span></div>
        <table>
          <thead><tr><th>チャネル</th><th class="num">売上</th><th class="num">数量</th></tr></thead>
          <tbody>${chRows}</tbody>
        </table>
      </div>
    `;
  });

  document.getElementById('productArea').innerHTML = html || '<div class="panel"><div class="loading">データなし</div></div>';
}

  // Daily table
  const dailyRows = dailyMetrics.slice(0, 30).map(d => `

// ===== 5. 売上報告 =====
function renderReport(daily, orders) {
  // Monthly summary
  const byMonth = {};
  daily.forEach(d => {
    const m = d.date.slice(0, 7);
    if (!byMonth[m]) byMonth[m] = { revenue: 0, orders: 0 };
    byMonth[m].revenue += Number(d.revenue || 0);
    byMonth[m].orders += (d.order_count || 0);
  });
  const months = Object.keys(byMonth).sort().reverse();

  // Weekly summary
  const byWeek = {};
  daily.forEach(d => {
    const dt = new Date(d.date);
    const weekStart = new Date(dt); weekStart.setDate(dt.getDate() - dt.getDay());
    const wk = dateStr(weekStart);
    if (!byWeek[wk]) byWeek[wk] = { revenue: 0, orders: 0 };
    byWeek[wk].revenue += Number(d.revenue || 0);
    byWeek[wk].orders += (d.order_count || 0);
  });
  const weeks = Object.keys(byWeek).sort().reverse().slice(0, 12);

  // Prefecture
  const byPref = {};
  orders.forEach(o => {
    const pref = o.prefecture || '不明';
    if (!byPref[pref]) byPref[pref] = { revenue: 0, qty: 0 };
    byPref[pref].revenue += Number(o.total || 0);
    byPref[pref].qty += (o.quantity || 0);
  });
  const prefArr = Object.entries(byPref).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 15);

  let monthlyRows = months.map(m => `
    <tr><td>${m}</td><td class="num">${fmtYen(byMonth[m].revenue)}</td><td class="num">${fmt(byMonth[m].orders)}件</td></tr>
  `).join('');

  let weeklyRows = weeks.map(w => `
    <tr><td>${w}~</td><td class="num">${fmtYen(byWeek[w].revenue)}</td><td class="num">${fmt(byWeek[w].orders)}件</td></tr>
  `).join('');

  let prefRows = prefArr.map(([pref, v]) => `
    <tr><td>${pref}</td><td class="num">${fmtYen(v.revenue)}</td><td class="num">${fmt(v.qty)}個</td></tr>
  `).join('');

  document.getElementById('reportArea').innerHTML = `
    <div class="panel" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
      <div>
        <div class="panel-title">月別売上</div>
        <table>
          <thead><tr><th>月</th><th class="num">売上</th><th class="num">注文数</th></tr></thead>
          <tbody>${monthlyRows}</tbody>
        </table>
      </div>
      <div>
        <div class="panel-title">週別売上（直近12週）</div>
        <table>
          <thead><tr><th>週</th><th class="num">売上</th><th class="num">注文数</th></tr></thead>
          <tbody>${weeklyRows}</tbody>
        </table>
      </div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="panel-title">都道府県別売上（上位15）</div>
      <table>
        <thead><tr><th>都道府県</th><th class="num">売上</th><th class="num">数量</th></tr></thead>
        <tbody>${prefRows || '<tr><td colspan="3">データなし</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

// ===== 6. KPIレポート =====
function renderKPI(daily, orders, ga4, sns) {
  const totalRev = daily.reduce((s, d) => s + Number(d.revenue || 0), 0);
  const totalOrders = daily.reduce((s, d) => s + (d.order_count || 0), 0);
  const dailyGA4 = ga4.filter(g => g.metric_type === 'daily');
  const tSessions = dailyGA4.reduce((s, d) => s + (d.sessions || 0), 0);
  const tCV = dailyGA4.reduce((s, d) => s + (d.conversions || 0), 0);

  // Data source status
  const sources = ga4.filter(g => g.metric_type === 'source');
  const devices = ga4.filter(g => g.metric_type === 'device');

  const dsStatus = [
    { name: 'Shopify売上データ', ok: daily.length > 0 },
    { name: 'GA4セッション数', ok: dailyGA4.length > 0 },
    { name: 'GA4流入元分析', ok: sources.length > 0 },
    { name: 'GA4デバイス別', ok: devices.length > 0 },
    { name: 'SNS分析データ', ok: sns.length > 0 },

  let dsHtml = dsStatus.map(s =>
    `<div style="display:flex;align-items:center;gap:6px;font-size:12px;">

    </div>`
  ).join('');

  // Funnel: Sessions → Purchases
  const funnelVisits = tSessions;
  const funnelPurchases = totalOrders;
  const funnelCVR = pct(funnelPurchases, funnelVisits);

  // Source breakdown for KPI
  const srcGA4 = sources.sort((a, b) => (b.sessions || 0) - (a.sessions || 0));
  let srcGrid = '';
  const srcIcons = { google: '🔍', instagram: '📷', tiktok: '🎵', line: '💬', '(direct)': '🌐', facebook: '📘' };

          <div class="cvr-value" style="color:var(--d-green)">${fmtYen(tSessions > 0 ? Math.round(totalRev / tSessions) : 0)}</div>
        </div>
        <div class="cvr-card" style="background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.3)">
          <div class="cvr-label" style="color:var(--d-purple)">AOV</div>
          <div class="cvr-desc">平均注文額</div>
          <div class="cvr-value" style="color:var(--d-purple)">${fmtYen(totalOrders > 0 ? Math.round(totalRev / totalOrders) : 0)}</div>
        </div>
      </div>
    </div>

    <!-- Source Grid -->
    <div class="panel" style="margin-top:14px">
      <div class="panel-title">流入元別セッション数 <span class="badge badge-info">GA4連携</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:10px">${srcGrid || '<div style="color:var(--d-dim)">データなし</div>'}</div>
    </div>

    <!-- Monthly Funnel Table -->
    <div class="panel" style="margin-top:14px">
      <div class="panel-title">月次ファネル分析 <span class="badge badge-info">GA4 + Shopify</span></div>
      <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-top:10px">
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>月</th><th class="num">訪問</th><th class="num">購入</th><th class="num">CVR</th><th class="num">売上</th></tr></thead>
            <tbody>${monthFunnelRows || '<tr><td colspan="5">データなし</td></tr>'}</tbody>
          </table>
        </div>
        <div class="chart-container"><canvas id="chartMonthlyFunnel"></canvas></div>
      </div>
    </div>

    <!-- 2-col: Product Ranking + Device -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
      <div class="panel">
        <div class="panel-title">商品別売上ランキング <span class="badge badge-ok">Shopify連携</span></div>
        ${prodRankHtml || '<div style="color:var(--d-dim);padding:20px;text-align:center">データなし</div>'}
      </div>
      <div class="panel">
        <div class="panel-title">デバイス別分析 <span class="badge badge-info">GA4連携</span></div>
        ${deviceHtml || '<div style="color:var(--d-dim);padding:20px;text-align:center">データなし</div>'}
      </div>
    </div>

    <!-- SNS Performance -->
    <div class="panel" style="margin-top:14px">
      <div class="panel-title">SNS投稿パフォーマンス <span class="badge badge-ok">CDP連携</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:10px">${snsKpiHtml || '<div style="color:var(--d-dim)">データなし</div>'}</div>
    </div>
  `;

  // Monthly funnel chart
  destroyChart('chartMonthlyFunnel');
  if (allMonths.length > 0) {
    chartInstances['chartMonthlyFunnel'] = new Chart(document.getElementById('chartMonthlyFunnel'), {
      type: 'bar',
      data: {
        labels: allMonths,
        datasets: [
          { label: '訪問', data: allMonths.map(m => (monthlyGA4[m]||{}).sessions||0), backgroundColor: 'rgba(91,141,239,0.5)', yAxisID: 'y' },
          { label: '購入', data: allMonths.map(m => (monthlyOrders[m]||{}).orders||0), backgroundColor: 'rgba(74,222,128,0.5)', yAxisID: 'y' },
          { label: 'CVR%', data: allMonths.map(m => { const s = (monthlyGA4[m]||{}).sessions||0; const o = (monthlyOrders[m]||{}).orders||0; return s > 0 ? ((o/s)*100) : 0; }), type: 'line', borderColor: '#a78bfa', backgroundColor: 'transparent', yAxisID: 'y1', tension: 0.3, pointRadius: 3 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b92a5', font: { size: 10 } } }, datalabels: { display: false } },
        scales: {
          x: { ticks: { color: '#5a6178', font: { size: 10 } }, grid: { display: false } },
          y: { position: 'left', ticks: { color: '#5a6178' }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y1: { position: 'right', ticks: { color: '#a78bfa', callback: v => v.toFixed(1) + '%' }, grid: { display: false } },
        }
      }
    });
  }
}

// ===== 7. 在庫 =====
function renderInventory(inv) {
  const latestDate = inv.length > 0 ? inv[0].snapshot_date : null;
  const latest = inv.filter(i => i.snapshot_date === latestDate);
  const rows = latest.map(i => `
    <tr class="${i.is_alert ? 'alert-row' : ''}">
      <td>${i.sku}</td>
      <td>${i.product_name || '-'}</td>
      <td class="num">${fmt(i.quantity)}</td>
      <td class="num">${fmt(i.threshold)}</td>
      <td>${i.is_alert ? '<span style="color:var(--d-pink)">要補充</span>' : '<span style="color:var(--d-cyan)">OK</span>'}</td>
    </tr>
  `).join('');
  const alertCount = latest.filter(i => i.is_alert).length;

  document.getElementById('inventoryTable').innerHTML = `
    <div class="panel">
      <div class="panel-title">在庫状況（${latestDate || '-'}時点）
        ${alertCount > 0 ? `<span class="badge badge-err">要補充: ${alertCount}件</span>` : '<span class="badge badge-ok">正常</span>'}
      </div>
      <table>
        <thead><tr><th>SKU</th><th>商品名</th><th class="num">在庫数</th><th class="num">閾値</th><th>状態</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5">データなし</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

// ===== 8. SNS分析 =====
function renderSNS(sns) {
  const platforms = ['instagram', 'tiktok', 'line'];
  const latest = {};
  platforms.forEach(p => {
    const d = sns.filter(s => s.platform === p);
    if (d.length > 0) latest[p] = d[0];
  });

  const pNames = { instagram: 'Instagram', tiktok: 'TikTok', line: 'LINE' };
  const pColors = { instagram: 'var(--d-pink)', tiktok: 'var(--d-cyan)', line: 'var(--d-green)' };
  const pIcons = { instagram: '📷', tiktok: '🎵', line: '💬' };

  let kpis = platforms.map(p => {
    const d = latest[p];
    if (!d) return '';
    return `
      <div class="panel">
        <div class="panel-title">${pIcons[p]} ${pNames[p]}</div>
        <div class="kpi kpi-sm" style="color:${pColors[p]}">${fmt(d.followers)}<span class="kpi-unit">followers</span></div>
        <div class="kpi-sub">${d.date} | ${fmt(d.posts)} posts | ${fmt(d.likes)} likes</div>
      </div>
    `;
  }).join('');

  document.getElementById('snsKpis').innerHTML = kpis;

  // Follower trend table
  let rowsByDate = {};
  sns.forEach(s => {
    if (!rowsByDate[s.date]) rowsByDate[s.date] = {};
    rowsByDate[s.date][s.platform] = s;
  });
  const dates = Object.keys(rowsByDate).sort().reverse().slice(0, 30);
  let trs = dates.map(d => {
    const ig = rowsByDate[d].instagram || {};
    const tt = rowsByDate[d].tiktok || {};
    const ln = rowsByDate[d].line || {};
    return `
      <tr>
        <td>${d}</td>
        <td class="num">${fmt(ig.followers)}</td>
        <td class="num">${fmt(ig.likes)}</td>
        <td class="num">${fmt(tt.followers)}</td>
        <td class="num">${fmt(tt.likes)}</td>
        <td class="num">${fmt(ln.followers)}</td>
      </tr>
    `;
  }).join('');

  // Follower chart
  const chartDates = Object.keys(rowsByDate).sort().slice(-60);
  const igFollowers = chartDates.map(d => (rowsByDate[d].instagram || {}).followers || null);
  const ttFollowers = chartDates.map(d => (rowsByDate[d].tiktok || {}).followers || null);
  const lnFollowers = chartDates.map(d => (rowsByDate[d].line || {}).followers || null);

  document.getElementById('snsCharts').innerHTML = `
    <div class="panel span-full">
      <div class="panel-title">フォロワー推移</div>
      <div class="chart-container"><canvas id="chartSNSFollowers"></canvas></div>
    </div>
    <div class="panel span-full">
      <div class="panel-title">SNS詳細データ（直近30日）</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>日付</th><th class="num">IG Followers</th><th class="num">IG Likes</th><th class="num">TT Followers</th><th class="num">TT Likes</th><th class="num">LINE Friends</th></tr></thead>
          <tbody>${trs}</tbody>
        </table>
      </div>
    </div>
  `;

  // SNS chart
  destroyChart('chartSNSFollowers');
  chartInstances['chartSNSFollowers'] = new Chart(document.getElementById('chartSNSFollowers'), {
    type: 'line',
    data: {
      labels: chartDates,
      datasets: [
        { label: 'Instagram', data: igFollowers, borderColor: '#ff6b81', backgroundColor: 'transparent', tension: 0.3, pointRadius: 1, spanGaps: true },
        { label: 'TikTok', data: ttFollowers, borderColor: '#00d4aa', backgroundColor: 'transparent', tension: 0.3, pointRadius: 1, spanGaps: true },
        { label: 'LINE', data: lnFollowers, borderColor: '#4ade80', backgroundColor: 'transparent', tension: 0.3, pointRadius: 1, spanGaps: true },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8b92a5' } }, datalabels: { display: false } },
      scales: {
        x: { ticks: { color: '#5a6178', maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#5a6178' }, grid: { color: 'rgba(255,255,255,0.06)' } }
      }
    }
  });
}

loadDashboard();
</script>
