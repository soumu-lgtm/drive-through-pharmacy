        function applyHistoryFilter() {
            const search = (document.getElementById('history-search')?.value || '').toLowerCase();
            const dateFrom = document.getElementById('history-date-from')?.value || '';
            const dateTo = document.getElementById('history-date-to')?.value || '';

            filteredHistoryData = allHistoryData.filter(h => {
                if (search && !h.medicine.toLowerCase().includes(search)
                    && !(h.patient && h.patient.toLowerCase().includes(search))
                    && !(h.operator && h.operator.toLowerCase().includes(search))) return false;
                if (dateFrom && h.date < dateFrom) return false;
                if (dateTo && h.date > dateTo) return false;
                return true;
            });

            renderHistoryPaged();
        }

        function renderHistoryItem(h) {
            let icon, qtyClass, qtyText;
            if (h.type === 'adjust') {
                icon = '📝'; qtyClass = 'adjust'; qtyText = `→${h.quantity}${h.unit}`;
            } else if (h.type === 'in') {
                icon = '📥'; qtyClass = 'in'; qtyText = `+${h.quantity}${h.unit}`;
            } else {
                icon = '📤'; qtyClass = 'out'; qtyText = `-${h.quantity}${h.unit}`;
            }
            return `
                <div class="history-item">
                    <div class="history-icon ${h.type}">${icon}</div>
                    <div class="history-content">
                        <div class="history-medicine">${h.medicine}</div>
                        <div class="history-detail">${h.date} ${h.time}${h.operator ? ' • ' + h.operator : ''}${h.patient ? ' • ' + h.patient : ''}${h.type === 'adjust' ? ' • 棚卸修正' : ''}</div>
                    </div>
                    <div class="history-qty ${qtyClass}">${qtyText}</div>
                </div>
            `;
        }

        function renderHistoryPaged() {
            const container = document.getElementById('history-list');
            const total = filteredHistoryData.length;

            if (total === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">該当する履歴がありません</div>';
                return;
            }

            if (historyViewMode === 'patient') {
                // 患者別グループ表示
                const groups = {};
                const noPatient = [];
                filteredHistoryData.forEach(h => {
                    const key = h.patient || '';
                    if (!key) { noPatient.push(h); return; }
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(h);
                });
                // 患者名を最終操作日時の新しい順にソート
                const sortedKeys = Object.keys(groups).sort((a, b) => {
                    const aLatest = groups[a][0]?.date + ' ' + groups[a][0]?.time || '';
                    const bLatest = groups[b][0]?.date + ' ' + groups[b][0]?.time || '';
                    return bLatest.localeCompare(aLatest);
                });
                let html = '';
                for (const name of sortedKeys) {
                    const items = groups[name];
                    html += `<div class="history-group-header">
                        <span>${name}</span>
                        <span class="group-count">${items.length}件</span>
                    </div>`;
                    html += items.map(h => renderHistoryItem(h)).join('');
                }
                if (noPatient.length > 0) {
                    html += `<div class="history-group-header" style="background: var(--text-muted);">
                        <span>入庫・棚卸（患者なし）</span>
                        <span class="group-count">${noPatient.length}件</span>
                    </div>`;
                    html += noPatient.map(h => renderHistoryItem(h)).join('');
                }
                html += `<div style="text-align:center; padding:12px; color:var(--text-muted); font-size:13px;">
                    全 ${total} 件（${sortedKeys.length + (noPatient.length ? 1 : 0)} グループ）</div>`;
                container.innerHTML = html;
            } else {
                // 時系列表示（従来通り）
                const showing = Math.min(historyDisplayCount, total);
                const slice = filteredHistoryData.slice(0, showing);
                let html = slice.map(h => renderHistoryItem(h)).join('');

                html += `<div style="text-align:center; padding:12px; color:var(--text-muted); font-size:13px;">
                    ${showing} / ${total} 件表示`;
                if (showing < total) {
                    html += ` <button onclick="loadMoreHistory()" style="margin-left:8px; padding:6px 16px; border:1px solid var(--primary); border-radius:6px; background:white; color:var(--primary); font-size:13px; cursor:pointer;">さらに${Math.min(HISTORY_PAGE_SIZE, total - showing)}件読み込む</button>`;
                }
                html += `</div>`;
                container.innerHTML = html;
            }
        }

        function loadMoreHistory() {
            historyDisplayCount += HISTORY_PAGE_SIZE;
            renderHistoryPaged();
        }

        function setHistoryDatePreset(preset) {
            const today = new Date();
            const toStr = today.toISOString().split('T')[0];
            let fromStr;

            if (preset === 'today') {
                fromStr = toStr;
            } else if (preset === 'week') {
                const d = new Date(today);
                d.setDate(d.getDate() - 7);
                fromStr = d.toISOString().split('T')[0];
            } else if (preset === 'month') {
                const d = new Date(today);
                d.setDate(d.getDate() - 30);
                fromStr = d.toISOString().split('T')[0];
            } else {
                // all - clear dates
                document.getElementById('history-date-from').value = '';
                document.getElementById('history-date-to').value = '';
                filterHistory();
                return;
            }

            document.getElementById('history-date-from').value = fromStr;
            document.getElementById('history-date-to').value = toStr;
            filterHistory();
        }

        // ===== 手動選択モーダル（カテゴリドリルダウン） =====
        let modalDrillPath = []; // e.g. [] → ['成人'] → ['成人','解熱鎮痛剤']

        // カテゴリ→アイコンマッピング
        const catIcons = {
            '成人': '🧑', '小児': '👶', '外用': '💊',
            '解熱鎮痛剤': '🌡️', '咳止め': '😷', '止血剤': '🩹', '去痰剤': '💨',
            '整腸剤': '🫁', '抗アレルギー剤': '🤧', '吐気止め': '🤢', '鎮暈剤': '😵',
            '消化性潰瘍用剤': '💊', '抗生剤': '💉', '漢方薬': '🍃', '抗インフルエンザ薬': '🦠',
            '口腔用剤': '👄', 'ホルモン剤': '⚗️', '抗菌剤': '🧫', '抗ヘルペスウィルス薬': '🧬',
            '睡眠導入剤': '😴', '降圧剤': '❤️', '止痢剤': '🚿', '下剤': '🚽',
            '解熱薬': '🌡️', '熱性けいれん緩和剤': '⚡',
            '抗生剤/セフェム系': '💉', '抗生剤/マクロライド系': '💉', '抗生剤/ペニシリン系': '💉',
            '抗生物質製剤': '🧴', '副腎皮質ホルモン剤': '🧴', 'ステロイド': '🧴',
            '血行促進・皮膚保湿剤': '🧴', '軟膏基剤': '🧴', 'ヒスタミンH1受容体拮抗薬': '👁️',
            '気管支拡張剤': '🫁', '気管支痙攣の緩解': '🫁', '解熱鎮痛消炎剤': '🌡️',
            'Flu+Covid19': '🧪', 'StrepA': '🧪',
            '鎮痙剤': '💊', '消炎鎮痛剤': '🩹', '浣腸剤': '🚿', '点眼薬': '👁️',
            '検査キット': '🧪', '救急薬': '🚑', '抗不安薬': '😌', '消炎剤': '🩹',
            '保湿剤': '🧴',
        };

        // ===== モーダル薬品選択（在庫タブと同じフィルタ方式） =====
        let modalCatFilter = '';
        let modalWeightFilter = '';
        let modalSelectedCodes = new Set();

        function openManualSelect() {
            modalCatFilter = '';
            modalWeightFilter = '';
            modalSelectedCodes.clear();
            document.getElementById('modal-search').value = '';
            // フィルタボタンリセット
            document.querySelectorAll('#modal-cat-filter .cat-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('#modal-cat-filter .cat-btn').classList.add('active');
            document.querySelectorAll('#modal-weight-filter .weight-btn').forEach(b => b.classList.remove('active'));
            updateModalAddBar();
            document.getElementById('manual-modal').classList.add('show');
            renderModalList();
        }

        function closeManualSelect() {
            document.getElementById('manual-modal').classList.remove('show');
        }

        function setModalCatFilter(cat, ev) {
            modalCatFilter = cat;
            if (cat !== '小児') modalWeightFilter = '';
            document.querySelectorAll('#modal-cat-filter .cat-btn').forEach(b => b.classList.remove('active'));
            ev.target.classList.add('active');
            if (cat !== '小児') {
                document.querySelectorAll('#modal-weight-filter .weight-btn').forEach(b => b.classList.remove('active'));
            }
            renderModalList();
        }

        function setModalWeightFilter(w, ev) {
            modalWeightFilter = w;
            document.querySelectorAll('#modal-weight-filter .weight-btn').forEach(b => b.classList.remove('active'));
            if (w) {
                ev.target.classList.add('active');
                modalCatFilter = '小児';
                document.querySelectorAll('#modal-cat-filter .cat-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('#modal-cat-filter .cat-btn').forEach(b => {
                    if (b.textContent === '小児') b.classList.add('active');
                });
            }
            renderModalList();
        }

        function toggleModalCheck(code, ev) {
            ev.stopPropagation();
            if (modalSelectedCodes.has(code)) {
                modalSelectedCodes.delete(code);
            } else {
                modalSelectedCodes.add(code);
            }
            const el = ev.target.closest('.medicine-item');
            if (el) el.classList.toggle('checked', modalSelectedCodes.has(code));
            const cb = el?.querySelector('.modal-checkbox');
            if (cb) cb.checked = modalSelectedCodes.has(code);
            updateModalAddBar();
        }

        function updateModalAddBar() {
            const bar = document.getElementById('modal-add-bar');
            const count = modalSelectedCodes.size;
            document.getElementById('modal-select-count').textContent = `${count}件選択中`;
            bar.classList.toggle('show', count > 0);
        }

        function addModalSelected() {
            if (modalSelectedCodes.size === 0) return;
            for (const code of modalSelectedCodes) {
                const medicine = stockData.find(m => m.code === code);
                if (medicine) addToBatchDirect(medicine);
            }
            showToast(`${modalSelectedCodes.size}件をリストに追加しました`, 'success');
            modalSelectedCodes.clear();
            updateModalAddBar();
            closeManualSelect();
            setTimeout(() => {
                const batchCard = document.getElementById('batch-card');
                if (batchCard) batchCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function clearModalSelected() {
            modalSelectedCodes.clear();
            updateModalAddBar();
            document.querySelectorAll('#modal-list .medicine-item.checked').forEach(el => el.classList.remove('checked'));
            document.querySelectorAll('#modal-list .modal-checkbox').forEach(cb => cb.checked = false);
        }

        function renderModalList() {
            const container = document.getElementById('modal-list');
            const search = (document.getElementById('modal-search').value || '').trim().toLowerCase();
            const wMap = modalWeightFilter ? weightDoseMap[modalWeightFilter] : null;

            let filtered = stockData.filter(m => {
                if (search && !m.name.toLowerCase().includes(search) && !m.code.includes(search) && !(m.category || '').toLowerCase().includes(search)) return false;
                if (modalCatFilter && !(m.category || '').startsWith(modalCatFilter)) return false;
                if (wMap && !wMap.codes.includes(m.code)) return false;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">該当なし</div>';
                return;
            }

            let html = '';
            if (wMap) {
                html += `<div style="background:#fff3e0; padding:8px 12px; border-radius:8px; font-size:13px; color:#e65100; font-weight:600; margin-bottom:8px;">
                    📏 ${wMap.label} の処方用量で表示中</div>`;
            }
            html += filtered.map(m => {
                const subCat = (m.category || '').split('/').slice(1).join('/');
                const isExt = (m.category || '').replace('[旧]','').startsWith('外用');
                const stockText = isExt ? '外部薬局' : '在庫: ' + m.stock + m.unit;
                const isChecked = modalSelectedCodes.has(m.code);
                const doseNote = wMap && wMap.notes && wMap.notes[m.code] ? wMap.notes[m.code] : '';
                return `
                <div class="medicine-item${isChecked ? ' checked' : ''}" onclick="toggleModalCheck('${m.code}', event)">
                    <input type="checkbox" class="modal-checkbox" ${isChecked ? 'checked' : ''} onclick="toggleModalCheck('${m.code}', event)">
                    <div>
                        <div class="medicine-item-name">${m.name}${doseNote ? ` <span class="weight-dose-badge">${doseNote}</span>` : ''}</div>
                        <div class="medicine-item-stock">${stockText}${subCat ? ' ｜ ' + subCat : ''}</div>
                    </div>
                </div>`;
            }).join('');
            container.innerHTML = html;
        }

        function filterModalList() {
            renderModalList();
        }

        // ===== 送信確認ポップアップ =====
        function showConfirmPopup() {
            const modeLabel = currentMode === 'in' ? '入庫' : currentMode === 'adjust' ? '棚卸修正' : '出庫';
            document.getElementById('confirm-title').textContent = `${modeLabel}内容の確認（${batchItems.length}件）`;

            let html = batchItems.map(item => `
                <div class="confirm-item">
                    <div class="confirm-item-name">${item.medicine.name}</div>
                    <div class="confirm-item-qty">${currentMode === 'adjust' ? '→' : currentMode === 'in' ? '+' : '-'}${item.quantity}${item.medicine.unit}</div>
                </div>
            `).join('');
            document.getElementById('confirm-items').innerHTML = html;

            const operator = document.getElementById('operator-select').value;
            const entryDate = document.getElementById('entry-date').value;
            const patient = currentMode === 'out' ? document.getElementById('patient-input').value : '';
            let meta = `担当者: ${operator} ｜ 入力日: ${entryDate}`;
            if (patient) meta += ` ｜ 患者: ${patient}`;
            document.getElementById('confirm-meta').textContent = meta;

            document.getElementById('confirm-overlay').classList.add('show');
        }

        function closeConfirm() {
            document.getElementById('confirm-overlay').classList.remove('show');
        }

        function confirmAndSubmit() {
            closeConfirm();
            doSubmitAll();
        }

        // ===== 初期化 =====
        const patientInput = document.getElementById('patient-input');

        patientInput.addEventListener('input', function() {
            selectedPatient = null;
            showPatientAutocomplete(this.value);
            updateActionButtons();
        });

        patientInput.addEventListener('blur', function() {
            hidePatientAutocomplete();
        });

        patientInput.addEventListener('focus', function() {
            if (this.value) {
                showPatientAutocomplete(this.value);
            }
        });

        // 入力日を当日に初期化
        document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

        setMode(currentMode);
        renderStockList();

        // iPhoneでキーボード表示時、入力中の文字が隠れないよう自動スクロール
        document.querySelectorAll('#add-medicine-form input, #add-medicine-form select').forEach(el => {
            el.addEventListener('focus', function() {
                setTimeout(() => {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300); // キーボード出現を待つ
            });
        });

        if (USE_GAS) {
            showToast('データを読み込み中...', '');
            loadStockFromGAS();
            loadHistoryFromGAS();
        }
    </script>
