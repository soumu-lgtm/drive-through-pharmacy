        }

            border-radius: 16px;
            padding: 20px;

        .control-group {

        .control-group label {

            color: #888;
            font-weight: 500;
        }

        select, input[type="text"] {

            border-radius: 8px;
            background: #2a2a4a;
            color: #fff;
            font-size: 14px;
            min-width: 180px;
        }

        select option {
            background: #2a2a4a;
            color: #fff;
            padding: 8px;
        }

        select option:hover, select option:checked {
            background: #4a9eff;
            color: #fff;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a9eff 0%, #6c5ce7 100%);

        }

        .btn-primary:hover {

        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #4a9eff;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .question-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        .question-item:hover {
            border-color: rgba(74, 158, 255, 0.5);
        }

            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;

            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

            margin-left: 16px;
            color: #ccc;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            color: #666;
            font-size: 20px;
            transition: transform 0.3s;
        }

        .question-item.expanded .expand-icon {

        }

        .question-detail {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-item.expanded .question-detail {
            display: block;
        }

        .question-text {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin: 16px 0;
            line-height: 1.8;
            font-size: 15px;
        }

            flex-direction: column;
            gap: 8px;
            margin: 16px 0;
        }

        .choice {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.2s;
        }

        .choice:hover {
            background: rgba(255, 255, 255, 0.1);
        }

            color: #4a9eff;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;

        }

        }

            border: none;
            border-radius: 8px;

        }

        }

            color: #888;
            margin-bottom: 4px;
        }

            font-weight: 700;
            color: #2ed573;
        }

            padding: 60px 20px;

        }

            margin-bottom: 16px;

            padding: 24px;

            left: 0;

        }

        let filteredQuestions = [...questions];

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();

            // フィルターイベント
            document.getElementById('subjectFilter').addEventListener('change', applyFilters);
            document.getElementById('sectionFilter').addEventListener('change', applyFilters);
            document.getElementById('examFilter').addEventListener('change', applyFilters);
            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
        });

        // デバウンス関数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // フィルター適用
        function applyFilters() {
            const subject = document.getElementById('subjectFilter').value;
            const section = document.getElementById('sectionFilter').value;
            const exam = document.getElementById('examFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            filteredQuestions = questions.filter(q => {
                if (subject && q.subject !== subject) return false;
                if (section && q.section !== section) return false;
                if (exam && q.exam_number !== exam) return false;
                if (search && !q.question_text.toLowerCase().includes(search) &&
                    !q.choice_a.toLowerCase().includes(search) &&
                    !q.choice_b.toLowerCase().includes(search) &&
                    !q.choice_c.toLowerCase().includes(search) &&
                    !q.choice_d.toLowerCase().includes(search) &&
                    !q.choice_e.toLowerCase().includes(search) &&
                    !(q.keywords && q.keywords.join(' ').toLowerCase().includes(search))) return false;
                return true;
            });

            document.getElementById('filteredCount').textContent = filteredQuestions.length;
            renderQuestions();

            // ランダムモード終了
            document.getElementById('randomMode').classList.remove('active');
        }

        // リセット
        function resetFilters() {
            document.getElementById('subjectFilter').value = '';
            document.getElementById('sectionFilter').value = '';
            document.getElementById('examFilter').value = '';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }


        // 画像関連の変数
        let currentModalImages = [];
        let currentImageIndex = 0;

        // 問題IDから画像を取得
        function getQuestionImages(q) {
            const questionId = `${q.exam_number}${q.section}${q.question_number}`;
            // ローカル画像マッピングがあればそちらを使う
            if (imageMapping[questionId] && imageMapping[questionId].length > 0) {
                return imageMapping[questionId].map(img => IMAGE_BASE_PATH + img);
            }
            // 外部画像URL（耳鼻咽喉科全回データ）
            if (q.external_images && q.external_images.length > 0) {
                return q.external_images;
            }
            return [];
        }

        // 画像HTMLを生成
        function renderQuestionImages(q) {
            const images = getQuestionImages(q);
            if (images.length === 0) return '';

            const imagesHtml = images.map((img, idx) => `
                <div class="question-image-container">
                    <img class="question-image"
                         src="${img}"
                         alt="別冊画像 ${idx + 1}"
                         onclick="openImageModal('${q.exam_number}${q.section}${q.question_number}', ${idx})"
                         loading="lazy"
                         onerror="this.style.display='none'">
                </div>
            `).join('');

            return `<div class="question-images">${imagesHtml}</div>`;
        }

        // モーダルを開く
        function openImageModal(questionId, startIndex) {
            // フィルタ済みの問題から画像を取得
            const q = questions.find(q => `${q.exam_number}${q.section}${q.question_number}` === questionId);
            currentModalImages = q ? getQuestionImages(q) : [];
            currentImageIndex = startIndex;
            updateModalImage();
            document.getElementById('imageModal').classList.add('active');
        }

        // モーダルを閉じる
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // 前の画像
        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + currentModalImages.length) % currentModalImages.length;
            updateModalImage();
        }

        // 次の画像
        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentModalImages.length;
            updateModalImage();
        }

        // モーダル画像を更新
        function updateModalImage() {
            document.getElementById('modalImage').src = currentModalImages[currentImageIndex];
            document.getElementById('imageCounter').textContent =
                `${currentImageIndex + 1} / ${currentModalImages.length}`;
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('imageModal').classList.contains('active')) {
                if (e.key === 'Escape') closeImageModal();
                if (e.key === 'ArrowLeft') prevImage();
                if (e.key === 'ArrowRight') nextImage();
            }
        });


        // 問題リスト描画
        function renderQuestions() {
            const container = document.getElementById('questionList');

            if (filteredQuestions.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <p>該当する問題が見つかりませんでした</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredQuestions.map((q, idx) => `
                <div class="question-item" id="q-${idx}">
                    <div class="question-header" onclick="toggleQuestion(${idx})">
                        <div class="question-meta">
                            <span class="question-badge">${q.exam_number}${q.section}${q.question_number}</span>${getQuestionImages(q).length > 0 ? '<span class="image-badge">画像</span>' : ''}
                            <span class="subject-badge">${q.subject}</span>${q.correct_rate ? `<span style="font-size:0.75em;padding:2px 8px;border-radius:10px;background:${parseInt(q.correct_rate)>=80?'rgba(76,175,80,0.2);color:#66bb6a':parseInt(q.correct_rate)>=50?'rgba(255,193,7,0.2);color:#ffd54f':'rgba(244,67,54,0.2);color:#ef5350'}">${q.correct_rate}</span>` : ''}
                        </div>
                        <div class="question-preview">${q.question_text.substring(0, 80)}...</div>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="question-detail">
                        <div class="question-text">${q.question_text}</div>
                        ${renderQuestionImages(q)}
                        <div class="choices" id="choices-${idx}">
                            ${renderChoices(q, idx, false)}
                        </div>
                        <div class="answer-section">
                            <button class="answer-btn" onclick="showAnswer(${idx}, event)">正答を表示</button>
                            <div class="answer-display" id="answer-${idx}">
                                <div class="answer-label">正答</div>
                                <div class="answer-value">${q.answer.toUpperCase()}</div>
                                ${q.correct_rate ? `<div class="correct-rate" style="margin-top:8px;padding:6px 14px;background:${parseInt(q.correct_rate)>=80?'rgba(76,175,80,0.15);color:#66bb6a':parseInt(q.correct_rate)>=50?'rgba(255,193,7,0.15);color:#ffd54f':'rgba(244,67,54,0.15);color:#ef5350'};border-radius:8px;font-size:0.9em;display:inline-block;">正答率 <strong>${q.correct_rate}</strong></div>` : ''}
                            </div>
                        </div>
                        ${q.keywords && q.keywords.length > 0 ? `<div class="keyword-tags">${q.keywords.map(k => `<span class="keyword-tag" onclick="event.stopPropagation();document.getElementById('searchInput').value=\'${k}\';applyFilters();">${k}</span>`).join('')}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 選択肢描画
        function renderChoices(q, idx, showAnswer) {
            const choices = [
                { letter: 'a', text: q.choice_a },
                { letter: 'b', text: q.choice_b },
                { letter: 'c', text: q.choice_c },
                { letter: 'd', text: q.choice_d },
                { letter: 'e', text: q.choice_e },
            ].filter(c => c.text);

            return choices.map(c => {
                const isCorrect = showAnswer && q.answer.toLowerCase().includes(c.letter);
                return `
                    <div class="choice ${isCorrect ? 'correct' : ''}">
                        <span class="choice-letter">${c.letter.toUpperCase()}</span>
                        <span class="choice-text">${c.text}</span>
                    </div>
                `;
            }).join('');
        }

        // 問題展開/折りたたみ
        function toggleQuestion(idx) {
            const item = document.getElementById(`q-${idx}`);
            item.classList.toggle('expanded');
        }

        // 正答表示
        function showAnswer(idx, event) {
            event.stopPropagation();
            const q = filteredQuestions[idx];

            // 正答の選択肢をハイライト
            document.getElementById(`choices-${idx}`).innerHTML = renderChoices(q, idx, true);

            // 正答表示
            document.getElementById(`answer-${idx}`).classList.add('visible');
        }

        // ランダム出題
        function randomQuestion() {
            const pool = filteredQuestions.length > 0 ? filteredQuestions : questions;
            const randomIdx = Math.floor(Math.random() * pool.length);
            const q = pool[randomIdx];

            document.getElementById('randomMode').classList.add('active');
            document.getElementById('randomQuestion').innerHTML = `
                <div class="question-item expanded" style="margin: 0;">
                    <div class="question-header" style="cursor: default;">
                        <div class="question-meta">
                            <span class="question-badge">第${q.exam_number}回 ${q.section}${q.question_number}</span>
                            <span class="subject-badge">${q.subject}</span>${q.correct_rate ? `<span style="font-size:0.75em;padding:2px 8px;border-radius:10px;background:${parseInt(q.correct_rate)>=80?'rgba(76,175,80,0.2);color:#66bb6a':parseInt(q.correct_rate)>=50?'rgba(255,193,7,0.2);color:#ffd54f':'rgba(244,67,54,0.2);color:#ef5350'}">正答率 ${q.correct_rate}</span>` : ''}
                        </div>
                    </div>
                    <div class="question-detail" style="display: block;">
                        <div class="question-text">${q.question_text}</div>
                        ${renderQuestionImages(q)}
                        <div class="choices" id="random-choices">
                            ${renderRandomChoices(q, false)}
                        </div>
                        <div class="answer-section">
                            <button class="answer-btn" onclick="showRandomAnswer()">正答を表示</button>
                            <div class="answer-display" id="random-answer">
                                <div class="answer-label">正答</div>
                                <div class="answer-value">${q.answer.toUpperCase()}</div>
                                ${q.correct_rate ? `<div class="correct-rate" style="margin-top:8px;padding:6px 14px;background:${parseInt(q.correct_rate)>=80?'rgba(76,175,80,0.15);color:#66bb6a':parseInt(q.correct_rate)>=50?'rgba(255,193,7,0.15);color:#ffd54f':'rgba(244,67,54,0.15);color:#ef5350'};border-radius:8px;font-size:0.9em;display:inline-block;">正答率 <strong>${q.correct_rate}</strong></div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 現在のランダム問題を保存
            window.currentRandomQuestion = q;

            // ページトップへスクロール
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderRandomChoices(q, showAnswer) {
            const choices = [
                { letter: 'a', text: q.choice_a },
                { letter: 'b', text: q.choice_b },
                { letter: 'c', text: q.choice_c },
                { letter: 'd', text: q.choice_d },
                { letter: 'e', text: q.choice_e },
            ].filter(c => c.text);

            return choices.map(c => {
                const isCorrect = showAnswer && q.answer.toLowerCase().includes(c.letter);
                return `
                    <div class="choice ${isCorrect ? 'correct' : ''}">
                        <span class="choice-letter">${c.letter.toUpperCase()}</span>
                        <span class="choice-text">${c.text}</span>
                    </div>
                `;
            }).join('');
        }

        function showRandomAnswer() {
            const q = window.currentRandomQuestion;
            document.getElementById('random-choices').innerHTML = renderRandomChoices(q, true);
            document.getElementById('random-answer').classList.add('visible');
        }

        function exitRandomMode() {
            document.getElementById('randomMode').classList.remove('active');
        }
    </script>
