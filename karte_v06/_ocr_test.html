<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>OCR Test</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="name_dict.js"></script>
<script src="ocr_engine.js"></script>
<script src="insurance_calc.js"></script>
</head>
<body style="font-family:sans-serif;padding:20px;">
<h2>保険証OCRテスト</h2>
<input type="file" id="fileInput" accept="image/*">
<div id="status" style="margin:10px 0;font-weight:bold;"></div>
<div style="display:flex;gap:20px;">
  <div><h3>入力画像</h3><img id="preview" style="max-width:400px;border:1px solid #ccc;"></div>
  <div><h3>前処理結果</h3><canvas id="processedCanvas" style="max-width:400px;border:1px solid #ccc;"></canvas></div>
</div>
<div id="results" style="margin-top:20px;"></div>

<script>
document.getElementById('fileInput').onchange = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const dataUrl = ev.target.result;
    document.getElementById('preview').src = dataUrl;

    const img = new Image();
    img.src = dataUrl;
    await new Promise(r => img.onload = r);

    statusEl.textContent = 'OCR実行中...';

    try {
      // 前処理プレビュー
      const processed = OCR_ENGINE.preprocessInsuranceCard(img);
      const pCanvas = document.getElementById('processedCanvas');
      pCanvas.width = Math.min(processed.width, 800);
      pCanvas.height = Math.round(processed.height * (pCanvas.width / processed.width));
      pCanvas.getContext('2d').drawImage(processed, 0, 0, pCanvas.width, pCanvas.height);

      // OCR実行
      const result = await OCR_ENGINE.recognize(img, (s, p) => {
        statusEl.textContent = s + ' ' + p + '%';
      });

      const fields = result._mergedFields || OCR_ENGINE.extractInsuranceFields(result.text);

      // 正解との比較
      const correct = {
        insurerNumber: '01230010',
        symbol: '8010441',
        memberNumber: '30',
        name: '佐川伸也',
        nameKana: 'サガワ シンヤ',
        dob: '1992-04-16',
        sex: '男',
      };

      let html = '<h3>抽出結果</h3><table border="1" cellpadding="6" style="border-collapse:collapse;font-size:13px;">';
      html += '<tr><th>フィールド</th><th>OCR結果</th><th>正解</th><th>判定</th></tr>';
      for (const key of Object.keys(correct)) {
        const val = fields[key] || '(未検出)';
        const ok = val && val.replace(/[\s　-]/g, '') === correct[key].replace(/[\s　-]/g, '');
        html += '<tr><td>' + key + '</td><td>' + val + '</td><td>' + correct[key] + '</td>';
        html += '<td style="background:' + (ok ? '#dcfce7' : '#fce4ec') + ';">' + (ok ? 'OK' : 'NG') + '</td></tr>';
      }
      html += '</table>';
      html += '<p>信頼度スコア: ' + (fields.confidence || 0) + '/100</p>';
      html += '<h3>生テキスト</h3><pre style="background:#f5f5f5;padding:10px;max-height:300px;overflow:auto;font-size:11px;">' + (result.text || '').replace(/</g, '&lt;') + '</pre>';

      resultsEl.innerHTML = html;
      statusEl.textContent = '完了（信頼度: ' + (fields.confidence || 0) + '）';
    } catch(err) {
      statusEl.textContent = 'エラー: ' + err.message;
      resultsEl.textContent = err.stack;
    }
  };
  reader.readAsDataURL(file);
};
</script>
</body></html>
