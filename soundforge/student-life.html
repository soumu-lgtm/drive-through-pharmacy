<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現代学生生活 BGM＆背景セット | SoundForge AI</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --card-radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .header h1 span { color: var(--accent); }
    .header .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .header .badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.8rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.8rem;
    }
    .header .badge strong { color: var(--green); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.8rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    .stats-bar .stat strong { color: var(--text); }

    /* Grid */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.2rem;
    }

    /* Scene Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    /* Thumbnail */
    .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--surface2);
      overflow: hidden;
      cursor: pointer;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 2rem;
    }
    .card-thumb .scene-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 0.8rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-weight: 600;
      font-size: 1rem;
    }
    .card-thumb .scene-name small {
      display: block;
      color: var(--text-dim);
      font-weight: 400;
      font-size: 0.75rem;
    }

    /* Card body */
    .card-body {
      padding: 0.8rem;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }
    .card-bgm-style {
      font-size: 0.75rem;
      color: var(--orange);
      margin-bottom: 0.8rem;
    }

    /* Audio player */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.6rem;
    }
    .play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .play-btn:hover { background: var(--accent-hover); }
    .play-btn:disabled { opacity: 0.3; cursor: default; }
    .play-btn svg { fill: #fff; width: 14px; height: 14px; }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }
    .time-display {
      font-size: 0.7rem;
      color: var(--text-dim);
      min-width: 35px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .audio-pending {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 0.6rem;
      background: var(--surface2);
      border-radius: 8px;
      margin-bottom: 0.6rem;
    }

    /* Download buttons */
    .download-row {
      display: flex;
      gap: 0.4rem;
    }
    .dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.45rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .dl-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }
    .dl-btn:disabled, .dl-btn.disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }
    .dl-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .dl-btn.image-dl { color: var(--green); }
    .dl-btn.audio-dl { color: var(--accent); }

    /* Status badges */
    .status-ready { color: var(--green); }
    .status-pending { color: var(--text-dim); }

    /* Image modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }
    .modal-overlay.active { display: flex; }
    .modal-overlay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      cursor: default;
    }
    .modal-close {
      position: fixed;
      top: 1rem;
      right: 1rem;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
      background: none;
      border: none;
      line-height: 1;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>現代学生生活</span> BGM＆背景セット</h1>
    <div class="subtitle">TRPG・ストーリー動画・ゲーム制作向け フリー素材</div>
    <div class="badge">シーン数: <strong id="scene-count">20</strong> | 公開済み: <strong id="ready-count">0</strong></div>
  </div>

  <div class="stats-bar">
    <div class="stat">背景画像: <strong id="img-count">0</strong>枚</div>
    <div class="stat">BGM: <strong id="bgm-count">0</strong>曲</div>
    <div class="stat">形式: PNG / MP3</div>
    <div class="stat">ライセンス: 個人・非商用利用可</div>
  </div>

  <div class="container">
    <div class="grid" id="scene-grid"></div>
  </div>

  <!-- Image modal -->
  <div class="modal-overlay" id="imageModal">
    <button class="modal-close" id="modalClose">&times;</button>
    <img id="modalImage" src="" alt="">
  </div>

  <div class="footer">
    SoundForge AI &mdash; AI-Generated BGM &amp; Backgrounds<br>
    Powered by Suno AI &amp; Stable Diffusion
  </div>

  <script src="assets/js/scenes.js"></script>
  <script>
    // ---- SVG Icons ----
    const ICON_PLAY = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    const ICON_DL = '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>';
    const ICON_IMG = '<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>';

    // ---- State ----
    let currentAudio = null;
    let currentBtn = null;

    // ---- Render ----
    const collection = COLLECTIONS["student-life"];
    const grid = document.getElementById("scene-grid");

    let imgCount = 0, bgmCount = 0, readyCount = 0;

    collection.scenes.forEach(scene => {
      const hasImage = !!scene.image;
      const hasAudio = !!scene.audio;
      if (hasImage) imgCount++;
      if (hasAudio) bgmCount++;
      if (hasImage && hasAudio) readyCount++;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-thumb" ${hasImage ? `onclick="openModal('assets/images/student-life/${scene.image}')"` : ''}>
          ${hasImage
            ? `<img src="assets/images/student-life/${scene.image}" alt="${scene.name}" loading="lazy">`
            : `<div class="placeholder">🎨</div>`}
          <div class="scene-name">
            ${scene.name}
            <small>${scene.nameEn}</small>
          </div>
        </div>
        <div class="card-body">
          <div class="card-desc">${scene.desc}</div>
          <div class="card-bgm-style">♪ ${scene.bgmStyle}</div>
          ${hasAudio
            ? `<div class="audio-player">
                <button class="play-btn" data-audio="assets/audio/student-life/${scene.audio}" data-id="${scene.id}">
                  ${ICON_PLAY}
                </button>
                <div class="progress-bar" data-id="${scene.id}">
                  <div class="progress-fill" id="progress-${scene.id}"></div>
                </div>
                <span class="time-display" id="time-${scene.id}">0:00</span>
              </div>`
            : `<div class="audio-pending">♪ BGM 準備中</div>`}
          <div class="download-row">
            ${hasImage
              ? `<a class="dl-btn image-dl" href="assets/images/student-life/${scene.image}" download="${scene.id}.png">
                  ${ICON_IMG} 背景DL
                </a>`
              : `<span class="dl-btn image-dl disabled">${ICON_IMG} 背景DL</span>`}
            ${hasAudio
              ? `<a class="dl-btn audio-dl" href="assets/audio/student-life/${scene.audio}" download="${scene.id}.mp3">
                  ${ICON_DL} BGM DL
                </a>`
              : `<span class="dl-btn audio-dl disabled">${ICON_DL} BGM DL</span>`}
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById("scene-count").textContent = collection.scenes.length;
    document.getElementById("ready-count").textContent = readyCount;
    document.getElementById("img-count").textContent = imgCount;
    document.getElementById("bgm-count").textContent = bgmCount;

    // ---- Audio Player ----
    document.querySelectorAll(".play-btn[data-audio]").forEach(btn => {
      btn.addEventListener("click", () => togglePlay(btn));
    });

    document.querySelectorAll(".progress-bar[data-id]").forEach(bar => {
      bar.addEventListener("click", e => {
        if (!currentAudio) return;
        const sceneId = bar.dataset.id;
        if (currentBtn && currentBtn.dataset.id === sceneId) {
          const rect = bar.getBoundingClientRect();
          const ratio = (e.clientX - rect.left) / rect.width;
          currentAudio.currentTime = ratio * currentAudio.duration;
        }
      });
    });

    function togglePlay(btn) {
      const src = btn.dataset.audio;
      const sceneId = btn.dataset.id;

      if (currentAudio && currentBtn === btn) {
        if (currentAudio.paused) {
          currentAudio.play();
          btn.innerHTML = ICON_PAUSE;
        } else {
          currentAudio.pause();
          btn.innerHTML = ICON_PLAY;
        }
        return;
      }

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.remove();
        if (currentBtn) currentBtn.innerHTML = ICON_PLAY;
      }

      currentAudio = new Audio(src);
      currentBtn = btn;
      btn.innerHTML = ICON_PAUSE;

      currentAudio.addEventListener("timeupdate", () => {
        const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
        const fill = document.getElementById(`progress-${sceneId}`);
        const time = document.getElementById(`time-${sceneId}`);
        if (fill) fill.style.width = pct + "%";
        if (time) time.textContent = formatTime(currentAudio.currentTime);
      });

      currentAudio.addEventListener("ended", () => {
        btn.innerHTML = ICON_PLAY;
        const fill = document.getElementById(`progress-${sceneId}`);
        if (fill) fill.style.width = "0%";
      });

      currentAudio.play();
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    // ---- Image Modal ----
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");

    function openModal(src) {
      modalImg.src = src;
      modal.classList.add("active");
    }

    modal.addEventListener("click", e => {
      if (e.target === modal || e.target.id === "modalClose") {
        modal.classList.remove("active");
      }
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") modal.classList.remove("active");
    });
  </script>
</body>
</html>
